<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fokus">
<meta name="theme-color" content="#0d1420">
<title>Fokus</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
/* ── DFM-CI-Dark (Spez. Abschnitt 8) ─────────────────────────────── */
:root{
  --bg:#0d1420; --card:#141e2e; --card2:#182438; --line:#243349;
  --ok:#3ecf8e; --warn:#f2b84b; --bad:#f66d6d;
  --blue:#4f8ef7; --purple:#b98af7; --cyan:#6dd3e0;
  --txt:#e8eef7; --mut:#8fa1b8; --mut2:#5d6d88;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  /* 8pt-Raster */
  --s1:8px; --s2:16px; --s3:24px; --s4:32px;
  --tap:44px; /* Touch-Target-Minimum */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--txt);line-height:1.5;
  user-select:none;-webkit-user-select:none;
  display:flex;flex-direction:column;
}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea,select{
  font-family:inherit;font-size:15px;color:var(--txt);
  background:var(--bg);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;width:100%;
  user-select:text;-webkit-user-select:text;
}
input:focus,textarea:focus{outline:none;border-color:var(--blue)}

/* ── Sticky Fokus-Leiste (4.1) — fixer Layer über allen Tabs ─────── */
#fokusbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding-top:var(--sat);
  background:linear-gradient(180deg,var(--card2),var(--card));
  border-bottom:1px solid var(--blue);
}
#fokusbar .inner{
  display:flex;align-items:center;gap:var(--s1);
  min-height:var(--tap);padding:6px var(--s2);
}
#fokusbar .pp{
  width:var(--tap);height:var(--tap);flex:none;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:var(--blue);
}
#fokusbar .mid{flex:1;min-width:0}
#fokusbar .title{
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-size:14px;font-weight:800;
}
#fokusbar .title.idle{color:var(--mut2);font-weight:600}
#fokusbar .sub{
  display:flex;gap:var(--s1);font-size:11px;color:var(--mut);
  font-family:ui-monospace,SFMono-Regular,monospace;
}
#fokusbar .sub[hidden]{display:none}
#fokusbar .sub .timer{color:var(--cyan);font-weight:700}
#fokusbar .sub .ppm{color:var(--purple)}
#fokusbar .akku{
  display:flex;align-items:center;gap:4px;flex:none;
  font-size:12px;font-weight:700;color:var(--ok);
}

/* ── Tab-Inhalte ─────────────────────────────────────────────────── */
main{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:calc(var(--sat) + 64px + var(--s2)) var(--s2) calc(var(--sab) + 64px + var(--s2));
}
.view{display:none}
.view.on{display:block}
.placeholder{margin-top:var(--s4);text-align:center;color:var(--mut2);font-size:13px}
.placeholder .big{font-size:40px;display:block;margin-bottom:var(--s1)}
.sechead{
  font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--blue);
  font-weight:800;margin:var(--s3) 0 var(--s1);padding-bottom:6px;
  border-bottom:1px solid var(--line);
  display:flex;align-items:baseline;gap:var(--s1);
}
.sechead .anz{color:var(--mut2);letter-spacing:0;text-transform:none;font-weight:600}

/* ── Pace-Leiste (4.4): dünner Zeitstrich + Punkte/Std als Hauptsignal ── */
#pace{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
#pace .strich{position:relative;height:4px;border-radius:2px;background:var(--line);overflow:visible}
#pace .fuell{position:absolute;left:0;top:0;bottom:0;border-radius:2px;background:var(--mut2)}
#pace .jetzt{
  position:absolute;top:-3px;width:2px;height:10px;background:var(--cyan);border-radius:1px;
}
#pace .zeile{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-top:6px;font-size:11px;color:var(--mut);
  font-family:ui-monospace,SFMono-Regular,monospace;
}
#pace .zeile .ist{font-size:13px;font-weight:800;color:var(--txt)}
#pace .zeile .ist.gut{color:var(--ok)}
#pace .zeile .ist.schlecht{color:var(--bad)}

/* ── Karten (4.4 / 7.2) — Höhe nach Inhalt, Rand nach Domäne ─────── */
.karte{
  display:flex;align-items:stretch;gap:2px;
  background:var(--card);border:1.5px solid transparent;border-radius:12px;
  margin-bottom:var(--s1);overflow:hidden;
}
/* Farbcodierung (20.07.2026): Verlaufs-Rand + leichte Tönung je Typ */
.karte.dfm{background:
  linear-gradient(135deg,rgba(79,142,247,.10),rgba(109,211,224,.03)) padding-box,
  linear-gradient(var(--card),var(--card)) padding-box,
  linear-gradient(135deg,#4f8ef7,#6dd3e0) border-box}
.karte.privat{background:
  linear-gradient(135deg,rgba(242,184,75,.10),rgba(240,140,75,.03)) padding-box,
  linear-gradient(var(--card),var(--card)) padding-box,
  linear-gradient(135deg,#f2b84b,#f08c4b) border-box}
.karte.routine{background:
  linear-gradient(135deg,rgba(185,138,247,.12),rgba(138,108,247,.03)) padding-box,
  linear-gradient(var(--card),var(--card)) padding-box,
  linear-gradient(135deg,#b98af7,#8a6cf7) border-box}
.karte.cgut{background:
  linear-gradient(135deg,rgba(62,207,142,.10),rgba(109,211,224,.03)) padding-box,
  linear-gradient(var(--card),var(--card)) padding-box,
  linear-gradient(135deg,#3ecf8e,#6dd3e0) border-box}
.karte.cschlecht{background:
  linear-gradient(135deg,rgba(246,109,109,.12),rgba(194,58,58,.04)) padding-box,
  linear-gradient(var(--card),var(--card)) padding-box,
  linear-gradient(135deg,#f66d6d,#c23a3a) border-box}
/* Routine-Karten in den Abschnitts-Feldern: Spaltenlayout mit Extras */
.karte.spalte{flex-direction:column;align-items:stretch}
.karte .krow{display:flex;align-items:stretch;gap:2px}
.karte.ausgesetzt{opacity:.55}
.karte .uamini{padding:0 12px 8px 46px}
.karte .uamini .umzeile{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px}
.karte .uamini .umbox{
  width:26px;height:26px;flex:none;display:flex;align-items:center;justify-content:center;
}
.karte .uamini .umbox span{
  width:15px;height:15px;border:2px solid var(--mut2);border-radius:5px;
  display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--bg);font-weight:900;
}
.karte .uamini .umzeile.fertig .umbox span{background:var(--ok);border-color:var(--ok)}
.karte .uamini .umzeile.fertig .umtitel{color:var(--mut2);text-decoration:line-through}
.karte .kfooter{display:flex;gap:var(--s1);padding:0 12px 10px 46px}
.karte .kfooter button{
  font-size:11px;font-weight:700;color:var(--mut);
  border:1px solid var(--line);border-radius:8px;padding:6px 10px;
}
/* Counter-Chips im Klappfeld */
.chips{display:flex;flex-wrap:wrap;gap:var(--s1)}
.cchip{
  display:flex;align-items:center;gap:8px;min-height:var(--tap);padding:6px 4px 6px 14px;
  border-radius:12px;border:1.5px solid transparent;
  font-size:13px;font-weight:800;color:var(--txt);
}
.cchip.cgut{background:
  linear-gradient(135deg,rgba(62,207,142,.14),rgba(109,211,224,.05)) padding-box,
  linear-gradient(var(--card),var(--card)) padding-box,
  linear-gradient(135deg,#3ecf8e,#6dd3e0) border-box}
.cchip.cschlecht{background:
  linear-gradient(135deg,rgba(246,109,109,.16),rgba(194,58,58,.06)) padding-box,
  linear-gradient(var(--card),var(--card)) padding-box,
  linear-gradient(135deg,#f66d6d,#c23a3a) border-box}
.cchip .cnt{font-family:ui-monospace,monospace;font-size:15px}
.cchip .cpts{font-size:10.5px;color:var(--mut);font-weight:700}
.cchip .cedit{width:34px;min-height:34px;display:flex;align-items:center;justify-content:center;color:var(--mut2)}
/* Klappfelder auf der Stream-Seite nutzen die tacc-Optik */
#view-stream .tacc{margin-top:var(--s2)}
#view-stream .tacc .anz{color:var(--mut2);font-weight:600;letter-spacing:0}
.karte.erledigt{opacity:.45}
.karte .kpp{
  width:var(--tap);flex:none;display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--blue);
}
.karte.fokussiert .kpp{color:var(--cyan)}
.karte .kmain{flex:1;min-width:0;padding:9px 4px 9px 0}
.karte .ktitel{font-size:14px;font-weight:700;line-height:1.3}
.karte .kmeta{
  display:flex;flex-wrap:wrap;gap:4px 8px;margin-top:3px;
  font-size:10.5px;color:var(--mut);
}
.karte .kmeta .pkt{color:var(--purple);font-weight:700}
.karte .kmeta .zeit{font-family:ui-monospace,monospace}
.karte .kmeta .ueberfaellig{color:var(--bad);font-weight:700}
.karte .kcheck{
  width:var(--tap);flex:none;display:flex;align-items:center;justify-content:center;
}
.karte .kcheck .box{
  width:22px;height:22px;border:2px solid var(--mut2);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--bg);font-weight:900;
}
.karte.erledigt .kcheck .box{background:var(--ok);border-color:var(--ok)}
.karte .kcheck .tickzahl{
  min-width:30px;height:26px;padding:0 6px;border-radius:8px;
  border:2px solid var(--mut2);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:var(--txt);
}
.karte .kgriff{
  width:32px;flex:none;display:flex;align-items:center;justify-content:center;
  color:var(--mut2);font-size:14px;touch-action:none;cursor:grab;
}
.karte.dragging{
  position:relative;z-index:60;opacity:.95;
  box-shadow:0 8px 24px rgba(0,0,0,.5);border-color:var(--cyan);
}
.karte.dropvor{box-shadow:0 -3px 0 var(--cyan)}
#streamListe.dropende{box-shadow:0 3px 0 var(--cyan)}
#queueHead.dropziel{color:var(--warn);border-bottom-color:var(--warn)}
.leer{color:var(--mut2);font-size:12.5px;text-align:center;padding:var(--s2)}

/* ── Sheet von unten (4.3 / 7.2) ─────────────────────────────────── */
#overlay{
  position:fixed;inset:0;z-index:200;background:rgba(5,9,16,.6);
  display:none;
}
#overlay.on{display:block}
#sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:201;
  background:var(--card2);border-radius:18px 18px 0 0;border:1px solid var(--line);border-bottom:none;
  max-height:86vh;display:none;flex-direction:column;
  padding-bottom:var(--sab);
  transform:translateY(0);transition:transform .18s ease-out;
}
#sheet.on{display:flex}
#sheet .kopf{
  flex:none;padding:8px var(--s2) 6px;touch-action:none;
}
#sheet .grabber{width:38px;height:4px;border-radius:2px;background:var(--mut2);margin:0 auto 8px}
#sheet .kopfzeile{display:flex;align-items:center;gap:var(--s1)}
#sheet .kopfzeile h2{flex:1;font-size:16px;font-weight:800;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#sheet .schliessen{
  width:var(--tap);height:var(--tap);flex:none;margin-right:-8px;
  display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--mut);
}
#sheet .inhalt{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 var(--s2) var(--s3)}

/* Formular-Bausteine im Sheet */
.feld{margin-bottom:var(--s2)}
.feld label{display:block;font-size:11px;font-weight:700;color:var(--mut);margin-bottom:5px;letter-spacing:.4px}
.zweispaltig{display:flex;gap:var(--s1)}
.zweispaltig .feld{flex:1}
textarea{min-height:64px;resize:vertical}

/* Segment-Auswahl */
.seg{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{
  flex:1;min-height:38px;font-size:12.5px;font-weight:700;color:var(--mut);
  border-right:1px solid var(--line);
}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--card);color:var(--txt);box-shadow:inset 0 0 0 1px var(--blue)}

/* Schieberegler (4.3) — wiederverwendet in ⚙️ (7.3) */
.regler input[type=range]{
  -webkit-appearance:none;appearance:none;width:100%;height:28px;background:none;border:none;padding:0;
}
.regler input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:3px;background:var(--line)}
.regler input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:26px;height:26px;border-radius:50%;
  background:var(--blue);border:3px solid var(--card2);margin-top:-10px;
}
.regler .stufen{display:flex;justify-content:space-between;font-size:10.5px;color:var(--mut2);margin-top:-2px}
.regler .stufen span.on{color:var(--txt);font-weight:800}

/* Tag-Aktionen im Stream (7.1): geführte Screens von hier aus */
#tagAktionen{display:flex;gap:var(--s1);margin-bottom:var(--s2)}
.tagbtn{
  flex:1;min-height:var(--tap);border-radius:12px;
  background:var(--card2);border:1px solid var(--blue);
  color:var(--txt);font-size:13px;font-weight:800;
}
.tagbtn.sek{border-color:var(--line);color:var(--mut);flex:0 0 auto;padding:0 14px}
.tagchip{
  flex:1;display:flex;align-items:center;justify-content:center;
  min-height:var(--tap);border-radius:12px;font-size:12.5px;font-weight:700;
  background:var(--card);border:1px solid var(--ok);color:var(--ok);
}

/* Export-/Import-Felder in den Wizards */
.copyfeld{
  width:100%;min-height:120px;font-family:ui-monospace,SFMono-Regular,monospace;
  font-size:11px;line-height:1.4;white-space:pre;
}
.wizbtn{
  width:100%;min-height:var(--tap);border-radius:12px;margin-top:var(--s1);
  background:var(--blue);color:#fff;font-size:15px;font-weight:800;
}
.wizbtn.sek{background:var(--card);border:1px solid var(--line);color:var(--txt)}
.wizinfo{font-size:12px;color:var(--mut);margin:var(--s1) 0}
.wizsumme{
  background:var(--bg);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;margin-bottom:var(--s1);font-size:13px;
}
.wizsumme .zeile{display:flex;justify-content:space-between;padding:2px 0}
.wizsumme .zeile b{color:var(--purple)}
.akkuwert{
  width:76px;text-align:center;font-size:17px;font-weight:800;padding:8px 6px;
}

/* Einstellungen (7.3): numerische Variante derselben Regler-Komponente */
.regler .kopfzeile2{display:flex;justify-content:space-between;align-items:baseline}
.regler .wert{font-family:ui-monospace,SFMono-Regular,monospace;font-size:13px;font-weight:800;color:var(--cyan)}
#view-einstellungen .regler{margin-bottom:var(--s1)}
.resetbtn{
  width:100%;min-height:var(--tap);margin-top:var(--s3);
  border:1px solid var(--bad);border-radius:12px;color:var(--bad);
  font-size:14px;font-weight:700;
}
.versionszeile{text-align:center;color:var(--mut2);font-size:11px;margin-top:var(--s2)}

/* Punkte-Badge im Sheet */
.pbadge{
  display:flex;justify-content:space-between;align-items:baseline;
  background:var(--bg);border:1px solid var(--line);border-radius:10px;
  padding:8px 12px;margin-bottom:var(--s2);
  font-size:12px;color:var(--mut);
}
.pbadge b{font-size:17px;color:var(--purple)}

/* ── Fokus-Tacho 2.0: Renn-Ring, Upgrade-Leiste, Unteraufgaben ───── */
.tkern{background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:var(--s1)}
.tkopfreihe{display:flex;align-items:center;gap:12px}
.tringwrap{position:relative;width:132px;height:132px;flex:none}
.tringwrap .avgrid{
  position:absolute;inset:0;margin:auto;width:72px;height:87px;
  grid-template-columns:repeat(24,3px);grid-auto-rows:3px;
}
.tkopfpuls{animation:tpuls 1.4s ease-in-out infinite}
@keyframes tpuls{0%,100%{opacity:.85}50%{opacity:.15}}
.tinfos{flex:1;min-width:0}
.trest{font-family:ui-monospace,SFMono-Regular,monospace;font-size:26px;font-weight:800;line-height:1.1}
.trest.gruen{color:var(--ok)} .trest.gelb{color:var(--warn)} .trest.rot{color:var(--bad)}
.trestsub{font-size:10.5px;color:var(--mut);margin-bottom:8px}
.tuabox{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:6px 8px;margin-bottom:6px}
.tuabox .l{font-size:9px;color:var(--mut2);letter-spacing:.5px}
.tuabox .n{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tuabox .r{font-size:10px}
.takku{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ok);font-weight:700}
.tlevel{margin-top:12px}
.tlevel .kopf{display:flex;justify-content:space-between;font-size:10px;color:var(--mut);margin-bottom:4px}
.tlevel .kopf .eta{color:var(--cyan);font-family:ui-monospace,monospace}
.tlevel .leiste{height:14px;border-radius:7px;background:var(--bg);border:1px solid var(--line);overflow:hidden;display:flex}
.tlevel .lg{background:var(--ok);transition:width .5s}
.tlevel .ly{background:var(--warn);transition:width .5s}
.tlevel .lh{
  background:repeating-linear-gradient(45deg,var(--line) 0 4px,var(--card2) 4px 8px);
  border-left:1px solid var(--cyan);transition:width .5s;
}
.tlevel .lege{display:flex;justify-content:space-between;font-size:9px;color:var(--mut2);margin-top:3px}
.taufgabe{display:flex;align-items:center;gap:10px;margin-top:12px}
.taufgabe .tmain{flex:1;min-width:0}
.taufgabe .ttitel{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.taufgabe .tsub{font-size:10px;color:var(--mut)}
.taufgabe .tpp{
  width:46px;height:46px;border-radius:50%;background:var(--blue);flex:none;
  display:flex;align-items:center;justify-content:center;font-size:19px;color:#04122e;
}
.taufgabe .tcheck{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--line);flex:none;
  display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--ok);
}
.uareihe{display:flex;align-items:center;gap:8px;padding:5px 0}
.uareihe .uacheck{
  width:32px;height:32px;flex:none;display:flex;align-items:center;justify-content:center;
}
.uareihe .uacheck .box{
  width:18px;height:18px;border:2px solid var(--mut2);border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--bg);font-weight:900;
}
.uareihe.fertig .uacheck .box{background:var(--ok);border-color:var(--ok)}
.uareihe .uatitel{flex:1;min-width:0;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.uareihe.fertig .uatitel{color:var(--mut2);text-decoration:line-through}
.uareihe .uamin{width:52px;flex:none;font-size:11px;text-align:center;padding:5px 4px}
.uareihe .uapunkte{width:52px;flex:none;text-align:right;font-size:10px;color:var(--ok);font-weight:700}
.uareihe .uax{width:28px;flex:none;text-align:center;color:var(--mut2);font-size:13px}
.uaneu{display:flex;gap:var(--s1);margin-top:6px}
.uaneu input{flex:1;font-size:13px;padding:8px 10px}
.uaneu button{
  width:38px;flex:none;border-radius:8px;background:var(--card2);border:1px solid var(--line);
  color:var(--txt);font-size:16px;font-weight:800;
}
.tacc{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:var(--s1);overflow:hidden}
.tacc .tacckopf{
  display:flex;align-items:center;gap:8px;min-height:var(--tap);padding:0 12px;
  font-size:12px;font-weight:700;color:var(--mut);cursor:pointer;
}
.tacc .tacckopf .pfeil{margin-left:auto;transition:transform .2s}
.tacc.offen .tacckopf .pfeil{transform:rotate(180deg)}

/* ── Belohnungsseite (Abschnitt 6) ───────────────────────────────── */

</head>
<body>

<!-- Fokus-Leiste: kein Tab, fixer Layer über allen drei Tabs (4.1/7.1).
     Play/Pause = EIN Toggle-Button. Ohne aktiven Fokus öffnet jeder Tap
     den Fokus-Tacho (4.2). -->
<header id="fokusbar">
  <div class="inner">
    <button class="pp" id="ppBtn" aria-label="Fokus starten/pausieren">▶</button>
    <div class="mid" id="fokusMid">
      <div class="title idle" id="fokusTitle">Kein Fokus aktiv — tippen für Auswahl</div>
      <div class="sub" id="fokusSub" hidden>
        <span class="timer" id="fokusTimer">00:00</span>
        <span class="ppm" id="fokusPpm"></span>
      </div>
    </div>
    <div class="akku" id="akku">🔋<span id="akkuPct">–%</span></div>
  </div>
</header>

<main>
  <section class="view on" id="view-stream">
    <div id="tagAktionen"></div>
    <div id="pace"></div>
    <h2 class="sechead">Tagesstream <span class="anz" id="anzStream"></span></h2>
    <div id="streamListe"></div>
    <div id="counterFeld"></div>
    <div id="routinenFelder"></div>
    <h2 class="sechead" id="queueHead">Warteschlange <span class="anz" id="anzQueue"></span></h2>
    <div id="queueListe"></div>
  </section>
  <section class="view" id="view-belohnung"></section>
  <section class="view" id="view-einstellungen"></section>
</main>

<button id="fab" aria-label="Neues Item anlegen">+</button>

<nav id="tabbar">
  <button class="on" data-view="stream"><span class="ic">🕐</span>Stream</button>
  <button data-view="belohnung"><span class="ic">🏆</span>Belohnung</button>
  <button data-view="einstellungen"><span class="ic">⚙️</span>Einstellungen</button>
</nav>

<!-- Ein Sheet-Container für Task-Karte (4.3) und Fokus-Tacho (4.2):
     nie verschachtelt (7.2) — ein neues Sheet ersetzt das offene. -->
<div id="conf"></div>
<div class="toast" id="toast"></div>
<div id="overlay"></div>
<div id="sheet" role="dialog" aria-modal="true">
  <div class="kopf" id="sheetKopf">
    <div class="grabber"></div>
    <div class="kopfzeile">
      <h2 id="sheetTitel"></h2>
      <button class="schliessen" id="sheetX" aria-label="Schließen">✕</button>
    </div>
  </div>
  <div class="inhalt" id="sheetInhalt"></div>
</div>

<script>
'use strict';
const APP_VERSION = '0.10.0';

/* ════════════════════════════════════════════════════════════════════
   Datenschicht (Spez. Abschnitt 2)
   Zwei strikt getrennte Domänen ('dfm' | 'privat') — die Trennung lebt
   im domain-Feld jedes Items, nie in vermischten Speichern/Feldern.
   Die App hat keinerlei Airtable-/Internet-Zugriff: rein localStorage,
   Sync ausschließlich über Export-/Import-Pakete (2.4 / 1.2).
   ════════════════════════════════════════════════════════════════════ */
const LS = {
  ITEMS:     'fokus2.items',
  TAG:       'fokus2.tag',
  SETTINGS:  'fokus2.settings',
  FOKUS:     'fokus2.fokus',
  BELOHNUNG: 'fokus2.belohnung'
};

/* Alle Punkte-Faktoren/Sätze sind Settings, keine Code-Konstanten (3.7).
   Werte hier = Startbelegung laut Spez. 3.1–3.6, über ⚙️ änderbar. */
const DEFAULT_SETTINGS = {
  minutenJeEinheit: 5,                                        // Basisformel: Ist-Min ÷ 5 (3.1)
  komplexitaet: { leicht: 1.0, mittel: 1.5, schwer: 2.0 },    // 3.2
  energie:      { gibt: 0.8, neutral: 1.0, zieht: 1.3 },
  blockade:     { keine: 1.0, leicht: 1.2, mittel: 1.5, stark: 2.0 },
  geldScoreBasis: { hoch: 300, mittel: 200, niedrig: 100 },   // 3.3 — nur DFM
  schiebeMalusProzent: { muss: 20, soll: 10, idee: 0 },       // 3.4 — je Tag geschoben
  planMalusWieSchiebeMalus: true,                             // 3.4 — Plan-Malus folgt Schiebe-Malus
  rhythmusVerpasstProTag: -2,                                 // 3.4 — nur Privat
  rhythmusFrueherBonus: 1,                                    // 3.4 — nur Privat
  streakBonus: 3,                                             // 3.4
  counterDefaults: { tickSchwelle: 3, vorSchwelle: 1, nachSchwelle: -2 },  // 2.2
  arbeitstagStart: '08:00',                                   // Pace-Leiste (3.6/4.4)
  arbeitstagEnde:  '18:00',
  freischaltChanceProzent: 40,                                // 6.3 — tägliche Würfel-Chance
  abschnittMorgenBis: 12,                                     // 3.5 — Morgen bis (Uhr)
  abschnittTagBis: 17,                                        // 3.5 — Tag bis (Uhr), danach Abend
  /* Avatar-Level (Spez-Änderung 20.07.2026): eigene Leiter über die
     Gesamt-Punkte (Wohlstand live), Level-Up sofort bei Schwelle. */
  avatarStufen: [0, 400, 1200, 2500, 4500, 7000, 10000, 14000, 19000, 25000, 32000, 40000]
};

function lokaleUuid() {
  return (crypto.randomUUID && crypto.randomUUID()) ||
    'loc-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
}

function heuteIso() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

/* Item-Fabrik: volles Schema aus 2.4, fehlende Felder mit Defaults.
   id = Airtable-Record-ID (DFM) oder lokale UUID (Privat/Instant). */
function neuesItem(felder = {}) {
  const item = Object.assign({
    id: lokaleUuid(),
    domain: 'privat',                 // 'dfm' | 'privat'
    typ: 'aufgabe',                   // 'aufgabe' | 'routine' | 'counter'
    titel: '',
    komplexitaet: 'leicht',           // leicht | mittel | schwer
    energie: 'neutral',               // gibt | neutral | zieht
    blockade: 'keine',                // keine | leicht | mittel | stark
    geldImpact: null,                 // hoch | mittel | niedrig — NUR domain=dfm
    projekt: null,
    bereich: null,                    // Dashboard-Achse 3.5 (Finanzen/Sales/…), Import kann setzen
    deadline: null,                   // 'YYYY-MM-DD'
    aufwandGeplantMin: 0,
    istMinuten: 0,
    prioritaet: 'soll',               // muss | soll | idee
    notiz: '',
    kommentarFuerClaude: '',
    streamSlot: null,                 // Minuten seit 00:00 | null = Warteschlange
    status: 'offen',                  // offen | in_arbeit | erledigt
    istAnker: false,
    ankerBezugId: null,
    /* Schema-Ergänzungen zu 2.4 (für Punkteregeln 3.4 nötig): */
    tageGeschoben: 0,                 // Zähler für Schiebe-/Plan-Malus
    rhythmusTage: null,               // Routine: alle X Tage fällig (null = kein Rhythmus)
    zuletztErledigt: null,            // Routine: 'YYYY-MM-DD' der letzten Erledigung
    /* Unteraufgaben (Tacho 2.0): App-intern, reisen im Export nur als
       Kommentar-Text an Claude — nie als eigene Airtable-Aufgaben. */
    unteraufgaben: [],                // [{id, titel, erledigt, geplantMin|null, gebuchtePunkte|null}]
    /* Private Tagesstruktur (20.07.2026): */
    tagesabschnitt: 'tagsueber',      // Routine-Feld: morgen | tagsueber | abend
    routineStreak: 0,                 // routineneigene Streak-Serie
    streakGebrochen: false,           // Kennzeichnung nach verpasstem Tag
    ausgesetztAm: null                // 'YYYY-MM-DD' = heute ausgesetzt (Rhythmus neu)
  }, felder);
  if (item.typ === 'routine' && item.rhythmusTage == null) item.rhythmusTage = 1;  // Standard: täglich
  if (item.domain !== 'dfm') item.geldImpact = null;   // Geld-Score existiert nur bei DFM (3.3)
  if (item.typ === 'counter') {
    const cd = (Store.settings && Store.settings.counterDefaults) || DEFAULT_SETTINGS.counterDefaults;
    if (item.tickSchwelle == null)              item.tickSchwelle = cd.tickSchwelle;
    if (item.punkteJeTickVorSchwelle == null)   item.punkteJeTickVorSchwelle = cd.vorSchwelle;
    if (item.punkteJeTickNachSchwelle == null)  item.punkteJeTickNachSchwelle = cd.nachSchwelle;
    if (item.tickStandHeute == null)            item.tickStandHeute = 0;
  }
  return item;
}

/* Tagesstand (2.4): wohlstandStand kumulativ, nie zurückgesetzt (6.3);
   akkuProzent bleibt null, bis der „Tag starten"-Wizard (1.2) ihn setzt. */
function neuerTagesstand(datum, vorheriger) {
  return {
    datum,
    akkuProzent: null,
    gesamtpunkteHeute: 0,
    wohlstandStand: vorheriger ? vorheriger.wohlstandStand : 0,
    streak: vorheriger ? vorheriger.streak : 0,
    log: [],
    akkuVerlauf: [],    // [{min, p}] — Energie-Kurve für die Belohnungsseite (6.1)
    tickLog: []         // [{itemId, domain, bereich, punkte, zeit}] — Aufschlüsselung 3.5
  };
}

const Store = {
  items: [],
  tag: null,
  settings: {},

  ladeAlles() {
    this.settings = settingsZusammenfuehren(lsLese(LS.SETTINGS, {}));
    // Migration: neue Schema-Felder aus App-Updates mit Defaults auffüllen
    this.items    = lsLese(LS.ITEMS, []).map(i => neuesItem(i));
    const tag = lsLese(LS.TAG, null);
    if (tag && tag.datum === heuteIso()) {
      this.tag = tag;
    } else {
      // Tageswechsel: neuer Stand, Wohlstand/Streak werden mitgenommen.
      // (Boni/Mali & Streak-Fortschreibung übernimmt später der
      //  Tagesabschluss-Wizard — hier nur der technische Rollover.)
      this.tag = neuerTagesstand(heuteIso(), tag);
      this.items.forEach(i => {
        if (i.typ === 'counter') i.tickStandHeute = 0;      // Counter starten morgens neu
        if (i.typ === 'routine') {                          // Routinen sind Tages-Items
          if (i.status !== 'offen') i.status = 'offen';
          i.istMinuten = 0;
        }
      });
      this.speichereAlles();
    }
  },

  speichereItems()    { lsSchreibe(LS.ITEMS, this.items); },
  speichereTag()      { lsSchreibe(LS.TAG, this.tag); },
  speichereSettings() { lsSchreibe(LS.SETTINGS, this.settings); },
  speichereAlles()    { this.speichereItems(); this.speichereTag(); this.speichereSettings(); },

  findeItem(id) { return this.items.find(i => i.id === id) || null; },

  /* Anlegen oder per ID aktualisieren — nie Duplikate (1.2). */
  upsertItem(felder) {
    const vorhanden = felder.id ? this.findeItem(felder.id) : null;
    if (vorhanden) {
      Object.assign(vorhanden, felder);
      this.speichereItems();
      return { item: vorhanden, angelegt: false };
    }
    const item = neuesItem(felder);
    this.items.push(item);
    this.speichereItems();
    return { item, angelegt: true };
  },

  entferneItem(id) {
    const n = this.items.length;
    this.items = this.items.filter(i => i.id !== id);
    if (this.items.length !== n) this.speichereItems();
    return this.items.length !== n;
  },

  /* Import-Paket aus dem Claude-Chat (Sync-Vertrag spec/fokus-sync/SKILL.md):
     neu → anlegen, aktualisiert → per id mergen, entfernt → aus der Ansicht
     nehmen. Keine Duplikate, auch wenn ein Item fälschlich unter „neu" steht.
     UUID-Tausch: lokale UUID unter „entfernt" + inhaltsgleiches rec…-Item
     unter „neu" = ERSETZUNG derselben Karte (neue ID, lokaler Zustand wie
     streamSlot/Ist-Minuten/Status bleibt erhalten) — keine Neuanlage. */
  wendeImportAn(paket) {
    const ergebnis = { angelegt: 0, aktualisiert: 0, entfernt: 0, ersetzt: 0 };
    const neu = (paket.neu || []).filter(n => n && n.id);
    const aktualisiert = (paket.aktualisiert || []).filter(n => n && n.id);
    const entfernt = paket.entfernt || [];
    const istRec = id => /^rec/i.test(String(id));
    const alsErsatzVerbraucht = new Set();

    for (const altId of entfernt) {
      if (istRec(altId)) continue;                    // nur lokale UUIDs tauschen
      const lokal = this.findeItem(altId);
      if (!lokal) continue;
      const kandidat = neu.find(n => istRec(n.id) && !alsErsatzVerbraucht.has(n.id)
        && (n.domain || 'dfm') === lokal.domain
        && String(n.titel || '').trim().toLowerCase() === String(lokal.titel || '').trim().toLowerCase());
      if (!kandidat) continue;
      alsErsatzVerbraucht.add(kandidat.id);
      const erhalten = {                              // lokaler Zustand überlebt den Tausch
        streamSlot: lokal.streamSlot, istMinuten: lokal.istMinuten,
        status: lokal.status, tageGeschoben: lokal.tageGeschoben,
        tickStandHeute: lokal.tickStandHeute, zuletztErledigt: lokal.zuletztErledigt
      };
      Object.assign(lokal, kandidat, erhalten);
      idReferenzenUmziehen(altId, lokal.id);
      ergebnis.ersetzt++;
    }

    for (const felder of [...neu.filter(n => !alsErsatzVerbraucht.has(n.id)), ...aktualisiert]) {
      const { angelegt } = this.upsertItem(felder);
      ergebnis[angelegt ? 'angelegt' : 'aktualisiert']++;
    }
    for (const id of entfernt) {
      if (this.entferneItem(id)) ergebnis.entfernt++;
    }
    this.speichereItems();
    return ergebnis;
  },

  /* Export-Paket nach dem Sync-Vertrag (spec/fokus-sync/SKILL.md):
     - bereich ist App-seitig READ-ONLY und wird NIE exportiert
       (der Chat leitet ihn aus dem Projekt ab)
     - projekt bleibt Klartext-Name (nie Airtable-ID)
     - Zeit durchgehend in Minuten; Stunden rechnet nur der Chat
     - komplexitaet/energie/blockade reisen informativ mit */
  baueExport(typ) {
    return {
      typ,                              // 'sync' | 'tagesabschluss'
      datum: heuteIso(),
      items: JSON.parse(JSON.stringify(this.items)).map(i => {
        delete i.bereich;
        delete i.heuteRausgezogen;      // rein App-interner Tageszustand
        // Unteraufgaben reisen als Kommentar-Block an Claude (Entscheidung
        // 20.07.2026) — nie als Schema-Feld, es entstehen keine Aufgaben.
        if (i.unteraufgaben && i.unteraufgaben.length) {
          const zeilen = i.unteraufgaben.map(u => '[' + (u.erledigt ? 'x' : ' ') + '] ' + u.titel);
          i.kommentarFuerClaude = (i.kommentarFuerClaude ? i.kommentarFuerClaude + '\n\n' : '')
            + 'Unteraufgaben:\n' + zeilen.join('\n');
        }
        delete i.unteraufgaben;
        return i;
      }),
      zeitEintraege: this.items
        .filter(i => i.istMinuten > 0 || i.status === 'erledigt')
        .map(i => ({ itemId: i.id, minuten: Math.round(i.istMinuten), erledigt: i.status === 'erledigt' }))
    };
  }
};

/* Beim UUID→rec-Tausch alle internen Verweise auf die neue ID umziehen. */
function idReferenzenUmziehen(altId, neuId) {
  if (fokus && fokus.itemId === altId) { fokus.itemId = neuId; fokusSpeichern(); }
  (Store.tag.log || []).forEach(l => { if (l.itemId === altId) l.itemId = neuId; });
  (Store.tag.tickLog || []).forEach(l => { if (l.itemId === altId) l.itemId = neuId; });
  Store.items.forEach(i => { if (i.ankerBezugId === altId) i.ankerBezugId = neuId; });
  Store.speichereTag();
}

function lsLese(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) { return fallback; }
}
function lsSchreibe(key, wert) {
  localStorage.setItem(key, JSON.stringify(wert));
}

/* Gespeicherte Settings über die Defaults legen — neue Parameter aus
   App-Updates erscheinen so automatisch, Pascals Anpassungen bleiben. */
function settingsZusammenfuehren(gespeichert) {
  const s = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
  for (const [k, v] of Object.entries(gespeichert || {})) {
    if (v && typeof v === 'object' && !Array.isArray(v) && typeof s[k] === 'object') {
      Object.assign(s[k], v);
    } else {
      s[k] = v;
    }
  }
  return s;
}

/* ════════════════════════════════════════════════════════════════════
   Punkte-Engine — Kern (3.1–3.3). Boni/Mali (3.4) folgen in Schritt 4.
   ════════════════════════════════════════════════════════════════════ */
function tageBisDeadline(deadline) {
  if (!deadline) return 0;
  return Math.round((new Date(deadline + 'T00:00:00') - new Date(heuteIso() + 'T00:00:00')) / 86400000);
}

/* Punkte für Aufgabe/Routine bei gegebenen Ist-Minuten (3.1–3.3). */
function punkteBeiMinuten(item, minuten) {
  const s = Store.settings;
  let min = minuten;
  // Ausnahme „Idee": Ist-Minuten auf geplante Minuten gedeckelt (3.1)
  if (item.prioritaet === 'idee' && item.aufwandGeplantMin > 0) {
    min = Math.min(min, item.aufwandGeplantMin);
  }
  const basis = (min / s.minutenJeEinheit)
    * s.komplexitaet[item.komplexitaet]
    * s.energie[item.energie]
    * s.blockade[item.blockade];
  // Schiebe-/Plan-Malus (3.4): −X % der BASIS-Punkte je geschobenem Tag
  // (Geld-Score bleibt unberührt), nie unter 0.
  const malusSatz = (s.schiebeMalusProzent[item.prioritaet] || 0) / 100;
  const malusFaktor = Math.max(0, 1 - malusSatz * (item.tageGeschoben || 0));
  let geld = 0;
  if (item.domain === 'dfm' && item.geldImpact) {           // Geld-Score NUR DFM (3.3)
    geld = s.geldScoreBasis[item.geldImpact] - tageBisDeadline(item.deadline);
  }
  return basis * malusFaktor + geld;
}

/* Counter: Tick-Kurve (2.2) — vor Schwelle +, danach ± je Tick. */
function counterPunkte(item, ticks) {
  const n = (ticks != null) ? ticks : (item.tickStandHeute || 0);
  const bis = Math.min(n, item.tickSchwelle);
  const ueber = Math.max(0, n - item.tickSchwelle);
  return bis * item.punkteJeTickVorSchwelle + ueber * item.punkteJeTickNachSchwelle;
}

/* Anzeigewert (3.5): erledigt = eingefroren (aus dem Log), offen = live.
   Offene Aufgaben ohne Ist-Zeit projizieren über die geplanten Minuten. */
function anzeigePunkte(item) {
  if (item.typ === 'counter') return counterPunkte(item);
  if (item.status === 'erledigt') {
    const log = Store.tag.log.find(l => l.itemId === item.id);
    if (log) return log.punkte;
  }
  const min = Math.max(minutenInklFokus(item), item.aufwandGeplantMin || 0);
  return punkteBeiMinuten(item, min);
}

/* ════════════════════════════════════════════════════════════════════
   Routine-Engine (private Tagesstruktur, 20.07.2026)
   Rhythmus 1–31 Tage; fällig = zuletztErledigt + Rhythmus erreicht
   (nie erledigte Routinen sind sofort fällig). Aussetzen startet den
   Rhythmus ab heute neu (wahlweise mit Punkteabzug); Verpasstes zieht
   beim Tagesabschluss automatisch ab und bricht die Routine-Streak.
   ════════════════════════════════════════════════════════════════════ */
function routineUeberfaelligTage(r) {
  if (!r.zuletztErledigt) return 0;
  const diff = Math.round((new Date(heuteIso() + 'T00:00:00')
    - new Date(r.zuletztErledigt + 'T00:00:00')) / 86400000);
  return diff - (r.rhythmusTage || 1);
}

function routineFaellig(r) {
  if (r.typ !== 'routine') return false;
  if (r.status === 'erledigt') return false;
  if (r.ausgesetztAm === heuteIso()) return false;
  if (!r.zuletztErledigt) return true;
  return routineUeberfaelligTage(r) >= 0;
}

function routineAussetzen(id, mitAbzug) {
  const r = Store.findeItem(id);
  if (!r || r.typ !== 'routine') return;
  r.ausgesetztAm = heuteIso();
  r.zuletztErledigt = heuteIso();          // Rhythmus startet ab heute neu
  if (mitAbzug) {
    Store.tag.log.push({
      itemId: id, titel: r.titel + ' — ausgesetzt', domain: r.domain,
      bereich: r.bereich || null, punkte: Store.settings.rhythmusVerpasstProTag,
      zeit: new Date().toISOString(), aussetzer: true
    });
  }
  gesamtpunkteAktualisieren();
  Store.speichereItems(); Store.speichereTag();
  toastZeigen(mitAbzug
    ? '⏭ Ausgesetzt (' + fmtPunkte(Store.settings.rhythmusVerpasstProTag) + ' P) — Rhythmus startet heute neu'
    : '⏭ Ausgesetzt — Rhythmus startet heute neu');
  renderAlles();
}

function rhythmusLabel(tage) {
  const t = tage || 1;
  if (t === 1) return 'tgl.';
  if (t === 7) return 'wöchentl.';
  if (t === 14) return 'alle 2 Wo.';
  if (t >= 28 && t <= 31) return 'monatl.';
  return 'alle ' + t + ' T';
}

/* ════════════════════════════════════════════════════════════════════
   Unteraufgaben-Engine (Tacho 2.0)
   Zeit-Verteilung: eigene Minuten zählen fix, der Rest der geplanten
   Zeit verteilt sich gleichmäßig auf Unteraufgaben ohne Angabe.
   Punkte-Anteile folgen den Zeit-Anteilen; Abhaken einer Unteraufgabe
   friert ihren Anteil sofort ein, die Hauptaufgabe bucht den Rest.
   ════════════════════════════════════════════════════════════════════ */
function zeitVerteilung(item) {
  const uas = item.unteraufgaben || [];
  if (!uas.length) return [];
  const geplant = item.aufwandGeplantMin || 0;
  const fix = uas.filter(u => u.geplantMin > 0);
  const fixSumme = fix.reduce((s, u) => s + u.geplantMin, 0);
  const autoAnzahl = uas.length - fix.length;
  const autoJe = autoAnzahl > 0 ? Math.max(0, geplant - fixSumme) / autoAnzahl : 0;
  return uas.map(u => (u.geplantMin > 0 ? u.geplantMin : autoJe));
}

/* Punkte-Anteil einer Unteraufgabe am aktuellen Live-Gesamtwert. */
function unteraufgabenAnteil(item, uaIndex) {
  const zeiten = zeitVerteilung(item);
  const summe = zeiten.reduce((s, z) => s + z, 0);
  const gesamt = punkteBeiMinuten(item, Math.max(minutenInklFokus(item), item.aufwandGeplantMin || 0));
  if (summe <= 0) return gesamt / zeiten.length;          // alles 0 geplant → gleichmäßig
  return gesamt * zeiten[uaIndex] / summe;
}

function unteraufgabeToggle(itemId, uaId) {
  const item = Store.findeItem(itemId);
  if (!item) return;
  const idx = (item.unteraufgaben || []).findIndex(u => u.id === uaId);
  if (idx < 0) return;
  const ua = item.unteraufgaben[idx];
  if (ua.erledigt) {
    // Rückgängig: Gutschrift + Log-Eintrag entfernen
    ua.erledigt = false;
    ua.gebuchtePunkte = null;
    Store.tag.log = Store.tag.log.filter(l => !(l.itemId === itemId && l.uaId === uaId));
  } else {
    ua.erledigt = true;
    ua.gebuchtePunkte = unteraufgabenAnteil(item, idx);   // sofort einfrieren
    Store.tag.log.push({
      itemId, uaId, titel: item.titel + ' — ' + ua.titel,
      domain: item.domain, bereich: item.bereich || null,
      punkte: ua.gebuchtePunkte, zeit: new Date().toISOString()
    });
  }
  gesamtpunkteAktualisieren();
  Store.speichereItems();
  Store.speichereTag();
  pruefeLevelUp();
}

function unteraufgabeAnlegen(itemId, titel) {
  const item = Store.findeItem(itemId);
  if (!item || !titel.trim()) return null;
  item.unteraufgaben = item.unteraufgaben || [];
  const ua = { id: lokaleUuid(), titel: titel.trim(), erledigt: false, geplantMin: null, gebuchtePunkte: null };
  item.unteraufgaben.push(ua);
  Store.speichereItems();
  return ua;
}

/* ════════════════════════════════════════════════════════════════════
   Live-Wohlstand & Avatar-Level (Spez-Änderung 20.07.2026: alles live)
   Anzeige-Basis = offizieller Wohlstand + heutige Punkte + Live-Zulauf
   des aktuellen Fokus. Level-Up feuert SOFORT beim Schwellen-Übertritt.
   Die 6 Belohnungs-Kategorien behalten ihre Würfel-Mechanik (6.3),
   zeigen aber ebenfalls den Live-Stand an.
   ════════════════════════════════════════════════════════════════════ */
function fokusLiveDelta() {
  const item = fokusItem();
  if (!item || item.status === 'erledigt' || item.typ === 'counter') return 0;
  const live = punkteBeiMinuten(item, minutenInklFokus(item));
  const gebucht = (item.unteraufgaben || []).reduce((s, u) => s + (u.gebuchtePunkte || 0), 0);
  return Math.max(0, live - gebucht);
}

function wohlstandLive() {
  if (Store.tag.abgeschlossen) return Store.tag.wohlstandStand;
  gesamtpunkteAktualisieren();
  return Store.tag.wohlstandStand + Store.tag.gesamtpunkteHeute + fokusLiveDelta();
}

function avatarStufeAus(basis) {
  const stufen = Store.settings.avatarStufen || DEFAULT_SETTINGS.avatarStufen;
  let s = 1;
  stufen.forEach((schwelle, i) => { if (basis >= schwelle) s = i + 1; });
  return s;
}

/* Level nie absteigend (Undo nimmt kein Level weg). */
function pruefeLevelUp() {
  if (!belohnung) return;
  if (belohnung.avatarStufe == null) {
    belohnung.avatarStufe = avatarStufeAus(wohlstandLive());
    belohnungSpeichern();
    return;
  }
  const neu = avatarStufeAus(wohlstandLive());
  if (neu > belohnung.avatarStufe) {
    belohnung.avatarStufe = neu;
    belohnungSpeichern();
    konfetti();
    toastZeigen('⬆️ Level up! Avatar-Stufe ' + neu);
    if (document.getElementById('view-belohnung').classList.contains('on')) renderBelohnung();
  }
}

/* ════════════════════════════════════════════════════════════════════
   Fokus-Engine (4.1/4.2): genau ein Fokus, Play/Pause als Toggle.
   Laufende Zeit fließt beim Pausieren/Stoppen in item.istMinuten.
   ════════════════════════════════════════════════════════════════════ */
let fokus = lsLese(LS.FOKUS, null);   // { itemId, laeuft, startMs, sessionSek }

function fokusItem() { return fokus ? Store.findeItem(fokus.itemId) : null; }

function fokusSpeichern() { lsSchreibe(LS.FOKUS, fokus); }

function laufendeSek() {
  if (!fokus || !fokus.laeuft) return 0;
  return (Date.now() - fokus.startMs) / 1000;
}

/* Ist-Minuten eines Items inklusive gerade laufender Fokus-Zeit. */
function minutenInklFokus(item) {
  let min = item.istMinuten || 0;
  if (fokus && fokus.itemId === item.id) min += laufendeSek() / 60;
  return min;
}

/* Laufende Zeit ins Item übernehmen (bei Pause/Wechsel/Abschluss). */
function fokusZeitEinbuchen() {
  if (!fokus || !fokus.laeuft) return;
  const item = fokusItem();
  const sek = laufendeSek();
  if (item) { item.istMinuten = (item.istMinuten || 0) + sek / 60; Store.speichereItems(); }
  fokus.sessionSek += sek;
  fokus.laeuft = false;
  fokusSpeichern();
}

function fokusStarten(id) {
  if (fokus && fokus.itemId !== id) fokusZeitEinbuchen();   // alten Fokus pausieren
  if (!fokus || fokus.itemId !== id) fokus = { itemId: id, laeuft: false, startMs: 0, sessionSek: 0 };
  fokus.laeuft = true;
  fokus.startMs = Date.now();
  const item = Store.findeItem(id);
  if (item && item.status === 'offen') { item.status = 'in_arbeit'; Store.speichereItems(); }
  fokusSpeichern();
  renderAlles();
}

/* EIN Toggle (4.1): läuft → pausieren, pausiert → weiterlaufen. */
function fokusToggle() {
  if (!fokus) { sheetTachoOeffnen(); return; }
  if (fokus.laeuft) {
    fokusZeitEinbuchen();
  } else {
    fokus.laeuft = true;
    fokus.startMs = Date.now();
    fokusSpeichern();
  }
  renderAlles();
}

function fokusBeenden() {
  fokusZeitEinbuchen();
  fokus = null;
  fokusSpeichern();
}

/* ════════════════════════════════════════════════════════════════════
   Erledigen (7.2: NUR übers Häkchen-Feld) — friert Punkte ein (3.5).
   ════════════════════════════════════════════════════════════════════ */
function abhaken(id) {
  const item = Store.findeItem(id);
  if (!item) return;
  if (item.status === 'erledigt') {
    // Versehen rückgängig: auftauen, Log-Eintrag entfernen, Rhythmus zurück
    const log = Store.tag.log.find(l => l.itemId === id && !l.uaId);
    if (log && log.zuletztErledigtVorher !== undefined) item.zuletztErledigt = log.zuletztErledigtVorher;
    if (item.typ === 'routine') item.routineStreak = Math.max(0, (item.routineStreak || 0) - 1);
    item.status = item.istMinuten > 0 ? 'in_arbeit' : 'offen';
    Store.tag.log = Store.tag.log.filter(l => !(l.itemId === id && !l.uaId));
  } else {
    if (fokus && fokus.itemId === id) fokusBeenden();
    item.status = 'erledigt';
    // Rhythmus-Routine (3.4, NUR Privat): früher dran = Bonus,
    // überfällig = Malus je Tag; Stichtag = zuletztErledigt + Rhythmus.
    let rhythmusDelta = 0;
    // Unteraufgaben-Gutschriften sind schon gebucht → Hauptaufgabe = Rest
    const gebucht = (item.unteraufgaben || []).reduce((s, u) => s + (u.gebuchtePunkte || 0), 0);
    const logEintrag = {
      itemId: id, titel: item.titel, domain: item.domain,
      bereich: item.bereich || null,
      punkte: Math.max(0, punkteBeiMinuten(item, item.istMinuten) - gebucht),
      zeit: new Date().toISOString()
    };
    if (item.typ === 'routine') {
      // Bonus/Malus nach 3.4 gilt NUR Privat; Rhythmus-Neustart + Streak für alle
      if (item.domain === 'privat' && item.rhythmusTage > 0 && item.zuletztErledigt) {
        const diffTage = routineUeberfaelligTage(item);
        if (diffTage < 0)      rhythmusDelta = Store.settings.rhythmusFrueherBonus;
        else if (diffTage > 0) rhythmusDelta = Store.settings.rhythmusVerpasstProTag * diffTage;
      }
      logEintrag.zuletztErledigtVorher = item.zuletztErledigt;
      item.zuletztErledigt = heuteIso();
      item.routineStreak = (item.routineStreak || 0) + 1;   // routineneigene Serie
      item.streakGebrochen = false;
    }
    logEintrag.rhythmusDelta = rhythmusDelta;
    logEintrag.punkte += rhythmusDelta;
    Store.tag.log.push(logEintrag);
  }
  gesamtpunkteAktualisieren();
  Store.speichereItems();
  Store.speichereTag();
  renderAlles();
}

function counterTick(id) {
  const item = Store.findeItem(id);
  if (!item || item.typ !== 'counter') return;
  const vorher = counterPunkte(item);
  item.tickStandHeute = (item.tickStandHeute || 0) + 1;
  Store.tag.tickLog = Store.tag.tickLog || [];
  Store.tag.tickLog.push({
    itemId: id, domain: item.domain, bereich: item.bereich || null,
    punkte: counterPunkte(item) - vorher, zeit: new Date().toISOString()
  });
  gesamtpunkteAktualisieren();
  Store.speichereItems();
  Store.speichereTag();
  renderAlles();
}

/* Gesamtzahl heute (3.5): eingefrorene Log-Punkte + live Counter-Stände. */
function gesamtpunkteAktualisieren() {
  const log = Store.tag.log.reduce((s, l) => s + l.punkte, 0);
  const counter = Store.items.filter(i => i.typ === 'counter')
    .reduce((s, i) => s + counterPunkte(i), 0);
  Store.tag.gesamtpunkteHeute = log + counter + (Store.tag.streakBonusHeute || 0);
}

/* ════════════════════════════════════════════════════════════════════
   Tagesabschluss-Engine (1.2 / 3.4 / 6.3) — der geführte Wizard-Screen
   folgt in einem späteren Schritt, die Regeln leben hier:
   - Plan-/Schiebe-Malus: im Stream geplant (oder heute rausgezogen),
     nicht erledigt → ein weiterer geschobener Tag (5.3)
   - Streak: Tag mit erledigten Punkten verlängert (+Bonus), sonst Abriss
   - Wohlstand_neu = Wohlstand_alt + Tages-Gesamtpunkte (kumulativ)
   ════════════════════════════════════════════════════════════════════ */
function tagAbschliessen() {
  if (Store.tag.abgeschlossen) return null;
  fokusZeitEinbuchen();   // laufenden Fokus pausieren, Zeit sichern
  // Fällige, nicht erledigte Routinen: Auto-Abzug + Streak-Bruch (20.07.2026)
  Store.items.forEach(i => {
    if (i.typ !== 'routine' || !routineFaellig(i)) return;
    Store.tag.log.push({
      itemId: i.id, titel: i.titel + ' — verpasst', domain: i.domain,
      bereich: i.bereich || null, punkte: Store.settings.rhythmusVerpasstProTag,
      zeit: new Date().toISOString(), routineVerpasst: true
    });
    i.routineStreak = 0;
    i.streakGebrochen = true;
  });
  // Counter: Tagesstand einfrieren und zurücksetzen (starten morgens neu)
  Store.items.forEach(i => {
    if (i.typ !== 'counter' || !(i.tickStandHeute > 0)) return;
    Store.tag.log.push({
      itemId: i.id, titel: i.titel + ' (Counter)', domain: i.domain,
      bereich: i.bereich || null, punkte: counterPunkte(i),
      zeit: new Date().toISOString(), counterAbschluss: true
    });
    i.tickStandHeute = 0;
  });
  Store.items.forEach(i => {
    if (i.status !== 'erledigt' && (i.streamSlot != null || i.heuteRausgezogen)) {
      i.tageGeschoben = (i.tageGeschoben || 0) + 1;
    }
    delete i.heuteRausgezogen;
  });
  gesamtpunkteAktualisieren();
  if (Store.tag.gesamtpunkteHeute > 0) {
    Store.tag.streak += 1;
    Store.tag.streakBonusHeute = Store.settings.streakBonus;   // 3.4, beide Domänen
    gesamtpunkteAktualisieren();
  } else {
    Store.tag.streak = 0;
  }
  Store.tag.wohlstandStand += Store.tag.gesamtpunkteHeute;     // 6.3: nie zurückgesetzt
  Store.tag.abgeschlossen = true;
  Store.speichereAlles();
  rollFreischaltungen(true);   // Wohlstand ist gewachsen → heutige Würfel-Chance (6.3)
  renderAlles();
  return Store.baueExport('tagesabschluss');
}

/* ════════════════════════════════════════════════════════════════════
   Rendering
   ════════════════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);

function minAlsUhrzeit(min) {
  return String(Math.floor(min / 60)).padStart(2, '0') + ':' + String(min % 60).padStart(2, '0');
}
function uhrzeitAlsMin(str) {
  if (!str) return null;
  const [h, m] = str.split(':').map(Number);
  return (isNaN(h) || isNaN(m)) ? null : h * 60 + m;
}
function fmtPunkte(p) {
  return (Math.round(p * 10) / 10).toLocaleString('de-DE', { maximumFractionDigits: 1 });
}
function fmtDauer(sekGesamt) {
  const s = Math.floor(sekGesamt);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), r = s % 60;
  return (h > 0 ? h + ':' + String(m).padStart(2, '0') : String(m).padStart(2, '0')) + ':' + String(r).padStart(2, '0');
}

const TYP_ICON = { aufgabe: '📋', routine: '🔁', counter: '🔢' };

function karteHtml(item, imStream) {
  // Farbcodierung: Routine lila, Counter grün/rot nach Stand, sonst Domäne
  let farbe = item.domain;
  if (item.typ === 'routine') farbe = 'routine';
  if (item.typ === 'counter') {
    farbe = ((item.tickStandHeute || 0) > item.tickSchwelle && item.punkteJeTickNachSchwelle < 0)
      ? 'cschlecht' : 'cgut';
  }
  const klassen = ['karte', farbe];
  if (item.status === 'erledigt') klassen.push('erledigt');
  if (fokus && fokus.itemId === item.id) klassen.push('fokussiert');
  const pp = (fokus && fokus.itemId === item.id && fokus.laeuft) ? '⏸' : '▶';
  const meta = [];
  meta.push('<span>' + TYP_ICON[item.typ] + '</span>');
  meta.push('<span class="pkt">' + fmtPunkte(anzeigePunkte(item)) + ' P</span>');
  if (item.streamSlot != null) meta.push('<span class="zeit">' + minAlsUhrzeit(item.streamSlot) + '</span>');
  if (item.aufwandGeplantMin > 0) meta.push('<span class="zeit">' + Math.round(minutenInklFokus(item)) + '/' + item.aufwandGeplantMin + ' min</span>');
  else if (minutenInklFokus(item) >= 1) meta.push('<span class="zeit">' + Math.round(minutenInklFokus(item)) + ' min</span>');
  if (item.deadline) {
    const t = tageBisDeadline(item.deadline);
    meta.push('<span class="' + (t < 0 ? 'ueberfaellig' : '') + '">📅 ' + (t === 0 ? 'heute' : (t < 0 ? Math.abs(t) + ' Tage über' : 'in ' + t + ' T')) + '</span>');
  }
  if (item.unteraufgaben && item.unteraufgaben.length) {
    meta.push('<span>☑ ' + item.unteraufgaben.filter(u => u.erledigt).length + '/' + item.unteraufgaben.length + '</span>');
  }
  if (item.tageGeschoben > 0) meta.push('<span style="color:var(--warn);font-weight:700">⏩ ' + item.tageGeschoben + '× geschoben</span>');
  if (item.typ === 'routine' && item.rhythmusTage > 0 && item.zuletztErledigt && item.status !== 'erledigt') {
    const f = new Date(item.zuletztErledigt + 'T00:00:00');
    f.setDate(f.getDate() + item.rhythmusTage);
    const diff = Math.round((f - new Date(heuteIso() + 'T00:00:00')) / 86400000);
    meta.push('<span class="' + (diff < 0 ? 'ueberfaellig' : '') + '">⏳ '
      + (diff === 0 ? 'heute fällig' : (diff < 0 ? Math.abs(diff) + ' T überfällig' : 'fällig in ' + diff + ' T')) + '</span>');
  }
  if (item.prioritaet === 'muss') meta.push('<span style="color:var(--bad);font-weight:700">MUSS</span>');
  if (item.prioritaet === 'idee') meta.push('<span>Idee</span>');
  if (item.projekt) meta.push('<span>' + escapeHtml(item.projekt) + '</span>');
  if (item.istAnker) meta.push('<span>📌 Anker</span>');

  // Rechtes Bedien-Feld: Häkchen — bei Countern das Tick-Feld (+1)

    ? '<button class="kcheck" data-aktion="tick" aria-label="Tick +1"><span class="tickzahl">+' + (item.tickStandHeute || 0) + '</span></button>'
    : '<button class="kcheck" data-aktion="check" aria-label="Abhaken"><span class="box">' + (item.status === 'erledigt' ? '✓' : '') + '</span></button>';

  return '<article class="' + klassen.join(' ') + '" data-id="' + item.id + '">'
    + '<button class="kpp" data-aktion="pp" aria-label="Fokus Play/Pause">' + pp + '</button>'
    + '<div class="kmain" data-aktion="detail">'
    +   '<div class="ktitel">' + escapeHtml(item.titel || '(ohne Titel)') + '</div>'
    +   '<div class="kmeta">' + meta.join('') + '</div>'
    + '</div>'

    + '</article>';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

/* Stream chronologisch nach Slot (5.1). Warteschlange = nur Aufgaben —

function renderStream() {
  const stream = Store.items.filter(i => i.streamSlot != null && i.typ !== 'counter')
    .sort((a, b) => a.streamSlot - b.streamSlot);
  const queue = Store.items.filter(i => i.typ === 'aufgabe' && i.streamSlot == null && i.status !== 'erledigt')

    ? stream.map(i => karteHtml(i, true)).join('')
    : '<div class="leer">Noch nichts im Stream — Items aus der Warteschlange über die Detailansicht einplanen.</div>';
  $('queueListe').innerHTML = (queue.length + queueFertig.length)
    ? queue.concat(queueFertig).map(i => karteHtml(i, false)).join('')
    : '<div class="leer">Warteschlange leer. Über die Fokus-Leiste kannst du sofort einen Instant-Fokus starten.</div>';

  $('anzQueue').textContent = queue.length ? queue.length + ' Items' : '';

}

/* Routinen in klappbaren Abschnitts-Feldern unter dem Stream. */
const ABSCHNITTE = [['morgen', '🌅 Morgen'], ['tagsueber', '☀️ Tagsüber'], ['abend', '🌙 Abends']];

function routineKarteHtml(r) {
  const ausgesetzt = r.ausgesetztAm === heuteIso();
  const faellig = routineFaellig(r);
  const ueber = routineUeberfaelligTage(r);
  const klassen = ['karte', 'routine', 'spalte'];
  if (r.status === 'erledigt') klassen.push('erledigt');
  if (ausgesetzt) klassen.push('ausgesetzt');
  if (fokus && fokus.itemId === r.id) klassen.push('fokussiert');
  const pp = (fokus && fokus.itemId === r.id && fokus.laeuft) ? '⏸' : '▶';

  const meta = [];
  meta.push('<span style="color:var(--warn);font-weight:700">🔥 ' + (r.routineStreak || 0) + '</span>');
  meta.push('<span>' + rhythmusLabel(r.rhythmusTage) + '</span>');
  meta.push('<span class="pkt">+' + fmtPunkte(anzeigePunkte(r)) + ' P</span>');
  meta.push('<span style="color:var(--bad)">' + fmtPunkte(Store.settings.rhythmusVerpasstProTag) + ' P verpasst</span>');
  if (r.status === 'erledigt') meta.push('<span style="color:var(--ok);font-weight:700">✓ heute</span>');
  else if (ausgesetzt) meta.push('<span>⏭ ausgesetzt</span>');
  else if (faellig && ueber > 0) meta.push('<span class="ueberfaellig">' + ueber + ' T überfällig</span>');
  else if (faellig) meta.push('<span style="color:var(--warn);font-weight:700">heute fällig</span>');
  else meta.push('<span>wieder in ' + (-ueber) + ' T</span>');
  if (r.streakGebrochen && r.status !== 'erledigt') meta.push('<span class="ueberfaellig">💔 Streak gebrochen</span>');

  const uas = r.unteraufgaben || [];
  const uamini = uas.length
    ? '<div class="uamini">' + uas.map(u =>
        '<div class="umzeile' + (u.erledigt ? ' fertig' : '') + '">'
        + '<button class="umbox" data-aktion="uatoggle" data-ua="' + u.id + '" aria-label="Unteraufgabe"><span>' + (u.erledigt ? '✓' : '') + '</span></button>'
        + '<span class="umtitel">' + escapeHtml(u.titel) + '</span>'
        + '</div>').join('') + '</div>'
    : '';
  const footer = (faellig && !ausgesetzt && r.status !== 'erledigt')
    ? '<div class="kfooter">'
      + '<button data-aktion="aussetzen" data-abzug="0">⏭ Aussetzen</button>'
      + '<button data-aktion="aussetzen" data-abzug="1">⏭ Aussetzen (' + fmtPunkte(Store.settings.rhythmusVerpasstProTag) + ' P)</button>'
      + '</div>'
    : '';

  return '<article class="' + klassen.join(' ') + '" data-id="' + r.id + '">'
    + '<div class="krow">'
    + '<button class="kpp" data-aktion="pp" aria-label="Fokus Play/Pause">' + pp + '</button>'
    + '<div class="kmain" data-aktion="detail">'
    + '<div class="ktitel">' + escapeHtml(r.titel || '(ohne Titel)') + '</div>'
    + '<div class="kmeta">' + meta.join('') + '</div>'
    + '</div>'
    + '<button class="kcheck" data-aktion="check" aria-label="Abhaken"><span class="box">' + (r.status === 'erledigt' ? '✓' : '') + '</span></button>'
    + '<span class="kgriff" style="visibility:hidden">⠿</span>'
    + '</div>'
    + uamini + footer
    + '</article>';
}

function renderRoutinenFelder() {
  const routinen = Store.items.filter(i => i.typ === 'routine');
  if (!routinen.length) { $('routinenFelder').innerHTML = ''; return; }
  $('routinenFelder').innerHTML = ABSCHNITTE.map(([key, label]) => {
    const liste = routinen.filter(r => (r.tagesabschnitt || 'tagsueber') === key)
      .sort((a, b) => (routineFaellig(b) ? 1 : 0) - (routineFaellig(a) ? 1 : 0));
    if (!liste.length) return '';
    const offen = liste.filter(r => routineFaellig(r)).length;
    return '<div class="tacc' + (felderOffen[key] ? ' offen' : '') + '" data-feld="' + key + '">'
      + '<div class="tacckopf">' + label + ' <span class="anz">'
      + (offen ? offen + ' fällig' : '✓') + '</span><span class="pfeil">▾</span></div>'
      + '<div class="taccinhalt">' + liste.map(routineKarteHtml).join('') + '</div></div>';
  }).join('');
}

/* Pace-Leiste (4.4/3.6): dünner Zeitstrich + Punkte/Std ist vs. Soll. */
function renderPace() {
  const s = Store.settings;
  const start = uhrzeitAlsMin(s.arbeitstagStart), ende = uhrzeitAlsMin(s.arbeitstagEnde);
  const jetzt = new Date();
  const jetztMin = jetzt.getHours() * 60 + jetzt.getMinutes();
  const spanne = Math.max(1, ende - start);
  const anteil = Math.min(1, Math.max(0, (jetztMin - start) / spanne));

  // Tagesziel = Summe der Punkte aller im Stream platzierten Items (3.6)
  const ziel = Store.items.filter(i => i.streamSlot != null)
    .reduce((sum, i) => sum + anzeigePunkte(i), 0);
  const sollProStd = ziel / (spanne / 60);
  const vergangeneStd = Math.max(0.1, (jetztMin - start) / 60);
  gesamtpunkteAktualisieren();
  const istProStd = anteil > 0 ? Store.tag.gesamtpunkteHeute / vergangeneStd : 0;
  const imSoll = istProStd >= sollProStd;

  $('pace').innerHTML =
    '<div class="strich">'
    + '<div class="fuell" style="width:' + (anteil * 100) + '%"></div>'
    + '<div class="jetzt" style="left:' + (anteil * 100) + '%"></div>'
    + '</div>'
    + '<div class="zeile">'
    + '<span class="ist ' + (ziel > 0 ? (imSoll ? 'gut' : 'schlecht') : '') + '">'
    +   fmtPunkte(istProStd) + ' P/Std</span>'
    + '<span>Soll ' + fmtPunkte(sollProStd) + ' P/Std</span>'
    + '<span>' + fmtPunkte(Store.tag.gesamtpunkteHeute) + ' P heute</span>'
    + '<span>' + s.arbeitstagStart + '–' + s.arbeitstagEnde + '</span>'
    + '</div>';
}

/* ════════════════════════════════════════════════════════════════════
   Sheet-Grundgerüst (7.2): von unten, schließen NUR per Wisch-nach-unten
   oder ✕ — ein Muster überall; Sheets ersetzen sich, nie verschachtelt.
   ════════════════════════════════════════════════════════════════════ */
let sheetOffenFuer = null;   // 'detail:<id>' | 'tacho' | null

function sheetOeffnen(titel, inhaltHtml, key) {
  $('sheetTitel').textContent = titel;
  $('sheetInhalt').innerHTML = inhaltHtml;
  $('overlay').classList.add('on');
  $('sheet').classList.add('on');
  $('sheet').style.transform = '';
  $('sheetInhalt').scrollTop = 0;
  sheetOffenFuer = key;
}

function sheetSchliessen() {
  $('overlay').classList.remove('on');
  $('sheet').classList.remove('on');
  sheetOffenFuer = null;
  renderAlles();
}

$('sheetX').addEventListener('click', sheetSchliessen);

/* Wisch-nach-unten am Sheet-Kopf (7.2) */
(function () {
  let startY = null, delta = 0;
  const kopf = $('sheetKopf'), sheet = $('sheet');
  kopf.addEventListener('touchstart', e => { startY = e.touches[0].clientY; delta = 0; }, { passive: true });
  kopf.addEventListener('touchmove', e => {
    if (startY == null) return;
    delta = Math.max(0, e.touches[0].clientY - startY);
    sheet.style.transform = 'translateY(' + delta + 'px)';
  }, { passive: true });
  kopf.addEventListener('touchend', () => {
    if (delta > 80) sheetSchliessen();
    else sheet.style.transform = '';
    startY = null; delta = 0;
  });
})();

         +  '<div class="feld"><label>P/Tick bis Schwelle</label><input id="dVor" type="number" step="0.5" value="' + item.punkteJeTickVorSchwelle + '"></div>'
         +  '<div class="feld"><label>P/Tick danach</label><input id="dNach" type="number" step="0.5" value="' + item.punkteJeTickNachSchwelle + '"></div>'
         + '</div>';
  }
  if (item.typ === 'routine') {
    const r = item.rhythmusTage || 1;
    html += '<div class="feld"><label>Tagesabschnitt</label>'
         + segHtml('tagesabschnitt', ['morgen', 'tagsueber', 'abend'], item.tagesabschnitt || 'tagsueber', ['🌅 Morgen', '☀️ Tagsüber', '🌙 Abends']) + '</div>';
    html += '<div class="feld"><label>Rhythmus — Schnellauswahl</label>'
         + segHtml('rhythmusSchnell', ['1', '2', '3', '7', '14', '30'],
             ['1', '2', '3', '7', '14', '30'].includes(String(r)) ? String(r) : '',
             ['Tgl.', '2 T', '3 T', 'Wo.', '2 Wo.', 'Mon.']) + '</div>';
    html += '<div class="zweispaltig">'
         + '<div class="feld"><label>Eigener Rhythmus (Tage, 1–31)</label><input id="dRhythmus" type="number" inputmode="numeric" min="1" max="31" value="' + r + '"></div>'
         + '<div class="feld"><label>Zuletzt erledigt</label><input id="dZuletzt" type="date" value="' + (item.zuletztErledigt || '') + '"></div>'
         + '</div>'
         + '<div class="zweispaltig">'
         + '<div class="feld"><label>Routine-Streak</label><div class="wizinfo" style="margin:0">🔥 ' + (item.routineStreak || 0) + (item.streakGebrochen ? ' · 💔 zuletzt gebrochen' : '') + '</div></div>'
         + '<div class="feld"><label>Abzug bei Verpassen</label><div class="wizinfo" style="margin:0">' + fmtPunkte(Store.settings.rhythmusVerpasstProTag) + ' P</div></div>'
         + '</div>';
  }
  html += '<div class="zweispaltig">'
       +  '<div class="feld"><label>Deadline</label><input id="dDeadline" type="date" value="' + (item.deadline || '') + '"></div>'
       +  '<div class="feld"><label>Geplant (min)</label><input id="dGeplant" type="number" inputmode="numeric" value="' + (item.aufwandGeplantMin || 0) + '"></div>'
       + '</div>';
  html += '<div class="zweispaltig">'
       +  '<div class="feld"><label>Im Stream ab (leer = Warteschlange)</label><input id="dSlot" type="time" value="' + (item.streamSlot != null ? minAlsUhrzeit(item.streamSlot) : '') + '"></div>'
       +  '<div class="feld"><label>Ist-Minuten</label><input id="dIst" type="number" inputmode="numeric" value="' + Math.round(item.istMinuten || 0) + '"></div>'
       + '</div>';
  html += '<div class="feld"><label>Projekt</label><input id="dProjekt" type="text" value="' + escapeHtml(item.projekt || '') + '"></div>';
  // bereich: READ-ONLY (Sync-Vertrag) — kommt nur aus dem Import, nie editierbar
  if (item.bereich) {
    html += '<div class="feld"><label>Bereich (aus dem letzten Sync)</label>'
         + '<div class="wizinfo" style="margin:0">' + escapeHtml(item.bereich) + '</div></div>';
  }
  html += '<div class="feld"><label>Notiz (→ Airtable-Notiz)</label><textarea id="dNotiz">' + escapeHtml(item.notiz || '') + '</textarea></div>';
  html += '<div class="feld"><label>Kommentar für Claude (nächster Sync)</label><textarea id="dKommentar">' + escapeHtml(item.kommentarFuerClaude || '') + '</textarea></div>';

  sheetOeffnen(item.titel || 'Neues Item', html, 'detail:' + id);
  detailVerdrahten(item);
}

/* Live-Anzeige Punkte/Min in der editierbaren Karte (4.2). */
function dPpmAktualisieren(item) {
  const el = $('dPpm');
  if (!el) return;
  if (item.typ === 'counter') { el.textContent = ''; return; }
  const min = minutenInklFokus(item);
  el.textContent = min > 0.2 ? '· ' + fmtPunkte(punkteBeiMinuten(item, min) / min) + ' P/min' : '';
}

function detailVerdrahten(item) {
  const inhalt = $('sheetInhalt');
  const speichernUndAktualisieren = () => {
    Store.speichereItems();
    const el = $('dPunkte');
    if (el) el.textContent = fmtPunkte(anzeigePunkte(item)) + ' P';
    dPpmAktualisieren(item);
    $('sheetTitel').textContent = item.titel || 'Neues Item';
  };
  dPpmAktualisieren(item);

  const bind = (id, fn) => { const el = $(id); if (el) el.addEventListener('input', () => { fn(el); speichernUndAktualisieren(); }); };
  bind('dTitel',    el => item.titel = el.value);
  bind('dDeadline', el => item.deadline = el.value || null);
  bind('dGeplant',  el => item.aufwandGeplantMin = Number(el.value) || 0);
  bind('dIst',      el => item.istMinuten = Number(el.value) || 0);
  bind('dSlot',     el => {
    const neu = uhrzeitAlsMin(el.value);
    // Rausziehen aus dem Stream merken → Schiebe-Malus beim Tagesabschluss (5.3)
    if (item.streamSlot != null && neu == null) item.heuteRausgezogen = true;
    item.streamSlot = neu;
  });
  bind('dRhythmus', el => {
    item.rhythmusTage = Math.min(31, Math.max(1, Number(el.value) || 1));
    // Schnellauswahl-Markierung nachziehen
    document.querySelectorAll('[data-seg="rhythmusSchnell"] button').forEach(b =>
      b.classList.toggle('on', b.dataset.wert === String(item.rhythmusTage)));
  });
  bind('dZuletzt',  el => item.zuletztErledigt = el.value || null);
  bind('dProjekt',  el => item.projekt = el.value || null);
  bind('dNotiz',    el => item.notiz = el.value);
  bind('dKommentar', el => item.kommentarFuerClaude = el.value);
  bind('dSchwelle', el => item.tickSchwelle = Number(el.value) || 0);
  bind('dTickstand', el => { item.tickStandHeute = Number(el.value) || 0; gesamtpunkteAktualisieren(); Store.speichereTag(); });
  bind('dVor',      el => item.punkteJeTickVorSchwelle = Number(el.value) || 0);
  bind('dNach',     el => item.punkteJeTickNachSchwelle = Number(el.value) || 0);

  // Schieberegler
  inhalt.querySelectorAll('.regler').forEach(reg => {
    const feld = reg.dataset.regler;
    const range = reg.querySelector('input');
    range.addEventListener('input', () => {
      const stufen = REGLER_DEFS[feld].stufen;
      item[feld] = stufen[Number(range.value)];
      reg.querySelectorAll('.stufen span').forEach((sp, i) =>
        sp.classList.toggle('on', i === Number(range.value)));
      speichernUndAktualisieren();
    });
  });

  // Segmente
  inhalt.querySelectorAll('.seg').forEach(seg => {
    const feld = seg.dataset.seg;
    seg.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        const wert = btn.dataset.wert;
        if (feld === 'geldImpact') item.geldImpact = wert || null;
        else if (feld === 'rhythmusSchnell') {
          // Schnellauswahl setzt den Rhythmus und spiegelt ihn ins Eingabefeld
          item.rhythmusTage = Number(wert) || 1;
          const inp = $('dRhythmus');
          if (inp) inp.value = item.rhythmusTage;
        }
        else if (feld === 'typ') {
          item.typ = wert;
          if (wert === 'counter') Object.assign(item, neuesItem({ ...item }));
        }
        else item[feld] = wert;
        if (feld === 'domain' && wert !== 'dfm') item.geldImpact = null;
        Store.speichereItems();
        // Struktur kann sich ändern (Geld-Impact/Counter-Felder) → neu aufbauen
        if (feld === 'domain' || feld === 'typ') sheetDetailOeffnen(item.id);
        else {
          seg.querySelectorAll('button').forEach(b => b.classList.toggle('on', b === btn));
          const el = $('dPunkte');
          if (el) el.textContent = fmtPunkte(anzeigePunkte(item)) + ' P';
        }
      });
    });
  });
}

/* ════════════════════════════════════════════════════════════════════
   Fokus-Tacho 2.0 (4.2 + Redesign 20.07.2026):
   Renn-Ring (Timer vs. Unteraufgaben-Fortschritt) mit Avatar in der
   Mitte, Ampel-Färbung (<80% grün · 80–110% gelb · danach rot, dreht
   als neue Runde weiter), Live-Upgrade-Leiste zur nächsten Avatar-
   Stufe, Unteraufgaben-Checkliste, Bewertungs-Regler, Claude-Kommentar
   und Task-Switcher. Alles tickt sekündlich live.
   ════════════════════════════════════════════════════════════════════ */
const RING_C = 2 * Math.PI * 58;    // Umfang Timer-Ring
const RING_CP = 2 * Math.PI * 48;   // Umfang Fortschritts-Ring

function uaZeileHtml(u, i, zeiten) {
  return '<div class="uareihe' + (u.erledigt ? ' fertig' : '') + '" data-ua="' + u.id + '">'
    + '<button class="uacheck" data-uakt="toggle" aria-label="Unteraufgabe abhaken"><span class="box">' + (u.erledigt ? '✓' : '') + '</span></button>'
    + '<span class="uatitel">' + escapeHtml(u.titel) + '</span>'
    + (u.erledigt
      ? '<span class="uapunkte">+' + fmtPunkte(u.gebuchtePunkte || 0) + ' P</span>'
      : '<input class="uamin" data-uakt="min" type="number" inputmode="numeric" placeholder="' + Math.round(zeiten[i] || 0) + '" value="' + (u.geplantMin || '') + '" title="Eigene Minuten (leer = automatisch)">')
    + '<button class="uax" data-uakt="loeschen" aria-label="Unteraufgabe löschen">✕</button>'
    + '</div>';
}

    && (!item || i.id !== item.id));
  kandidaten.sort((a, b) => anzeigePunkte(b) - anzeigePunkte(a));
