<body>

<!-- Fokus-Leiste: kein Tab, fixer Layer über allen drei Tabs (4.1/7.1).
     Play/Pause = EIN Toggle-Button. Ohne aktiven Fokus öffnet jeder Tap
     den Fokus-Tacho (4.2). -->
<!-- Statusleiste (21.07.2026): immer sichtbar, Tap = Belohnungs-/Statistikseite,
     Tap auf den Akku = Akku anpassen -->
<header id="statusbar">
  <div class="inner">
    <button class="sakku" id="sAkku" aria-label="Akku anpassen">🔋<span id="sAkkuPct">–%</span></button>
    <div class="skonto">
      <div class="skzeile"><span id="sPunkte">0 P</span><span id="sZiel"></span></div>
      <div class="skbar"><i id="sBar" style="width:0"></i></div>
    </div>
    <div class="space"><span id="sPfeil">→</span><span id="sPaceZahl"></span></div>
  </div>
</header>

<header id="fokusbar">
  <div class="inner">
    <button class="pp" id="ppBtn" aria-label="Fokus starten/pausieren">▶</button>
    <div class="mid" id="fokusMid">
      <div class="title idle" id="fokusTitle">Kein Fokus aktiv — tippen für Auswahl</div>
      <div class="sub" id="fokusSub" hidden>
        <span class="timer" id="fokusTimer">00:00</span>
        <span class="ppm" id="fokusPpm"></span>
      </div>
    </div>
  </div>
</header>

<main>
  <section class="view on" id="view-stream">
    <div id="tagAktionen"></div>
    <div id="pace"></div>
    <div id="domFilterStream"></div>
    <h2 class="sechead">Tagesstream <span class="anz" id="anzStream"></span></h2>
    <div id="streamListe"></div>
    <div id="counterFeld"></div>
    <div id="routinenFelder"></div>
    <h2 class="sechead" id="queueHead">Warteschlange <span class="anz" id="anzQueue"></span></h2>
    <div id="queueListe"></div>
  </section>
  <section class="view" id="view-belohnung"></section>
  <section class="view" id="view-einstellungen"></section>
</main>

<button id="fab" aria-label="Neues Item anlegen">+</button>

<nav id="tabbar">
  <button class="on" data-view="stream"><span class="ic">🕐</span>Stream</button>
  <button data-view="belohnung"><span class="ic">🏆</span>Belohnung</button>
  <button data-view="einstellungen"><span class="ic">⚙️</span>Einstellungen</button>
</nav>

<!-- Ein Sheet-Container für Task-Karte (4.3) und Fokus-Tacho (4.2):
     nie verschachtelt (7.2) — ein neues Sheet ersetzt das offene. -->
<div id="conf"></div>
<div class="toast" id="toast"></div>
<div id="overlay"></div>
<div id="sheet" role="dialog" aria-modal="true">
  <div class="kopf" id="sheetKopf">
    <div class="grabber"></div>
    <div class="kopfzeile">
      <h2 id="sheetTitel"></h2>
      <button class="schliessen" id="sheetX" aria-label="Schließen">✕</button>
    </div>
  </div>
  <div class="inhalt" id="sheetInhalt"></div>
</div>

<script>
'use strict';
const APP_VERSION = '0.27.0';

/* ════════════════════════════════════════════════════════════════════
   Datenschicht (Spez. Abschnitt 2)
   Zwei strikt getrennte Domänen ('dfm' | 'privat') — die Trennung lebt
   im domain-Feld jedes Items, nie in vermischten Speichern/Feldern.
   Die App hat keinerlei Airtable-/Internet-Zugriff: rein localStorage,
   Sync ausschließlich über Export-/Import-Pakete (2.4 / 1.2).
   ════════════════════════════════════════════════════════════════════ */
const LS = {
  ITEMS:     'fokus2.items',
  TAG:       'fokus2.tag',
  SETTINGS:  'fokus2.settings',
  FOKUS:     'fokus2.fokus',
  BELOHNUNG: 'fokus2.belohnung',
  HISTORIE:  'fokus2.historie'
};

/* Alle Punkte-Faktoren/Sätze sind Settings, keine Code-Konstanten (3.7).
   Werte hier = Startbelegung laut Spez. 3.1–3.6, über ⚙️ änderbar. */
const DEFAULT_SETTINGS = {
  /* Punktesystem 2.0 (21.07.2026): Basis = Punkte/Stunde + Abhak-Bonus.
     basisProStd × K × E × B ergibt den Auto-Vorschlag je Item. */
  basisProStd: 12,                                            // P/Std bei Faktor 1,0
  abschlussBonusStandard: 100,                                // Einmal-Punkte beim Abhaken (22.07.2026)
  sollPunkteProStd: 0,                                        // 0 = Soll automatisch aus geplanten Aufgaben; >0 überschreibt (22.07.2026)
  akkuProStdStandard: -8,                                     // Akku-%/Std im Fokus (Standard)
  minutenJeEinheit: 5,                                        // (Altsystem, nur Migration)
  komplexitaet: { leicht: 1.0, mittel: 1.5, schwer: 2.0 },    // (Altsystem, nur Migration)
  energie:      { gibt: 0.8, neutral: 1.0, zieht: 1.3 },
  blockade:     { keine: 1.0, leicht: 1.2, mittel: 1.5, stark: 2.0 },
  geldScoreBasis: { hoch: 300, mittel: 200, niedrig: 100 },   // 3.3 — nur DFM
  schiebeMalusProzent: { muss: 20, soll: 10, idee: 0 },       // 3.4 — je Tag geschoben
  planMalusWieSchiebeMalus: true,                             // 3.4 — Plan-Malus folgt Schiebe-Malus
  rhythmusVerpasstProTag: -2,                                 // 3.4 — nur Privat
  rhythmusFrueherBonus: 1,                                    // 3.4 — nur Privat
  streakBonus: 3,                                             // 3.4
  counterDefaults: { tickSchwelle: 3, vorSchwelle: 1, nachSchwelle: -2 },  // 2.2
  arbeitstagStart: '08:00',                                   // Pace-Leiste (3.6/4.4)
  arbeitstagEnde:  '18:00',
  freischaltChanceProzent: 40,                                // 6.3 — tägliche Würfel-Chance
  abschnittMorgenBis: 12,                                     // 3.5 — Morgen bis (Uhr)
  abschnittTagBis: 17,                                        // 3.5 — Tag bis (Uhr), danach Abend
  /* Avatar-Level (Spez-Änderung 20.07.2026): eigene Leiter über die
     Gesamt-Punkte (Wohlstand live), Level-Up sofort bei Schwelle. */
  avatarStufen: [0, 400, 1200, 2500, 4500, 7000, 10000, 14000, 19000, 25000, 32000, 40000],
  /* Statusleiste (21.07.2026): Pace-Pfeil-Zonen in % Abweichung vom Soll */
  pfeilZone1: 5,
  pfeilZone2: 15,
  pfeilZone3: 40,
  /* Shop (Etappe 2): Preis = 4 Std × 7-Tage-Ø-P/Std × Faktor × Kategorie */
  preisFaktor: 1.0
};

function lokaleUuid() {
  return (crypto.randomUUID && crypto.randomUUID()) ||
    'loc-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
}

function heuteIso() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

/* Item-Fabrik: volles Schema aus 2.4, fehlende Felder mit Defaults.
   id = Airtable-Record-ID (DFM) oder lokale UUID (Privat/Instant). */
function neuesItem(felder = {}) {
  const item = Object.assign({
    id: lokaleUuid(),
    domain: 'privat',                 // 'dfm' | 'privat'
    typ: 'aufgabe',                   // 'aufgabe' | 'routine' | 'counter'
    titel: '',
    komplexitaet: 'leicht',           // leicht | mittel | schwer
    energie: 'neutral',               // gibt | neutral | zieht
    blockade: 'keine',                // keine | leicht | mittel | stark
    geldImpact: null,                 // hoch | mittel | niedrig — NUR domain=dfm
    projekt: null,
    bereich: null,                    // Dashboard-Achse 3.5 (Finanzen/Sales/…), Import kann setzen
    deadline: null,                   // 'YYYY-MM-DD'
    aufwandGeplantMin: 0,
    istMinuten: 0,
    prioritaet: 'soll',               // muss | soll | idee
    notiz: '',
    kommentarFuerClaude: '',
    streamSlot: null,                 // Minuten seit 00:00 | null = Warteschlange
    status: 'offen',                  // offen | in_arbeit | erledigt
    istAnker: false,
    ankerBezugId: null,
    /* Schema-Ergänzungen zu 2.4 (für Punkteregeln 3.4 nötig): */
    tageGeschoben: 0,                 // Zähler für Schiebe-/Plan-Malus
    rhythmusTage: null,               // Routine: alle X Tage fällig (null = kein Rhythmus)
    zuletztErledigt: null,            // Routine: 'YYYY-MM-DD' der letzten Erledigung
    /* Unteraufgaben (Tacho 2.0): reisen strukturiert im Sync inkl. stabiler id
       (v0.26.0) — Matching per id, Löschen nur über item.unteraufgabenEntfernt.
       Nie als eigene Airtable-Aufgaben. */
    unteraufgaben: [],                // [{id, titel, erledigt, geplantMin|null, bonusPunkte|null, gebuchtePunkte|null, beschreibung|null}]
    /* Private Tagesstruktur (20.07.2026): */
    tagesabschnitt: 'tagsueber',      // Routine-Feld: morgen | tagsueber | abend
    routineStreak: 0,                 // routineneigene Streak-Serie
    streakGebrochen: false,           // Kennzeichnung nach verpasstem Tag
    ausgesetztAm: null,               // 'YYYY-MM-DD' = heute ausgesetzt (Rhythmus neu)
    /* Wochentage-Rhythmus (21.07.2026): hat Vorrang vor rhythmusTage */
    rhythmusWochentage: [],           // 0=Mo … 6=So; leer = Tages-Rhythmus
    rhythmusWochen: 1,                // jede n-te Woche (1–4)
    rhythmusAnkerWoche: null,         // Wochen-Index als Intervall-Anker
    /* Häufigkeits-Modi (21.07.2026): wochentage | monatstage |
       zufallWoche | zufallMonat | alleNTage (null = automatisch) */
    rhythmusModus: null,
    rhythmusMonatstage: [],           // z. B. [1, 15]
    rhythmusZufallAnzahl: 2,          // n Tage pro Woche/Monat
    rhythmusZufallTage: [],           // gerollte Tage der aktuellen Periode
    rhythmusZufallPeriode: null,      // 'W123' bzw. 'YYYY-MM'
    /* Punktesystem 2.0 (21.07.2026): */
    punkteProStd: null,               // null = Auto aus Einschätzung (K×E×B)
    abschlussBonus: null,             // Einmal-Punkte beim Abhaken (null = aus Geld-Impact); darf negativ sein
    nichtErledigtMalus: null,         // Abzug (positiv eingegeben) beim Tagesabschluss, wenn unerledigt
    akkuProStd: null,                 // Akku-%/Std im Fokus (null = Settings-Standard)
    zeitStufen: null,                 // [{bisMin|null, punkteProStd}] — Stufen-Kurve
    tickStufen: null,                 // Counter: [{bisTick|null, punkteProTick}]
    imStreamAnzeigen: null,           // null → Default: Aufgaben ja, Routinen nein
    nachSyncWeg: false                // erledigte Einmal-Aufgabe: ausgeblendet, beim nächsten Sync löschen (v0.27.0)
  }, felder);
  if (item.typ === 'routine' && item.rhythmusTage == null) item.rhythmusTage = 1;  // Standard: täglich
  if (item.imStreamAnzeigen == null) item.imStreamAnzeigen = item.typ !== 'routine';
  /* Migration Punktesystem 2.0: Kategorie-Strings → stufenlose Faktoren */
  if (typeof item.komplexitaet === 'string') item.komplexitaet = ({ leicht: 1.0, mittel: 1.5, schwer: 2.0 })[item.komplexitaet] || 1.0;
  if (typeof item.energie === 'string')      item.energie = ({ gibt: 0.8, neutral: 1.0, zieht: 1.3 })[item.energie] || 1.0;
  if (typeof item.blockade === 'string')     item.blockade = ({ keine: 1.0, leicht: 1.2, mittel: 1.5, stark: 2.0 })[item.blockade] || 1.0;
  if (item.domain !== 'dfm') item.geldImpact = null;   // Geld-Score existiert nur bei DFM (3.3)
  if (item.typ === 'counter') {
    const cd = (Store.settings && Store.settings.counterDefaults) || DEFAULT_SETTINGS.counterDefaults;
    if (item.tickSchwelle == null)              item.tickSchwelle = cd.tickSchwelle;
    if (item.punkteJeTickVorSchwelle == null)   item.punkteJeTickVorSchwelle = cd.vorSchwelle;
    if (item.punkteJeTickNachSchwelle == null)  item.punkteJeTickNachSchwelle = cd.nachSchwelle;
    if (item.tickStandHeute == null)            item.tickStandHeute = 0;
  }
  return item;
}

/* Tagesstand (2.4): wohlstandStand kumulativ, nie zurückgesetzt (6.3);
   akkuProzent bleibt null, bis der „Tag starten"-Wizard (1.2) ihn setzt. */
function neuerTagesstand(datum, vorheriger) {
  return {
    datum,
    akkuProzent: null,
    gesamtpunkteHeute: 0,
    wohlstandStand: vorheriger ? vorheriger.wohlstandStand : 0,
    streak: vorheriger ? vorheriger.streak : 0,
    log: [],
    akkuVerlauf: [],    // [{min, p}] — Energie-Kurve für die Belohnungsseite (6.1)
    tickLog: [],        // [{itemId, domain, bereich, punkte, zeit}] — Aufschlüsselung 3.5
    fokusSek: 0,        // heute fokussierte Sekunden (Statistik/Shop-Preise)
    istMinutenStart: {} // Ist-Minuten-Stand je Item zu Tagesbeginn → „heute investiert" = Differenz (22.07.2026)
  };
}

/* Referenz für „heute investierte Zeit": aktuellen Ist-Minuten-Stand jeder
   Aufgabe als Tagesbeginn festhalten. Aufgaben laufen über Tage weiter, ihre
   Gesamt-Ist-Zeit bleibt — nur der heutige Zuwachs zählt in die Tages-Fokuszeit.
   Aufruf beim Tageswechsel und bei „Tag starten", NACH dem Routinen-Reset. */
function tagStartMinutenErfassen() {
  const map = {};
  Store.items.forEach(i => { if (i.typ !== 'counter') map[i.id] = i.istMinuten || 0; });
  Store.tag.istMinutenStart = map;
}

/* Heute in ein Item investierte Minuten = aktueller Stand minus Tagesbeginn. */
function heuteInvestiertMin(item) {
  if (item.typ === 'counter') return 0;
  const start = (Store.tag.istMinutenStart || {});
  const ref = start[item.id] != null ? start[item.id] : 0;
  return Math.max(0, minutenInklFokus(item) - ref);
}

const Store = {
  items: [],
  tag: null,
  settings: {},

  ladeAlles() {
    this.settings = settingsZusammenfuehren(lsLese(LS.SETTINGS, {}));
    // Migration: neue Schema-Felder aus App-Updates mit Defaults auffüllen
    this.items    = lsLese(LS.ITEMS, []).map(i => neuesItem(i));
    const tag = lsLese(LS.TAG, null);
    if (tag && tag.datum === heuteIso()) {
      this.tag = tag;
      // Migration (22.07.2026): fehlt die Tagesbeginn-Referenz, jetzt setzen —
      // ab hier zählt nur noch die heute investierte Zeit (der Timer-Zähler
      // fokusSek deckt die bereits heute getrackte Zeit weiterhin ab).
      if (!this.tag.istMinutenStart) tagStartMinutenErfassen();
    } else {
      // Vortag nie abgeschlossen? Spielmechanik nachholen (Maluse, Streak,
      // Wohlstand, Statistik-Snapshot) — der Button ist optional (22.07.2026).
      if (tag && !tag.abgeschlossen) {
        this.tag = tag;
        try { tagesabschlussKern(); } catch (e) {}
      }
      // Tageswechsel: neuer Stand, Wohlstand/Streak werden mitgenommen.
      // (Boni/Mali & Streak-Fortschreibung übernimmt später der
      //  Tagesabschluss-Wizard — hier nur der technische Rollover.)
      this.tag = neuerTagesstand(heuteIso(), tag);
      this.items.forEach(i => {
        if (i.typ === 'counter') i.tickStandHeute = 0;      // Counter starten morgens neu
        if (i.typ === 'routine') {                          // Routinen sind Tages-Items
          if (i.status !== 'offen') i.status = 'offen';
          i.istMinuten = 0;
        }
        // Aufgaben laufen weiter: istMinuten bleibt, nur die heutige Referenz
        // wird unten neu gesetzt (Pascal 22.07.2026).
      });
      tagStartMinutenErfassen();
      this.speichereAlles();
    }
  },

  speichereItems()    { lsSchreibe(LS.ITEMS, this.items); },
  speichereTag()      { lsSchreibe(LS.TAG, this.tag); },
  speichereSettings() { lsSchreibe(LS.SETTINGS, this.settings); },
  speichereAlles()    { this.speichereItems(); this.speichereTag(); this.speichereSettings(); },

  findeItem(id) { return this.items.find(i => i.id === id) || null; },

  /* Anlegen oder per ID aktualisieren — nie Duplikate (1.2). */
  upsertItem(felder) {
    const vorhanden = felder.id ? this.findeItem(felder.id) : null;
    if (vorhanden) {
      Object.assign(vorhanden, felder);
      this.speichereItems();
      return { item: vorhanden, angelegt: false };
    }
    const item = neuesItem(felder);
    this.items.push(item);
    this.speichereItems();
    return { item, angelegt: true };
  },

  entferneItem(id) {
    const n = this.items.length;
    this.items = this.items.filter(i => i.id !== id);
    if (this.items.length !== n) this.speichereItems();
    return this.items.length !== n;
  },

  /* Import-Paket aus dem Claude-Chat (Sync-Vertrag spec/fokus-sync/SKILL.md):
     neu → anlegen, aktualisiert → per id mergen, entfernt → aus der Ansicht
     nehmen. Keine Duplikate, auch wenn ein Item fälschlich unter „neu" steht.
     UUID-Tausch: lokale UUID unter „entfernt" + inhaltsgleiches rec…-Item
     unter „neu" = ERSETZUNG derselben Karte (neue ID, lokaler Zustand wie
     streamSlot/Ist-Minuten/Status bleibt erhalten) — keine Neuanlage. */
  wendeImportAn(paket) {
    const ergebnis = { angelegt: 0, aktualisiert: 0, entfernt: 0, ersetzt: 0, unbekannt: [] };
    const neu = (paket.neu || []).filter(n => n && n.id);
    const aktualisiert = (paket.aktualisiert || []).filter(n => n && n.id);
    const entfernt = paket.entfernt || [];
    const istRec = id => /^rec/i.test(String(id));
    const alsErsatzVerbraucht = new Set();

    // (4) read-only Felder nie aus dem Import übernehmen — verwerfen
    [...neu, ...aktualisiert].forEach(f => { delete f.bereich; delete f.heuteRausgezogen; });

    // (5c) unbekannte Feldnamen sammeln → Tippfehler sichtbar machen
    const bekannt = new Set([
      ...Object.keys(neuesItem()), ...Object.keys(neuesItem({ typ: 'counter' })),
      'unteraufgaben', 'unteraufgabenEntfernt', 'heuteRausgezogen'
    ]);
    const unbekannt = new Set();
    [...neu, ...aktualisiert].forEach(f => Object.keys(f).forEach(k => { if (!bekannt.has(k)) unbekannt.add(k); }));
    ergebnis.unbekannt = [...unbekannt];

    // Unteraufgaben-Patch anwenden (Patch + Löschliste); undefined = unberührt
    const uaAnwenden = (felder, vorhandeneUAs) =>
      (felder.unteraufgaben === undefined && felder.unteraufgabenEntfernt === undefined)
        ? undefined
        : uaMergeFuerImport(vorhandeneUAs, felder.unteraufgaben, felder.unteraufgabenEntfernt);

    for (const altId of entfernt) {
      if (istRec(altId)) continue;                    // nur lokale UUIDs tauschen
      const lokal = this.findeItem(altId);
      if (!lokal) continue;
      const kandidat = neu.find(n => istRec(n.id) && !alsErsatzVerbraucht.has(n.id)
        && (n.domain || 'dfm') === lokal.domain
        && String(n.titel || '').trim().toLowerCase() === String(lokal.titel || '').trim().toLowerCase());
      if (!kandidat) continue;
      alsErsatzVerbraucht.add(kandidat.id);
      const uaNeu = uaAnwenden(kandidat, lokal.unteraufgaben);
      const erhalten = {                              // lokaler Zustand überlebt den Tausch
        streamSlot: lokal.streamSlot, istMinuten: lokal.istMinuten,
        status: lokal.status, tageGeschoben: lokal.tageGeschoben,
        tickStandHeute: lokal.tickStandHeute, zuletztErledigt: lokal.zuletztErledigt,
        unteraufgaben: uaNeu !== undefined ? uaNeu : lokal.unteraufgaben
      };
      delete kandidat.unteraufgabenEntfernt;          // Anweisung, kein Item-Feld
      Object.assign(lokal, kandidat, erhalten);
      idReferenzenUmziehen(altId, lokal.id);
      ergebnis.ersetzt++;
    }

    for (const felder of [...neu.filter(n => !alsErsatzVerbraucht.has(n.id)), ...aktualisiert]) {
      const vorhanden = this.findeItem(felder.id);
      const uaNeu = uaAnwenden(felder, vorhanden ? vorhanden.unteraufgaben : []);
      if (uaNeu !== undefined) felder.unteraufgaben = uaNeu;
      delete felder.unteraufgabenEntfernt;            // Anweisung, kein Item-Feld
      const { angelegt } = this.upsertItem(felder);
      ergebnis[angelegt ? 'angelegt' : 'aktualisiert']++;
    }
    for (const id of entfernt) {
      if (this.entferneItem(id)) ergebnis.entfernt++;
    }
    this.speichereItems();
    return ergebnis;
  },

  /* Export-Paket nach dem Sync-Vertrag (spec/fokus-sync/SKILL.md):
     - bereich ist App-seitig READ-ONLY und wird NIE exportiert
       (der Chat leitet ihn aus dem Projekt ab)
     - projekt bleibt Klartext-Name (nie Airtable-ID)
     - Zeit durchgehend in Minuten; Stunden rechnet nur der Chat
     - komplexitaet/energie/blockade reisen informativ mit */
  baueExport(typ) {
    return {
      typ,                              // 'sync' | 'tagesabschluss'
      appVersion: APP_VERSION,          // (3) Datenvertrags-Kennung für die Gegenseite
      datum: heuteIso(),
      items: JSON.parse(JSON.stringify(this.items)).map(i => {
        delete i.bereich;
        delete i.heuteRausgezogen;      // rein App-interner Tageszustand
        // Unteraufgaben strukturiert (v0.26.0): id reist mit → stabiles Matching
        // per id. beschreibung = Freitext (rund). gebuchtePunkte nur lesend
        // (Import ignoriert es). erledigt bleibt App-Hoheit (Import ignoriert es).
        if (i.unteraufgaben && i.unteraufgaben.length) {
          i.unteraufgaben = i.unteraufgaben.map(u => {
            const o = { id: u.id, titel: u.titel, erledigt: !!u.erledigt };
            if (u.geplantMin != null)     o.geplantMin = u.geplantMin;
            if (u.beschreibung != null)   o.beschreibung = u.beschreibung;
            if (u.gebuchtePunkte != null) o.gebuchtePunkte = Math.round(u.gebuchtePunkte * 10) / 10;
            return o;
          });
        } else {
          delete i.unteraufgaben;       // leeres Array nicht exportieren
        }
        return i;
      }),
      zeitEintraege: this.items
        .filter(i => i.istMinuten > 0 || i.status === 'erledigt')
        .map(i => {
          const log = this.tag.log.find(l => l.itemId === i.id && !l.uaId);
          const e = { itemId: i.id, minuten: Math.round(i.istMinuten), erledigt: i.status === 'erledigt' };
          // Finale (ggf. manuell überschriebene) Werte als Feedback (21.07.2026)
          if (log) {
            e.punkte = Math.round(log.punkte * 10) / 10;
            e.akkuDelta = Math.round(akkuRate(i) * i.istMinuten / 60 + (log.akkuKorrektur || 0));
          }
          return e;
        })
    };
  }
};

/* Unteraufgaben-Patch aus einem Import anwenden (v0.26.0 — Pascal):
   - Matching NUR über die id (kein Titel-Matching mehr).
   - importUAs ist ein PATCH, kein Vollstand: bekannte id → aktualisieren
     (Titel/Minuten/Beschreibung), fehlende oder unbekannte id → neu anlegen
     (id aus dem Import übernehmen, sonst frische vergeben).
   - Nicht erwähnte Unteraufgaben bleiben UNBERÜHRT ([] tut nichts).
   - Löschen ausschließlich über entfernteIds (Item-Feld unteraufgabenEntfernt).
   - erledigt/bonusPunkte/gebuchtePunkte bleiben App-Hoheit (Import ignoriert). */
function uaMergeFuerImport(vorhandeneUAs, importUAs, entfernteIds) {
  let liste = (vorhandeneUAs || []).map(u => Object.assign({}, u));
  if (Array.isArray(entfernteIds) && entfernteIds.length) {
    const weg = new Set(entfernteIds.map(String));
    liste = liste.filter(u => !weg.has(String(u.id)));
  }
  if (Array.isArray(importUAs)) {
    importUAs.filter(iu => iu && String(iu.titel || '').trim()).forEach(iu => {
      const patch = { titel: String(iu.titel).trim() };
      if (iu.geplantMin !== undefined)   patch.geplantMin   = iu.geplantMin === null ? null : Number(iu.geplantMin);
      if (iu.beschreibung !== undefined) patch.beschreibung = iu.beschreibung === null ? null : String(iu.beschreibung);
      const idx = iu.id != null ? liste.findIndex(u => String(u.id) === String(iu.id)) : -1;
      if (idx >= 0) {
        liste[idx] = Object.assign({}, liste[idx], patch);   // id/erledigt/gebuchtePunkte bleiben
      } else {
        liste.push({
          id: iu.id != null ? String(iu.id) : lokaleUuid(),
          titel: patch.titel, erledigt: false,
          geplantMin: patch.geplantMin !== undefined ? patch.geplantMin : null,
          beschreibung: patch.beschreibung !== undefined ? patch.beschreibung : null,
          bonusPunkte: null, gebuchtePunkte: null
        });
      }
    });
  }
  return liste;
}

/* Beim UUID→rec-Tausch alle internen Verweise auf die neue ID umziehen. */
function idReferenzenUmziehen(altId, neuId) {
  if (fokus && fokus.itemId === altId) { fokus.itemId = neuId; fokusSpeichern(); }
  (Store.tag.log || []).forEach(l => { if (l.itemId === altId) l.itemId = neuId; });
  (Store.tag.tickLog || []).forEach(l => { if (l.itemId === altId) l.itemId = neuId; });
  Store.items.forEach(i => { if (i.ankerBezugId === altId) i.ankerBezugId = neuId; });
  Store.speichereTag();
}

function lsLese(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) { return fallback; }
}
function lsSchreibe(key, wert) {
  localStorage.setItem(key, JSON.stringify(wert));
}

/* Gespeicherte Settings über die Defaults legen — neue Parameter aus
   App-Updates erscheinen so automatisch, Pascals Anpassungen bleiben. */
function settingsZusammenfuehren(gespeichert) {
  const s = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
  for (const [k, v] of Object.entries(gespeichert || {})) {
    if (v && typeof v === 'object' && !Array.isArray(v) && typeof s[k] === 'object') {
      Object.assign(s[k], v);
    } else {
      s[k] = v;
    }
  }
  return s;
}

/* ════════════════════════════════════════════════════════════════════
   Punkte-Engine — Kern (3.1–3.3). Boni/Mali (3.4) folgen in Schritt 4.
   ════════════════════════════════════════════════════════════════════ */
function tageBisDeadline(deadline) {
  if (!deadline) return 0;
  return Math.round((new Date(deadline + 'T00:00:00') - new Date(heuteIso() + 'T00:00:00')) / 86400000);
}

/* ── Punktesystem 2.0 (21.07.2026): Punkte/Stunde + Abhak-Bonus ───── */

/* Auto-Vorschlag aus der Einschätzung (K × E × B, stufenlos). */
function vorschlagRate(item) {
  return (Store.settings.basisProStd || 12)
    * (Number(item.komplexitaet) || 1)
    * (Number(item.energie) || 1)
    * (Number(item.blockade) || 1);
}

/* Wirksamer Stundensatz: manueller Wert schlägt den Auto-Vorschlag.
   Ungültig gespeicherte Werte (NaN/Text) fallen auf den Vorschlag zurück. */
function effektiveRate(item) {
  if (item.punkteProStd != null && Number.isFinite(Number(item.punkteProStd))) {
    return Number(item.punkteProStd);
  }
  return vorschlagRate(item);
}

/* Abhak-Bonus: manuell (darf negativ sein), sonst Geld-Impact (DFM),
   sonst der Standard-Bonus aus den Settings (22.07.2026: Default 100). */
function effektiverBonus(item) {
  if (item.abschlussBonus != null) return item.abschlussBonus;
  if (item.typ === 'counter') return 0;
  if (item.domain === 'dfm' && item.geldImpact) {
    // unbekannter Impact-Schlüssel darf kein NaN erzeugen
    return (Number(Store.settings.geldScoreBasis[item.geldImpact]) || 0) - tageBisDeadline(item.deadline);
  }
  return Store.settings.abschlussBonusStandard != null ? Store.settings.abschlussBonusStandard : 100;
}

/* Akku-Änderung pro Fokus-Stunde. */
function akkuRate(item) {
  return item && item.akkuProStd != null
    ? item.akkuProStd
    : (Store.settings.akkuProStdStandard != null ? Store.settings.akkuProStdStandard : -8);
}

/* Zeit-Anteil, optional über eine Stufen-Kurve (bisMin aufsteigend,
   letzte Stufe bisMin=null = „danach"). */
function punkteFuerZeit(item, min) {
  const stufen = item.zeitStufen;
  if (stufen && stufen.length) {
    let punkte = 0, ab = 0;
    for (const st of stufen) {
      const bis = st.bisMin == null ? Infinity : st.bisMin;
      punkte += Math.max(0, Math.min(min, bis) - ab) / 60 * (Number(st.punkteProStd) || 0);
      ab = bis;
      if (min <= bis) break;
    }
    return punkte;
  }
  return min / 60 * effektiveRate(item);
}

function punkteBeiMinuten(item, minuten) {
  let min = minuten;
  // Ausnahme „Idee": Ist-Minuten auf geplante Minuten gedeckelt
  if (item.prioritaet === 'idee' && item.aufwandGeplantMin > 0) {
    min = Math.min(min, item.aufwandGeplantMin);
  }
  // Schiebe-/Plan-Malus: −X % des Zeit-Anteils je geschobenem Tag
  const malusSatz = (Store.settings.schiebeMalusProzent[item.prioritaet] || 0) / 100;
  const malusFaktor = Math.max(0, 1 - malusSatz * (item.tageGeschoben || 0));
  const p = punkteFuerZeit(item, min) * malusFaktor + effektiverBonus(item);
  return Number.isFinite(p) ? p : 0;   // Sicherheitsnetz gegen NaN aus Altdaten
}

/* Counter: Stufen-Kurve (tickStufen) oder Alt-Modell (eine Schwelle). */
function counterPunkte(item, ticks) {
  const n = (ticks != null) ? ticks : (item.tickStandHeute || 0);
  if (item.tickStufen && item.tickStufen.length) {
    let p = 0, ab = 0;
    for (const st of item.tickStufen) {
      const bis = st.bisTick == null ? Infinity : st.bisTick;
      p += Math.max(0, Math.min(n, bis) - ab) * (Number(st.punkteProTick) || 0);
      ab = bis;
      if (n <= bis) break;
    }
    return p;
  }
  const bis = Math.min(n, item.tickSchwelle);
  const ueber = Math.max(0, n - item.tickSchwelle);
  return bis * item.punkteJeTickVorSchwelle + ueber * item.punkteJeTickNachSchwelle;
}

/* Counter im „schlechten" Bereich? → letzter Tick brachte Minuspunkte. */
function counterIstSchlecht(item) {
  const n = item.tickStandHeute || 0;
  return n > 0 && (counterPunkte(item, n) - counterPunkte(item, n - 1)) < 0;
}

/* Anzeigewert (3.5): erledigt = eingefroren (aus dem Log), offen = live.
   Offene Aufgaben ohne Ist-Zeit projizieren über die geplanten Minuten. */
function anzeigePunkte(item) {
  if (item.typ === 'counter') return Number(counterPunkte(item)) || 0;
  if (item.status === 'erledigt') {
    const log = Store.tag.log.find(l => l.itemId === item.id);
    if (log) return Number(log.punkte) || 0;   // Log ohne Punktewert (z. B. Import) → 0 statt NaN
  }
  const min = Math.max(minutenInklFokus(item), item.aufwandGeplantMin || 0);
  return punkteBeiMinuten(item, min);
}

/* ════════════════════════════════════════════════════════════════════
   Routine-Engine (private Tagesstruktur, 20.07.2026)
   Rhythmus 1–31 Tage; fällig = zuletztErledigt + Rhythmus erreicht
   (nie erledigte Routinen sind sofort fällig). Aussetzen startet den
   Rhythmus ab heute neu (wahlweise mit Punkteabzug); Verpasstes zieht
   beim Tagesabschluss automatisch ab und bricht die Routine-Streak.
   ════════════════════════════════════════════════════════════════════ */
/* Wochen-Index, montags-basiert (2024-01-01 war ein Montag). */
function wochenIndex(d) {
  const tage = Math.floor(((d || new Date()) - new Date('2024-01-01T00:00:00')) / 86400000);
  return Math.floor(tage / 7);
}
function wochentagMo0(d) { return ((d || new Date()).getDay() + 6) % 7; }
function hatWochentagModell(r) { return !!(r.rhythmusWochentage && r.rhythmusWochentage.length); }

function routineUeberfaelligTage(r) {
  if (hatWochentagModell(r)) return 0;   // Wochentag-Modell kennt kein „überfällig in Tagen"
  if (!r.zuletztErledigt) return 0;
  const diff = Math.round((new Date(heuteIso() + 'T00:00:00')
    - new Date(r.zuletztErledigt + 'T00:00:00')) / 86400000);
  return diff - (r.rhythmusTage || 1);
}

/* Häufigkeits-Modus (21.07.2026): explizit gesetzt oder abgeleitet. */
function rhythmusModusVon(r) {
  if (r.rhythmusModus) return r.rhythmusModus;
  return hatWochentagModell(r) ? 'wochentage' : 'alleNTage';
}

/* Zufalls-Modi: Tage der aktuellen Periode würfeln (einmal je Periode). */
function zufallsTageSichern(r) {
  const modus = rhythmusModusVon(r);
  const n = Math.max(1, r.rhythmusZufallAnzahl || 1);
  const ziehe = (aus, anzahl) => {
    const pool = [...Array(aus).keys()];
    const wahl = [];
    while (wahl.length < Math.min(anzahl, aus)) {
      wahl.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
    }
    return wahl.sort((a, b) => a - b);
  };
  if (modus === 'zufallWoche') {
    const periode = 'W' + wochenIndex();
    if (r.rhythmusZufallPeriode !== periode) {
      r.rhythmusZufallPeriode = periode;
      r.rhythmusZufallTage = ziehe(7, n);                 // 0=Mo … 6=So
      Store.speichereItems();
    }
  } else if (modus === 'zufallMonat') {
    const periode = heuteIso().slice(0, 7);
    if (r.rhythmusZufallPeriode !== periode) {
      r.rhythmusZufallPeriode = periode;
      r.rhythmusZufallTage = ziehe(28, n).map(x => x + 1); // 1.–28.
      Store.speichereItems();
    }
  }
}

function routineFaellig(r) {
  if (r.typ !== 'routine') return false;
  if (r.status === 'erledigt') return false;
  if (r.ausgesetztAm === heuteIso()) return false;
  if (r.zuletztErledigt === heuteIso()) return false;
  const modus = rhythmusModusVon(r);
  if (modus === 'wochentage') {
    if (!(r.rhythmusWochentage || []).includes(wochentagMo0())) return false;
    const anker = r.rhythmusAnkerWoche != null ? r.rhythmusAnkerWoche : wochenIndex();
    return (wochenIndex() - anker) % (r.rhythmusWochen || 1) === 0;
  }
  if (modus === 'monatstage') {
    return (r.rhythmusMonatstage || []).includes(new Date().getDate());
  }
  if (modus === 'zufallWoche') {
    zufallsTageSichern(r);
    return r.rhythmusZufallTage.includes(wochentagMo0());
  }
  if (modus === 'zufallMonat') {
    zufallsTageSichern(r);
    return r.rhythmusZufallTage.includes(new Date().getDate());
  }
  if (!r.zuletztErledigt) return true;
  return routineUeberfaelligTage(r) >= 0;
}

/* Tage bis zum nächsten fälligen Termin (fürs „wieder in n T"-Label).
   Zufalls-Modi kennen nur die aktuelle Periode → sonst null („?"). */
function routineNaechsteIn(r) {
  const modus = rhythmusModusVon(r);
  if (modus === 'alleNTage') return Math.max(1, -routineUeberfaelligTage(r));
  const heute = new Date(heuteIso() + 'T00:00:00');
  const anker = r.rhythmusAnkerWoche != null ? r.rhythmusAnkerWoche : wochenIndex(heute);
  for (let d = 1; d <= 62; d++) {
    const dat = new Date(heute); dat.setDate(dat.getDate() + d);
    if (modus === 'wochentage') {
      if ((r.rhythmusWochentage || []).includes(wochentagMo0(dat))
        && (wochenIndex(dat) - anker) % (r.rhythmusWochen || 1) === 0) return d;
    } else if (modus === 'monatstage') {
      if ((r.rhythmusMonatstage || []).includes(dat.getDate())) return d;
    } else if (modus === 'zufallWoche') {
      if (wochenIndex(dat) !== wochenIndex(heute)) return null;
      if (r.rhythmusZufallTage.includes(wochentagMo0(dat))) return d;
    } else if (modus === 'zufallMonat') {
      if (dat.getMonth() !== heute.getMonth()) return null;
      if (r.rhythmusZufallTage.includes(dat.getDate())) return d;
    }
  }
  return null;
}

function routineAussetzen(id, mitAbzug) {
  const r = Store.findeItem(id);
  if (!r || r.typ !== 'routine') return;
  r.ausgesetztAm = heuteIso();
  r.zuletztErledigt = heuteIso();          // Rhythmus startet ab heute neu
  r.rhythmusAnkerWoche = wochenIndex();
  if (mitAbzug) {
    Store.tag.log.push({
      itemId: id, titel: r.titel + ' — ausgesetzt', domain: r.domain,
      bereich: r.bereich || null, punkte: Store.settings.rhythmusVerpasstProTag,
      zeit: new Date().toISOString(), aussetzer: true
    });
  }
  gesamtpunkteAktualisieren();
  Store.speichereItems(); Store.speichereTag();
  toastZeigen(mitAbzug
    ? '⏭ Ausgesetzt (' + fmtPunkte(Store.settings.rhythmusVerpasstProTag) + ' P) — Rhythmus startet heute neu'
    : '⏭ Ausgesetzt — Rhythmus startet heute neu');
  renderAlles();
}

const WT_KURZ = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
function rhythmusLabel(r) {
  if (typeof r === 'object') {
    const modus = rhythmusModusVon(r);
    if (modus === 'wochentage' && hatWochentagModell(r)) {
      const tage = r.rhythmusWochentage.length === 7
        ? 'tgl.'
        : [...r.rhythmusWochentage].sort((a, b) => a - b).map(i => WT_KURZ[i]).join('·');
      return tage + ((r.rhythmusWochen || 1) > 1 ? ' / jede ' + r.rhythmusWochen + '. Wo.' : '');
    }
    if (modus === 'monatstage') {
      return (r.rhythmusMonatstage || []).length
        ? [...r.rhythmusMonatstage].sort((a, b) => a - b).map(t => t + '.').join('·') + ' im Monat'
        : 'Monatstage wählen';
    }
    if (modus === 'zufallWoche') return (r.rhythmusZufallAnzahl || 1) + '×/Wo. (zufällig)';
    if (modus === 'zufallMonat') return (r.rhythmusZufallAnzahl || 1) + '×/Mon. (zufällig)';
  }
  const t = (typeof r === 'object' ? r.rhythmusTage : r) || 1;
  if (t === 1) return 'tgl.';
  if (t === 7) return 'wöchentl.';
  if (t === 14) return 'alle 2 Wo.';
  if (t >= 28 && t <= 31) return 'monatl.';
  return 'alle ' + t + ' T';
}

/* ════════════════════════════════════════════════════════════════════
   Unteraufgaben-Engine (Tacho 2.0)
   Zeit-Verteilung: eigene Minuten zählen fix, der Rest der geplanten
   Zeit verteilt sich gleichmäßig auf Unteraufgaben ohne Angabe.
   Punkte-Anteile folgen den Zeit-Anteilen; Abhaken einer Unteraufgabe
   friert ihren Anteil sofort ein, die Hauptaufgabe bucht den Rest.
   ════════════════════════════════════════════════════════════════════ */
function zeitVerteilung(item) {
  const uas = item.unteraufgaben || [];
  if (!uas.length) return [];
  const geplant = item.aufwandGeplantMin || 0;
  const fix = uas.filter(u => u.geplantMin > 0);
  const fixSumme = fix.reduce((s, u) => s + u.geplantMin, 0);
  const autoAnzahl = uas.length - fix.length;
  const autoJe = autoAnzahl > 0 ? Math.max(0, geplant - fixSumme) / autoAnzahl : 0;
  return uas.map(u => (u.geplantMin > 0 ? u.geplantMin : autoJe));
}

/* Einmal-Punkte-Verteilung (21.07.2026): eigene Werte fix, der Rest
   des Abhak-Bonus verteilt sich gleichmäßig auf Unteraufgaben ohne. */
function bonusVerteilung(item) {
  const uas = item.unteraufgaben || [];
  if (!uas.length) return [];
  const gesamt = effektiverBonus(item);
  const fix = uas.filter(u => u.bonusPunkte != null);
  const fixSumme = fix.reduce((s, u) => s + u.bonusPunkte, 0);
  const autoAnzahl = uas.length - fix.length;
  const autoJe = autoAnzahl > 0 ? (gesamt - fixSumme) / autoAnzahl : 0;
  return uas.map(u => (u.bonusPunkte != null ? u.bonusPunkte : autoJe));
}

/* Gesamtzeit/Gesamtbonus = Summe der Unteraufgaben, sobald alle eigene
   Werte haben; sonst bleibt das Gesamtfeld führend (mind. Summe der fixen). */
function uaSummenAngleichen(item) {
  const uas = item.unteraufgaben || [];
  if (!uas.length) return;
  const fixMin = uas.filter(u => u.geplantMin > 0);
  const sMin = fixMin.reduce((s, u) => s + u.geplantMin, 0);
  if (fixMin.length === uas.length) item.aufwandGeplantMin = sMin;
  else if (sMin > (item.aufwandGeplantMin || 0)) item.aufwandGeplantMin = sMin;
  const fixB = uas.filter(u => u.bonusPunkte != null);
  if (fixB.length === uas.length && fixB.length) {
    item.abschlussBonus = fixB.reduce((s, u) => s + u.bonusPunkte, 0);
  }
}

/* Punkte-Anteil einer Unteraufgabe: Zeit-Anteil + Einmal-Punkte-Anteil. */
function unteraufgabenAnteil(item, uaIndex) {
  const zeiten = zeitVerteilung(item);
  const boni = bonusVerteilung(item);
  const summe = zeiten.reduce((s, z) => s + z, 0);
  const zeitGesamt = punkteBeiMinuten(item, Math.max(minutenInklFokus(item), item.aufwandGeplantMin || 0))
    - effektiverBonus(item);
  const zeitAnteil = summe > 0 ? zeitGesamt * zeiten[uaIndex] / summe : zeitGesamt / zeiten.length;
  return zeitAnteil + (boni[uaIndex] || 0);
}

function unteraufgabeToggle(itemId, uaId) {
  const item = Store.findeItem(itemId);
  if (!item || tagGesperrt()) return;
  const idx = (item.unteraufgaben || []).findIndex(u => u.id === uaId);
  if (idx < 0) return;
  const ua = item.unteraufgaben[idx];
  if (ua.erledigt) {
    // Rückgängig: Gutschrift + Log-Eintrag entfernen
    ua.erledigt = false;
    ua.gebuchtePunkte = null;
    Store.tag.log = Store.tag.log.filter(l => !(l.itemId === itemId && l.uaId === uaId));
  } else {
    ua.erledigt = true;
    ua.gebuchtePunkte = unteraufgabenAnteil(item, idx);   // sofort einfrieren
    Store.tag.log.push({
      itemId, uaId, titel: item.titel + ' — ' + ua.titel,
      domain: item.domain, bereich: item.bereich || null,
      punkte: ua.gebuchtePunkte, zeit: new Date().toISOString()
    });
  }
  gesamtpunkteAktualisieren();
  Store.speichereItems();
  Store.speichereTag();
  pruefeLevelUp();
}

function unteraufgabeAnlegen(itemId, titel) {
  const item = Store.findeItem(itemId);
  if (!item || !titel.trim()) return null;
  item.unteraufgaben = item.unteraufgaben || [];
  const ua = { id: lokaleUuid(), titel: titel.trim(), erledigt: false, geplantMin: null, bonusPunkte: null, gebuchtePunkte: null, beschreibung: null };
  item.unteraufgaben.push(ua);
  Store.speichereItems();
  return ua;
}

/* ════════════════════════════════════════════════════════════════════
   Live-Wohlstand & Avatar-Level (Spez-Änderung 20.07.2026: alles live)
   Anzeige-Basis = offizieller Wohlstand + heutige Punkte + Live-Zulauf
   des aktuellen Fokus. Level-Up feuert SOFORT beim Schwellen-Übertritt.
   Die 6 Belohnungs-Kategorien behalten ihre Würfel-Mechanik (6.3),
   zeigen aber ebenfalls den Live-Stand an.
   ════════════════════════════════════════════════════════════════════ */
function fokusLiveDelta() {
  const item = fokusItem();
  if (!item || item.status === 'erledigt' || item.typ === 'counter') return 0;
  const live = punkteBeiMinuten(item, minutenInklFokus(item));
  const gebucht = (item.unteraufgaben || []).reduce((s, u) => s + (u.gebuchtePunkte || 0), 0);
  return Math.max(0, live - gebucht);
}

function wohlstandLive() {
  if (Store.tag.abgeschlossen) return Store.tag.wohlstandStand;
  gesamtpunkteAktualisieren();
  return Store.tag.wohlstandStand + Store.tag.gesamtpunkteHeute + fokusLiveDelta();
}

function avatarStufeAus(basis) {
  const stufen = Store.settings.avatarStufen || DEFAULT_SETTINGS.avatarStufen;
  let s = 1;
  stufen.forEach((schwelle, i) => { if (basis >= schwelle) s = i + 1; });
  return s;
}

/* Level nie absteigend (Undo nimmt kein Level weg). */
function pruefeLevelUp() {
  if (!belohnung) return;
  if (belohnung.avatarStufe == null) {
    belohnung.avatarStufe = avatarStufeAus(wohlstandLive());
    belohnungSpeichern();
    return;
  }
  const neu = avatarStufeAus(wohlstandLive());
  if (neu > belohnung.avatarStufe) {
    belohnung.avatarStufe = neu;
    belohnungSpeichern();
    konfetti();
    toastZeigen('⬆️ Level up! Avatar-Stufe ' + neu);
    if (document.getElementById('view-belohnung').classList.contains('on')) renderBelohnung();
  }
}

/* ════════════════════════════════════════════════════════════════════
   Fokus-Engine (4.1/4.2): genau ein Fokus, Play/Pause als Toggle.
   Laufende Zeit fließt beim Pausieren/Stoppen in item.istMinuten.
   ════════════════════════════════════════════════════════════════════ */
let fokus = lsLese(LS.FOKUS, null);   // { itemId, laeuft, startMs, sessionSek }

function fokusItem() { return fokus ? Store.findeItem(fokus.itemId) : null; }

function fokusSpeichern() { lsSchreibe(LS.FOKUS, fokus); }

function laufendeSek() {
  if (!fokus || !fokus.laeuft) return 0;
  return (Date.now() - fokus.startMs) / 1000;
}

/* Ist-Minuten eines Items inklusive gerade laufender Fokus-Zeit. */
function minutenInklFokus(item) {
  let min = item.istMinuten || 0;
  if (fokus && fokus.itemId === item.id) min += laufendeSek() / 60;
  return min;
}

/* Laufende Zeit ins Item übernehmen (bei Pause/Wechsel/Abschluss).
   Zieht dabei auch den Akku gemäß Akku-Rate des Items nach (21.07.2026). */
function fokusZeitEinbuchen() {
  if (!fokus || !fokus.laeuft) return;
  const item = fokusItem();
  const sek = laufendeSek();
  if (item) {
    item.istMinuten = (item.istMinuten || 0) + sek / 60;
    Store.tag.fokusSek = (Store.tag.fokusSek || 0) + sek;
    Store.speichereItems();
    if (Store.tag.akkuProzent != null) {
      Store.tag.akkuProzent = Math.min(100, Math.max(0,
        Store.tag.akkuProzent + akkuRate(item) * sek / 3600));
      const jetzt = new Date();
      Store.tag.akkuVerlauf = Store.tag.akkuVerlauf || [];
      Store.tag.akkuVerlauf.push({ min: jetzt.getHours() * 60 + jetzt.getMinutes(),
        p: Math.round(Store.tag.akkuProzent) });
    }
    Store.speichereTag();   // fokusSek IMMER sichern (Fix 22.07.2026)
  }
  fokus.sessionSek += sek;
  fokus.laeuft = false;
  fokusSpeichern();
}

/* Akku inkl. laufendem Fokus-Zulauf (für alle Live-Anzeigen). */
function akkuLive() {
  let p = Store.tag.akkuProzent;
  if (p == null) return null;
  if (fokus && fokus.laeuft) {
    const item = fokusItem();
    if (item) p = Math.min(100, Math.max(0, p + akkuRate(item) * laufendeSek() / 3600));
  }
  return p;
}

function fokusStarten(id) {
  if (tagGesperrt()) return;
  if (fokus && fokus.itemId !== id) fokusZeitEinbuchen();   // alten Fokus pausieren
  if (!fokus || fokus.itemId !== id) fokus = { itemId: id, laeuft: false, startMs: 0, sessionSek: 0 };
  fokus.laeuft = true;
  fokus.startMs = Date.now();
  const item = Store.findeItem(id);
  if (item && item.status === 'offen') { item.status = 'in_arbeit'; Store.speichereItems(); }
  // Angefangene Items gehören in den Tagesstream (21.07.2026)
  if (item && item.typ !== 'counter' && item.streamSlot == null && item.imStreamAnzeigen !== false) {
    item.streamSlot = jetztRund5();
    pushDown();
    Store.speichereItems();
  }
  fokusSpeichern();
  renderAlles();
}

/* EIN Toggle (4.1): läuft → pausieren, pausiert → weiterlaufen. */
function fokusToggle() {
  if (!fokus) { sheetTachoOeffnen(); return; }
  if (fokus.laeuft) {
    fokusZeitEinbuchen();
  } else {
    fokus.laeuft = true;
    fokus.startMs = Date.now();
    fokusSpeichern();
  }
  renderAlles();
}

function fokusBeenden() {
  fokusZeitEinbuchen();
  fokus = null;
  fokusSpeichern();
}

/* ════════════════════════════════════════════════════════════════════
   Erledigen (7.2: NUR übers Häkchen-Feld) — friert Punkte ein (3.5).
   ════════════════════════════════════════════════════════════════════ */
function abhaken(id, override) {
  const item = Store.findeItem(id);
  if (!item) return;
  if (item.status === 'erledigt') {
    // Versehen rückgängig: auftauen, Log-Eintrag entfernen, Rhythmus zurück
    const log = Store.tag.log.find(l => l.itemId === id && !l.uaId);
    if (log && log.zuletztErledigtVorher !== undefined) item.zuletztErledigt = log.zuletztErledigtVorher;
    if (log && log.akkuKorrektur && Store.tag.akkuProzent != null) {
      Store.tag.akkuProzent = Math.min(100, Math.max(0, Store.tag.akkuProzent - log.akkuKorrektur));
    }
    if (item.typ === 'routine') item.routineStreak = Math.max(0, (item.routineStreak || 0) - 1);
    item.status = item.istMinuten > 0 ? 'in_arbeit' : 'offen';
    Store.tag.log = Store.tag.log.filter(l => !(l.itemId === id && !l.uaId));
  } else {
    if (fokus && fokus.itemId === id) fokusBeenden();
    // Abschluss-Formular: korrigierte Ist-Minuten übernehmen (21.07.2026)
    if (override && override.minuten != null) item.istMinuten = override.minuten;
    item.status = 'erledigt';
    // Rhythmus-Routine (3.4, NUR Privat): früher dran = Bonus,
    // überfällig = Malus je Tag; Stichtag = zuletztErledigt + Rhythmus.
    let rhythmusDelta = 0;
    // Unteraufgaben-Gutschriften sind schon gebucht → Hauptaufgabe = Rest
    const gebucht = (item.unteraufgaben || []).reduce((s, u) => s + (u.gebuchtePunkte || 0), 0);
    const logEintrag = {
      itemId: id, titel: item.titel, domain: item.domain,
      bereich: item.bereich || null,
      punkte: Math.max(0, punkteBeiMinuten(item, item.istMinuten) - gebucht),
      zeit: new Date().toISOString()
    };
    if (item.typ === 'routine') {
      // Bonus/Malus nach 3.4 gilt NUR Privat; Rhythmus-Neustart + Streak für alle
      if (item.domain === 'privat' && item.rhythmusTage > 0 && item.zuletztErledigt) {
        const diffTage = routineUeberfaelligTage(item);
        if (diffTage < 0)      rhythmusDelta = Store.settings.rhythmusFrueherBonus;
        else if (diffTage > 0) rhythmusDelta = Store.settings.rhythmusVerpasstProTag * diffTage;
      }
      logEintrag.zuletztErledigtVorher = item.zuletztErledigt;
      item.zuletztErledigt = heuteIso();
      item.rhythmusAnkerWoche = wochenIndex();              // Wochen-Intervall neu verankern
      item.routineStreak = (item.routineStreak || 0) + 1;   // routineneigene Serie
      item.streakGebrochen = false;
    }
    logEintrag.rhythmusDelta = rhythmusDelta;
    logEintrag.punkte += rhythmusDelta;
    // Abschluss-Formular (21.07.2026): manuelle Werte überschreiben —
    // sie gehen auch als Feedback in den Sync (zeitEintraege).
    if (override && override.punkte != null) {
      logEintrag.punkte = override.punkte;
      logEintrag.manuell = true;
    }
    if (override && override.akkuKorrektur) {
      logEintrag.akkuKorrektur = override.akkuKorrektur;
      if (Store.tag.akkuProzent != null) {
        Store.tag.akkuProzent = Math.min(100, Math.max(0,
          Store.tag.akkuProzent + override.akkuKorrektur));
      }
    }
    Store.tag.log.push(logEintrag);
  }
  gesamtpunkteAktualisieren();
  Store.speichereItems();
  Store.speichereTag();
  renderAlles();
}

/* Abhak-Einstieg: Aufgaben bekommen das Abschluss-Formular (Werte
   prüfen/überschreiben), Routinen und Counter buchen direkt (21.07.2026). */
function abhakenFlow(id) {
  const item = Store.findeItem(id);
  if (!item || tagGesperrt()) return;
  if (item.typ === 'aufgabe' && item.status !== 'erledigt') sheetAbschlussOeffnen(id);
  else { abhaken(id); renderAlles(); }
}

/* Abschluss-Formular: Fokus-Werte übersichtlich + zwei Regler zum
   Überschreiben von Punkten und Akku — die finalen Werte gehen in
   Log und Sync (bessere Selbst-Einschätzung über die Zeit). */
function sheetAbschlussOeffnen(id) {
  const item = Store.findeItem(id);
  if (!item) return;
  if (fokus && fokus.itemId === id) fokusZeitEinbuchen();   // Zeit + Akku sichern
  const min = item.istMinuten || 0;
  const gebucht = (item.unteraufgaben || []).reduce((s, u) => s + (u.gebuchtePunkte || 0), 0);
  const berechnet = Math.max(0, punkteBeiMinuten(item, min) - gebucht);
  const autoAkku = akkuRate(item) * min / 60;
  const pMin = Math.floor(Math.min(-20, berechnet - 100));
  const pMax = Math.ceil(berechnet + 150);

  let html = '<div class="wizsumme">'
    + '<div class="zeile"><span>Ist-Zeit</span><b>' + Math.round(min) + ' min'
    + (item.aufwandGeplantMin ? ' / ' + item.aufwandGeplantMin + ' geplant' : '') + '</b></div>'
    + '<div class="zeile"><span>Satz</span><b>' + fmtPunkte(effektiveRate(item)) + ' P/Std</b></div>'
    + (effektiverBonus(item) ? '<div class="zeile"><span>Abhak-Bonus</span><b>' + fmtPunkte(effektiverBonus(item)) + ' P</b></div>' : '')
    + (gebucht ? '<div class="zeile"><span>Bereits über Unteraufgaben</span><b>' + fmtPunkte(gebucht) + ' P</b></div>' : '')
    + '<div class="zeile"><span>Berechnete Punkte</span><b>' + fmtPunkte(berechnet) + ' P</b></div>'
    + '<div class="zeile"><span>Akku automatisch</span><b>' + fmtPunkte(autoAkku) + ' %</b></div>'
    + '</div>'
    + '<div class="regler"><div class="kopfzeile2"><label>Ist-Minuten (korrigierbar)</label>'
    + '<span class="wert" id="afMWert">' + Math.round(min) + ' min</span></div>'
    + '<input type="range" id="afM" min="0" max="' + Math.max(180, Math.ceil(min * 1.5)) + '" step="1" value="' + Math.round(min) + '"></div>'
    + '<div class="regler"><div class="kopfzeile2"><label>Punkte (überschreibbar)</label>'
    + '<span class="wert" id="afPWert">' + fmtPunkte(berechnet) + ' P</span></div>'
    + '<input type="range" id="afP" min="' + pMin + '" max="' + pMax + '" step="1" value="' + Math.round(berechnet) + '"></div>'
    + '<div class="regler"><div class="kopfzeile2"><label>Akku-Korrektur (zusätzlich)</label>'
    + '<span class="wert" id="afAWert">±0 %</span></div>'
    + '<input type="range" id="afA" min="-50" max="50" step="1" value="0"></div>'
    + '<button class="wizbtn" id="afBuchen">✓ Erledigt buchen</button>';
  sheetOeffnen(item.titel || 'Aufgabe abschließen', html, 'abschluss:' + id);

  let punkteAngefasst = false;
  $('afM').addEventListener('input', () => {
    const m = Number($('afM').value);
    $('afMWert').textContent = m + ' min';
    // Punkte-Vorschlag folgt den korrigierten Minuten, solange der
    // Punkte-Regler nicht selbst angefasst wurde
    if (!punkteAngefasst) {
      const neu = Math.max(0, punkteBeiMinuten(item, m) - gebucht);
      $('afP').value = Math.round(neu);
      $('afPWert').textContent = fmtPunkte(neu) + ' P';
    }
  });
  $('afP').addEventListener('input', () => {
    punkteAngefasst = true;
    $('afPWert').textContent = $('afP').value + ' P';
  });
  $('afA').addEventListener('input', () =>
    $('afAWert').textContent = ($('afA').value > 0 ? '+' : '') + $('afA').value + ' %');
  $('afBuchen').addEventListener('click', () => {
    abhaken(id, {
      punkte: Number($('afP').value),
      akkuKorrektur: Number($('afA').value) || 0,
      minuten: Number($('afM').value)
    });
    sheetSchliessen();
    toastZeigen('✓ Gebucht: ' + $('afP').value + ' P · ' + $('afM').value + ' min');
  });
}

function counterTick(id) {
  const item = Store.findeItem(id);
  if (!item || item.typ !== 'counter' || tagGesperrt()) return;
  const vorher = counterPunkte(item);
  item.tickStandHeute = (item.tickStandHeute || 0) + 1;
  Store.tag.tickLog = Store.tag.tickLog || [];
  Store.tag.tickLog.push({
    itemId: id, domain: item.domain, bereich: item.bereich || null,
    punkte: counterPunkte(item) - vorher, zeit: new Date().toISOString()
  });
  gesamtpunkteAktualisieren();
  Store.speichereItems();
  Store.speichereTag();
  renderAlles();
}

/* Gesamtzahl heute (3.5): eingefrorene Log-Punkte + live Counter-Stände.
   Nie unter 0 (Entscheidung 22.07.2026) — Maluse können den Tag
   maximal auf null ziehen, nie ins Minus. */
function gesamtpunkteAktualisieren() {
  const log = Store.tag.log.reduce((s, l) => s + (Number(l.punkte) || 0), 0);
  const counter = Store.items.filter(i => i.typ === 'counter')
    .reduce((s, i) => s + (Number(counterPunkte(i)) || 0), 0);
  Store.tag.gesamtpunkteHeute = Math.max(0, log + counter + (Number(Store.tag.streakBonusHeute) || 0));
}

/* Abgeschlossener Tag = gesperrt: erst „Tag starten" öffnet wieder. */
function tagGesperrt() {
  if (!Store.tag.abgeschlossen) return false;
  toastZeigen('🌙 Tag ist abgeschlossen — erst „Tag starten" (oder Abschluss widerrufen).');
  return true;
}

/* ════════════════════════════════════════════════════════════════════
   Tagesabschluss-Engine (1.2 / 3.4 / 6.3) — der geführte Wizard-Screen
   folgt in einem späteren Schritt, die Regeln leben hier:
   - Plan-/Schiebe-Malus: im Stream geplant (oder heute rausgezogen),
     nicht erledigt → ein weiterer geschobener Tag (5.3)
   - Streak: Tag mit erledigten Punkten verlängert (+Bonus), sonst Abriss
   - Wohlstand_neu = Wohlstand_alt + Tages-Gesamtpunkte (kumulativ)
   ════════════════════════════════════════════════════════════════════ */
function tagAbschliessen() {
  if (Store.tag.abgeschlossen) return null;
  fokusZeitEinbuchen();   // laufenden Fokus pausieren, Zeit sichern
  tagesabschlussKern();
  Store.speichereAlles();
  renderAlles();
  return Store.baueExport('tagesabschluss');
}

/* Spielmechanik des Tagesendes — läuft nach dem Review-Wizard (dann
   ohne Auto-Maluse, die hat Pascal manuell entschieden) und beim
   automatischen Nachholen am Tageswechsel (dann mit Auto-Malusen).
   Alles wird in einem Journal protokolliert, damit der Abschluss
   vollständig widerrufbar ist (22.07.2026). */
function tagesabschlussKern(autoMalus) {
  const j = {
    logMarker: true, geschoben: [], routinen: [], counter: [],
    streakVorher: Store.tag.streak,
    streakBonusVorher: Store.tag.streakBonusHeute || 0,
    wohlstandDelta: 0
  };
  if (autoMalus !== false) {
    // Fällige, nicht erledigte Routinen: Abzug + Streak-Bruch
    Store.items.forEach(i => {
      if (i.typ !== 'routine' || !routineFaellig(i)) return;
      const satz = i.nichtErledigtMalus != null
        ? -Math.abs(i.nichtErledigtMalus)
        : Store.settings.rhythmusVerpasstProTag;
      Store.tag.log.push({
        itemId: i.id, titel: i.titel + ' — verpasst', domain: i.domain,
        bereich: i.bereich || null, punkte: satz,
        zeit: new Date().toISOString(), routineVerpasst: true, abschluss: true
      });
      j.routinen.push({ id: i.id, streakVorher: i.routineStreak || 0, gebrochenVorher: !!i.streakGebrochen });
      i.routineStreak = 0;
      i.streakGebrochen = true;
    });
    // Aufgaben mit definiertem Nicht-Erledigt-Abzug
    Store.items.forEach(i => {
      if (i.typ !== 'aufgabe' || i.status === 'erledigt') return;
      if (i.nichtErledigtMalus == null || !(i.streamSlot != null || i.heuteRausgezogen)) return;
      Store.tag.log.push({
        itemId: i.id, titel: i.titel + ' — nicht erledigt', domain: i.domain,
        bereich: i.bereich || null, punkte: -Math.abs(i.nichtErledigtMalus),
        zeit: new Date().toISOString(), nichtErledigt: true, abschluss: true
      });
    });
  }
  // Counter: Tagesstand einfrieren und nullen (Journal merkt die Stände)
  Store.items.forEach(i => {
    if (i.typ !== 'counter' || !(i.tickStandHeute > 0)) return;
    j.counter.push({ id: i.id, stand: i.tickStandHeute });
    Store.tag.log.push({
      itemId: i.id, titel: i.titel + ' (Counter)', domain: i.domain,
      bereich: i.bereich || null, punkte: counterPunkte(i),
      zeit: new Date().toISOString(), counterAbschluss: true, abschluss: true
    });
    i.tickStandHeute = 0;
  });
  Store.items.forEach(i => {
    // Schiebe-Malus nur für wirklich liegengebliebene Aufgaben — an denen HEUTE
    // gearbeitet wurde, laufen ohne Malus weiter (Pascal 22.07.2026).
    if (i.status !== 'erledigt' && i.typ !== 'counter'
      && (i.streamSlot != null || i.heuteRausgezogen)
      && heuteInvestiertMin(i) < 1) {
      i.tageGeschoben = (i.tageGeschoben || 0) + 1;
      j.geschoben.push(i.id);
    }
    delete i.heuteRausgezogen;
  });
  gesamtpunkteAktualisieren();
  if (Store.tag.gesamtpunkteHeute > 0) {
    Store.tag.streak += 1;
    Store.tag.streakBonusHeute = Store.settings.streakBonus;   // 3.4, beide Domänen
    gesamtpunkteAktualisieren();
  } else {
    Store.tag.streak = 0;
  }
  j.wohlstandDelta = Store.tag.gesamtpunkteHeute;
  Store.tag.wohlstandStand += Store.tag.gesamtpunkteHeute;     // 6.3: nie zurückgesetzt
  Store.tag.abgeschlossen = true;
  Store.tag.abschlussJournal = j;
  // Tages-Snapshot für die Statistikseite (Etappe 2, 21.07.2026)
  historieSchreiben();
}

/* Abschluss vollständig widerrufen (22.07.2026): Punkte, Streaks,
   Maluse, Counter-Stände und Snapshot kommen zurück — abhaken geht wieder. */
function abschlussWiderrufen() {
  const t = Store.tag, j = t.abschlussJournal;
  if (!t.abgeschlossen) return false;
  if (j) {
    t.wohlstandStand -= j.wohlstandDelta || 0;
    t.streak = j.streakVorher || 0;
    t.streakBonusHeute = j.streakBonusVorher || 0;
    (j.geschoben || []).forEach(id => {
      const i = Store.findeItem(id);
      if (i) i.tageGeschoben = Math.max(0, (i.tageGeschoben || 0) - 1);
    });
    (j.routinen || []).forEach(r => {
      const i = Store.findeItem(r.id);
      if (i) { i.routineStreak = r.streakVorher; i.streakGebrochen = r.gebrochenVorher; }
    });
    (j.counter || []).forEach(c => {
      const i = Store.findeItem(c.id);
      if (i) i.tickStandHeute = c.stand;
    });
    t.log = t.log.filter(l => !l.abschluss);
  }
  lsSchreibe(LS.HISTORIE, historieLaden().filter(d => d.datum !== t.datum));
  t.abgeschlossen = false;
  delete t.abschlussJournal;
  gesamtpunkteAktualisieren();
  Store.speichereAlles();
  renderAlles();
  toastZeigen('↩ Tagesabschluss widerrufen — weiter geht’s.');
  return true;
}

/* ── Tages-Historie (Etappe 2): ein Snapshot je abgeschlossenem Tag ── */
function historieLaden() { return lsLese(LS.HISTORIE, []); }

/* Fokuszeit heute (Vorschlag B, 22.07.2026): nur die HEUTE investierte Zeit.
   Aufgaben laufen über Tage weiter, darum zählt je Item nur der Zuwachs seit
   Tagesbeginn (heuteInvestiertMin), nicht die kumulierte Gesamt-Ist-Zeit.
   Der Timer-Zähler fokusSek bleibt als Untergrenze (deckt gelöschte Items
   und den Migrationstag ab). */
function fokusMinHeute() {
  const zaehler = (Store.tag.fokusSek || 0) / 60
    + (fokus && fokus.laeuft ? laufendeSek() / 60 : 0);
  let heute = 0;
  Store.items.forEach(i => { heute += heuteInvestiertMin(i); });
  return Math.round(Math.max(zaehler, Math.min(heute, 16 * 60)));
}

/* Ist ein Log-Eintrag eine echte „erledigt"-Abhakung? (für die Erledigt-Zahl) */
function istErledigtEintrag(l) {
  return !l.uaId && !l.counterAbschluss && !l.routineVerpasst
    && !l.aussetzer && !l.nichtErledigt && l.punkte >= 0;
}

/* Kennzahlen + Aufschlüsselung einer einzelnen Domäne für heute. */
function domSnapshot(dom) {
  const eintr = logEintraegeHeute(dom);
  return {
    punkte: Math.round(eintr.reduce((s, l) => s + (Number(l.punkte) || 0), 0) * 10) / 10,
    fokusMin: Math.round(Store.items.filter(i => (i.domain || 'dfm') === dom)
      .reduce((s, i) => s + heuteInvestiertMin(i), 0)),
    erledigt: Store.tag.log.filter(l => (l.domain || 'dfm') === dom && istErledigtEintrag(l)).length,
    bereiche: punkteNachGruppe('bereich', dom),
    abschnitte: punkteNachGruppe('abschnitt', dom),
    verlauf: eintr.map(l => ({ z: l.zeit, p: Math.round((Number(l.punkte) || 0) * 10) / 10 }))
      .sort((a, b) => a.z < b.z ? -1 : 1)
  };
}

function heuteAlsSnapshot() {
  gesamtpunkteAktualisieren();
  const t = Store.tag;
  return {
    datum: t.datum,
    punkte: Math.round(t.gesamtpunkteHeute * 10) / 10,
    fokusMin: fokusMinHeute(),
    erledigt: t.log.filter(istErledigtEintrag).length,
    streak: t.streak,
    wohlstand: Math.round(t.wohlstandStand),
    akkuSchnitt: (t.akkuVerlauf || []).length
      ? Math.round(t.akkuVerlauf.reduce((s, e) => s + e.p, 0) / t.akkuVerlauf.length)
      : null,
    bereiche: punkteNachGruppe('bereich'),
    abschnitte: punkteNachGruppe('abschnitt'),
    verlauf: [...t.log.filter(l => !l.counterAbschluss), ...(t.tickLog || [])]
      .map(l => ({ z: l.zeit, p: Math.round((Number(l.punkte) || 0) * 10) / 10 }))
      .sort((a, b) => a.z < b.z ? -1 : 1),
    // Domänen-getrennt (22.07.2026) → Statistik-Filter auch für Woche/Monat
    proDomain: { dfm: domSnapshot('dfm'), privat: domSnapshot('privat') }
  };
}

/* Kennzahlen eines Snapshots gemäß aktivem Domänenfilter. Alte Snapshots
   ohne proDomain zeigen die Gesamtwerte (nicht domänengetrennt). */
function snapNachFilter(snap) {
  if (domFilter === 'alle' || !snap.proDomain || !snap.proDomain[domFilter]) return snap;
  const d = snap.proDomain[domFilter];
  return { datum: snap.datum, streak: snap.streak, wohlstand: snap.wohlstand,
    akkuSchnitt: snap.akkuSchnitt, ...d };
}

function historieSchreiben() {
  const h = historieLaden().filter(d => d.datum !== Store.tag.datum);
  h.push(heuteAlsSnapshot());
  h.sort((a, b) => a.datum < b.datum ? -1 : 1);
  lsSchreibe(LS.HISTORIE, h.slice(-90));   // 90 Tage reichen für alle Ansichten
}

/* ════════════════════════════════════════════════════════════════════
   Rendering
   ════════════════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);

function minAlsUhrzeit(min) {
  return String(Math.floor(min / 60)).padStart(2, '0') + ':' + String(min % 60).padStart(2, '0');
}
function uhrzeitAlsMin(str) {
  if (!str) return null;
  const [h, m] = str.split(':').map(Number);
  return (isNaN(h) || isNaN(m)) ? null : h * 60 + m;
}
function fmtPunkte(p) {
  return (Math.round(p * 10) / 10).toLocaleString('de-DE', { maximumFractionDigits: 1 });
}
function fmtDauer(sekGesamt) {
  const s = Math.floor(sekGesamt);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), r = s % 60;
  return (h > 0 ? h + ':' + String(m).padStart(2, '0') : String(m).padStart(2, '0')) + ':' + String(r).padStart(2, '0');
}

const TYP_ICON = { aufgabe: '📋', routine: '🔁', counter: '🔢' };

function karteHtml(item, imStream) {
  // Farbcodierung: Routine lila, Counter grün/rot nach Stand, sonst Domäne
  let farbe = item.domain;
  if (item.typ === 'routine') farbe = 'routine';
  if (item.typ === 'counter') farbe = counterIstSchlecht(item) ? 'cschlecht' : 'cgut';
  const klassen = ['karte', farbe];
  if (item.status === 'erledigt') klassen.push('erledigt');
  if (fokus && fokus.itemId === item.id) klassen.push('fokussiert');
  const pp = (fokus && fokus.itemId === item.id && fokus.laeuft) ? '⏸' : '▶';
  const meta = [];
  meta.push('<span>' + TYP_ICON[item.typ] + '</span>');
  meta.push('<span class="pkt">' + fmtPunkte(anzeigePunkte(item)) + ' P</span>');
  if (item.streamSlot != null) meta.push('<span class="zeit">' + minAlsUhrzeit(item.streamSlot) + '</span>');
  if (item.aufwandGeplantMin > 0) meta.push('<span class="zeit">' + Math.round(minutenInklFokus(item)) + '/' + item.aufwandGeplantMin + ' min</span>');
  else if (minutenInklFokus(item) >= 1) meta.push('<span class="zeit">' + Math.round(minutenInklFokus(item)) + ' min</span>');
  if (item.deadline) {
    const t = tageBisDeadline(item.deadline);
    meta.push('<span class="' + (t < 0 ? 'ueberfaellig' : '') + '">📅 ' + (t === 0 ? 'heute' : (t < 0 ? Math.abs(t) + ' Tage über' : 'in ' + t + ' T')) + '</span>');
  }
  if (item.unteraufgaben && item.unteraufgaben.length) {
    meta.push('<span>☑ ' + item.unteraufgaben.filter(u => u.erledigt).length + '/' + item.unteraufgaben.length + '</span>');
  }
  if (item.tageGeschoben > 0) meta.push('<span style="color:var(--warn);font-weight:700">⏩ ' + item.tageGeschoben + '× geschoben</span>');
  if (item.typ === 'routine' && item.status !== 'erledigt') {
    const ueber = routineUeberfaelligTage(item);
    if (routineFaellig(item)) {
      meta.push('<span class="' + (ueber > 0 ? 'ueberfaellig' : '') + '">⏳ '
        + (ueber > 0 ? ueber + ' T überfällig' : 'heute fällig') + '</span>');
    } else {
      const naechste = routineNaechsteIn(item);
      if (naechste) meta.push('<span>⏳ wieder in ' + naechste + ' T</span>');
    }
  }
  if (item.prioritaet === 'muss') meta.push('<span style="color:var(--bad);font-weight:700">MUSS</span>');
  if (item.prioritaet === 'idee') meta.push('<span>Idee</span>');
  if (item.projekt) meta.push('<span>' + escapeHtml(item.projekt) + '</span>');
  if (item.istAnker) meta.push('<span>📌 Anker</span>');

  // Rechtes Bedien-Feld: Häkchen — bei Countern das Tick-Feld (+1)
  const rechts = item.typ === 'counter'
    ? '<button class="kcheck" data-aktion="tick" aria-label="Tick +1"><span class="tickzahl">+' + (item.tickStandHeute || 0) + '</span></button>'
    : '<button class="kcheck" data-aktion="check" aria-label="Abhaken"><span class="box">' + (item.status === 'erledigt' ? '✓' : '') + '</span></button>';

  return '<article class="' + klassen.join(' ') + '" data-id="' + item.id + '">'
    + '<button class="kpp" data-aktion="pp" aria-label="Fokus Play/Pause">' + pp + '</button>'
    + '<div class="kmain" data-aktion="detail">'
    +   '<div class="ktitel">' + escapeHtml(item.titel || '(ohne Titel)') + '</div>'
    +   '<div class="kmeta">' + meta.join('') + '</div>'
    + '</div>'
    + rechts
    // Ein-Tap: Warteschlange ⇄ Tagesstream (21.07.2026)
    + (item.typ !== 'counter' && !item.istAnker
      ? '<button class="kstream" data-aktion="streamtoggle" aria-label="Stream-Wechsel">'
        + (item.streamSlot != null ? '⤵' : '⤴') + '</button>'
      : '')
    // Griff (7.2): NUR zum Verschieben im Stream — Anker fix (5.2)
    + (imStream && !item.istAnker ? '<span class="kgriff" aria-hidden="true">⠿</span>' : '<span class="kgriff" style="visibility:hidden">⠿</span>')
    + '</article>';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

/* Stream chronologisch nach Slot (5.1). Warteschlange = nur Aufgaben —
   Routinen leben in den Abschnitts-Feldern, Counter im Counter-Feld. */
let felderOffen = lsLese('fokus2.felder', { counter: true, morgen: true, tagsueber: true, abend: true });
function felderSpeichern() { lsSchreibe('fokus2.felder', felderOffen); }

function renderStream() {
  // Erledigtes nur zeigen, wenn es HEUTE erledigt wurde (steht im Tages-Log)
  const heuteErledigt = new Set(Store.tag.log
    .filter(l => !l.uaId && !l.counterAbschluss && !l.routineVerpasst && !l.aussetzer)
    .map(l => l.itemId));
  // Sortierung (22.07.2026): begonnene Aufgaben zuerst, absteigend nach
  // investierter Zeit — darunter die unangefangenen chronologisch.
  const investiert = i => (i.status === 'in_arbeit' || minutenInklFokus(i) >= 1) ? minutenInklFokus(i) : -1;
  const stream = Store.items.filter(i => i.streamSlot != null && i.typ !== 'counter'
      && i.imStreamAnzeigen !== false && domSichtbar(i.domain) && !i.nachSyncWeg
      && (i.status !== 'erledigt' || heuteErledigt.has(i.id)))
    .sort((a, b) => {
      const ia = investiert(a), ib = investiert(b);
      if (ia >= 0 || ib >= 0) return ib - ia;          // begonnen vor unbegonnen, mehr Zeit zuerst
      return a.streamSlot - b.streamSlot;
    });
  const queue = Store.items.filter(i => i.typ === 'aufgabe' && i.streamSlot == null
    && i.status !== 'erledigt' && domSichtbar(i.domain) && !i.nachSyncWeg)
    .sort((a, b) => anzeigePunkte(b) - anzeigePunkte(a));
  const queueFertig = Store.items.filter(i => i.typ === 'aufgabe' && i.streamSlot == null
    && i.status === 'erledigt' && heuteErledigt.has(i.id) && domSichtbar(i.domain) && !i.nachSyncWeg);

  $('domFilterStream').innerHTML = domFilterHtml('domSegStream');
  domFilterVerdrahten($('domSegStream'));

  $('streamListe').innerHTML = stream.length
    ? stream.map(i => karteHtml(i, true)).join('')
    : '<div class="leer">Noch nichts im Stream — Items aus der Warteschlange über die Detailansicht einplanen.</div>';
  $('queueListe').innerHTML = (queue.length + queueFertig.length)
    ? queue.concat(queueFertig).map(i => karteHtml(i, false)).join('')
    : '<div class="leer">Warteschlange leer. Über die Fokus-Leiste kannst du sofort einen Instant-Fokus starten.</div>';

/* Routinen in klappbaren Abschnitts-Feldern unter dem Stream. */
const ABSCHNITTE = [['morgen', '🌅 Morgen'], ['tagsueber', '☀️ Tagsüber'], ['abend', '🌙 Abends']];

function routineKarteHtml(r) {
  const ausgesetzt = r.ausgesetztAm === heuteIso();
  const faellig = routineFaellig(r);
  const ueber = routineUeberfaelligTage(r);
  const klassen = ['karte', 'routine', 'spalte'];
  if (r.status === 'erledigt') klassen.push('erledigt');
  if (ausgesetzt) klassen.push('ausgesetzt');
  if (fokus && fokus.itemId === r.id) klassen.push('fokussiert');
  const pp = (fokus && fokus.itemId === r.id && fokus.laeuft) ? '⏸' : '▶';

  const meta = [];
  meta.push('<span style="color:var(--warn);font-weight:700">🔥 ' + (r.routineStreak || 0) + '</span>');
  meta.push('<span>' + rhythmusLabel(r) + '</span>');
  meta.push('<span class="pkt">+' + fmtPunkte(anzeigePunkte(r)) + ' P</span>');
  meta.push('<span style="color:var(--bad)">' + fmtPunkte(Store.settings.rhythmusVerpasstProTag) + ' P verpasst</span>');
  if (r.status === 'erledigt') meta.push('<span style="color:var(--ok);font-weight:700">✓ heute</span>');
  else if (ausgesetzt) meta.push('<span>⏭ ausgesetzt</span>');
  else if (faellig && ueber > 0) meta.push('<span class="ueberfaellig">' + ueber + ' T überfällig</span>');
  else if (faellig) meta.push('<span style="color:var(--warn);font-weight:700">heute fällig</span>');
  else meta.push('<span>wieder in ' + (routineNaechsteIn(r) || '?') + ' T</span>');
  if (r.streakGebrochen && r.status !== 'erledigt') meta.push('<span class="ueberfaellig">💔 Streak gebrochen</span>');

  const uas = r.unteraufgaben || [];
  const uamini = uas.length
    ? '<div class="uamini">' + uas.map(u =>
        '<div class="umzeile' + (u.erledigt ? ' fertig' : '') + '">'
        + '<button class="umbox" data-aktion="uatoggle" data-ua="' + u.id + '" aria-label="Unteraufgabe"><span>' + (u.erledigt ? '✓' : '') + '</span></button>'
        + '<span class="umtitel">' + escapeHtml(u.titel) + '</span>'
        + '</div>').join('') + '</div>'
    : '';
  const footer = (faellig && !ausgesetzt && r.status !== 'erledigt')
    ? '<div class="kfooter">'
      + '<button data-aktion="aussetzen" data-abzug="0">⏭ Aussetzen</button>'
      + '<button data-aktion="aussetzen" data-abzug="1">⏭ Aussetzen (' + fmtPunkte(Store.settings.rhythmusVerpasstProTag) + ' P)</button>'
      + '</div>'
    : '';

  return '<article class="' + klassen.join(' ') + '" data-id="' + r.id + '">'
    + '<div class="krow">'
    + '<button class="kpp" data-aktion="pp" aria-label="Fokus Play/Pause">' + pp + '</button>'
    + '<div class="kmain" data-aktion="detail">'
    + '<div class="ktitel">' + escapeHtml(r.titel || '(ohne Titel)') + '</div>'
    + '<div class="kmeta">' + meta.join('') + '</div>'
    + '</div>'
    + '<button class="kcheck" data-aktion="check" aria-label="Abhaken"><span class="box">' + (r.status === 'erledigt' ? '✓' : '') + '</span></button>'
    + '<span class="kgriff" style="visibility:hidden">⠿</span>'
    + '</div>'
    + uamini + footer
    + '</article>';
}

function renderRoutinenFelder() {
  const routinen = Store.items.filter(i => i.typ === 'routine');
  if (!routinen.length) { $('routinenFelder').innerHTML = ''; return; }
  $('routinenFelder').innerHTML = ABSCHNITTE.map(([key, label]) => {
    const liste = routinen.filter(r => (r.tagesabschnitt || 'tagsueber') === key)

      + '<div class="taccinhalt">' + liste.map(routineKarteHtml).join('') + '</div></div>';

/* Arbeitstag-Fenster in Minuten. Ende ≤ Start gilt als „bis (nach) Mitternacht"
   → +24 h, damit die Tageslänge nie auf ~0 kollabiert (Fix 22.07.2026 — sonst
   wird die Soll-Rate um Faktor 60 aufgebläht und die Kurve läuft aus dem Bild). */
function arbeitstagFenster() {
  const s = Store.settings;
  const start = uhrzeitAlsMin(s.arbeitstagStart);
  const ende = uhrzeitAlsMin(s.arbeitstagEnde);
  const st = (start == null ? 480 : start);
  let en = (ende == null ? 1080 : ende);
  if (en <= st) en += 1440;
  return { start: st, ende: en, spanne: en - st };
}

/* Soll für heute (Gesamtpunkte + Rate P/Std). Ein manueller Wert aus den
   Einstellungen (sollPunkteProStd > 0) überschreibt das aus den geplanten
   Aufgaben berechnete Soll (Pascal 22.07.2026). `gefiltert` = Domänenfilter
   berücksichtigen (nur Statistik-Diagramm; die Statusleiste bleibt global). */
function sollWerte(gefiltert) {
  const std = arbeitstagFenster().spanne / 60;
  const manuell = Number(Store.settings.sollPunkteProStd) || 0;
  const domAktiv = gefiltert && domFilter !== 'alle';
  if (manuell > 0 && !domAktiv) return { gesamt: manuell * std, proStd: manuell, std };
  const gesamt = Store.items.filter(i => i.streamSlot != null && i.typ !== 'counter'
      && (!domAktiv || domSichtbar(i.domain)))
    .reduce((sum, i) => sum + (Number(anzeigePunkte(i)) || 0), 0);
  return { gesamt, proStd: std > 0 ? gesamt / std : 0, std };
}

/* Pace-Leiste (4.4/3.6): dünner Zeitstrich + Punkte/Std ist vs. Soll. */
function renderPace() {
  const s = Store.settings;
  const { start, spanne } = arbeitstagFenster();
  const jetzt = new Date();
  const jetztMin = jetzt.getHours() * 60 + jetzt.getMinutes();
  const anteil = Math.min(1, Math.max(0, (jetztMin - start) / spanne));

  // Tagesziel: manueller Soll-Wert oder Summe der geplanten Stream-Punkte (3.6)
  const soll = sollWerte(false);
  const ziel = soll.gesamt, sollProStd = soll.proStd;
  const vergangeneStd = Math.max(0.1, (jetztMin - start) / 60);
  gesamtpunkteAktualisieren();
  const istProStd = anteil > 0 ? Store.tag.gesamtpunkteHeute / vergangeneStd : 0;
  const imSoll = istProStd >= sollProStd;

  $('pace').innerHTML =
    '<div class="strich">'
    + '<div class="fuell" style="width:' + (anteil * 100) + '%"></div>'
    + '<div class="jetzt" style="left:' + (anteil * 100) + '%"></div>'
    + '</div>'
    + '<div class="zeile">'
    + '<span class="ist ' + (ziel > 0 ? (imSoll ? 'gut' : 'schlecht') : '') + '">'
    +   fmtPunkte(istProStd) + ' P/Std</span>'
    + '<span>Soll ' + fmtPunkte(sollProStd) + ' P/Std</span>'
    + '<span>' + fmtPunkte(Store.tag.gesamtpunkteHeute) + ' P heute</span>'
    + '<span>' + s.arbeitstagStart + '–' + s.arbeitstagEnde + '</span>'
    + '</div>';
}

function renderFokusbar() {

/* ── Statusleiste (21.07.2026) ────────────────────────────────────── */
function paceWerte() {
  const { start } = arbeitstagFenster();
  const jetzt = new Date();
  const jetztMin = jetzt.getHours() * 60 + jetzt.getMinutes();
  gesamtpunkteAktualisieren();
  const soll = sollWerte(false).proStd;
  const ist = jetztMin > start
    ? Store.tag.gesamtpunkteHeute / Math.max(0.1, (jetztMin - start) / 60)
    : 0;
  return { ist, soll };
}

const PACE_PFEILE = ['⇊', '↓', '↘', '→', '↗', '↑', '⇈'];

function renderStatusbar() {
  const p = akkuLive();
  $('sAkkuPct').textContent = p != null ? Math.round(p) + '%' : '–%';

  // Punkte-Konto + Fortschritt zum günstigsten nächsten Kauf (Etappe 2)
  const k = konto();
  $('sPunkte').textContent = fmtPunkte(k) + ' P';
  const nk = naechsterKauf();
  if (nk) {
    const icon = BELOHNUNG[nk.kat].icon;
    if (k >= nk.preis) {
      $('sZiel').textContent = icon + ' Kauf möglich!';
      $('sBar').style.width = '100%';
    } else {
      $('sZiel').textContent = icon + ' noch ' + fmtPunkte(nk.preis - k) + ' P';
      $('sBar').style.width = Math.max(0, Math.min(100, k / nk.preis * 100)).toFixed(1) + '%';
    }
  } else {
    $('sZiel').textContent = 'Alles gekauft';
    $('sBar').style.width = '100%';
  }

  // Pace-Pfeil: 7 Zonen relativ zum Soll (Grenzen als Settings)
  const { ist, soll } = paceWerte();
  const s = Store.settings;
  const z1 = s.pfeilZone1 || 5, z2 = s.pfeilZone2 || 15, z3 = s.pfeilZone3 || 40;
  let idx = 3, farbe = 'var(--mut)';
  if (soll > 0) {
    const abw = (ist - soll) / soll * 100;
    if (abw >= z3) idx = 6; else if (abw >= z2) idx = 5; else if (abw >= z1) idx = 4;
    else if (abw <= -z3) idx = 0; else if (abw <= -z2) idx = 1; else if (abw <= -z1) idx = 2;
    if (idx > 3) farbe = 'var(--ok)';
    if (idx < 3) farbe = 'var(--bad)';
  }
  $('sPfeil').textContent = PACE_PFEILE[idx];
  $('sPfeil').style.color = farbe;
  $('sPaceZahl').textContent = Math.round(ist) + '/' + Math.round(soll);
}

function renderAlles() {
  renderTagAktionen();
  renderStream();
  renderPace();
  renderFokusbar();
  renderStatusbar();
}
