    + '</div></div>';

  sheetOeffnen('Fokus-Tacho', html, 'tacho');
  tachoVerdrahten(item);
  tachoTick();
}

function tachoVerdrahten(item) {
  document.querySelectorAll('#sheetInhalt .tacc .tacckopf').forEach(kopf => {
    kopf.addEventListener('click', () => kopf.parentElement.classList.toggle('offen'));
  });
  $('tStart').addEventListener('click', () => {
    const name = $('tInstant').value.trim();
    if (!name) { $('tInstant').focus(); return; }
    const { item: neu } = Store.upsertItem({ titel: name, prioritaet: 'muss', status: 'in_arbeit' });
    fokusStarten(neu.id);
    sheetTachoOeffnen();
  });
  $('tInstant').addEventListener('keydown', e => { if (e.key === 'Enter') $('tStart').click(); });
  if (!item) return;

  $('tPp').addEventListener('click', () => { fokusToggle(); tachoTick(); });
  $('tCheck').addEventListener('click', () => { abhaken(item.id); sheetTachoOeffnen(); });
  document.querySelector('#sheetInhalt [data-tackt="detail"]')
    .addEventListener('click', () => sheetDetailOeffnen(item.id));

  const kommentar = $('tKommentar');
  if (kommentar) kommentar.addEventListener('input', () => {
    item.kommentarFuerClaude = kommentar.value;
    Store.speichereItems();
  });

  document.querySelectorAll('#sheetInhalt .regler').forEach(reg => {
    const feld = reg.dataset.regler;
    const range = reg.querySelector('input');
    range.addEventListener('input', () => {
      const stufen = REGLER_DEFS[feld].stufen;
      item[feld] = stufen[Number(range.value)];
      reg.querySelectorAll('.stufen span').forEach((sp, i) =>
        sp.classList.toggle('on', i === Number(range.value)));
      Store.speichereItems();
      tachoTick();
    });
  });

  const uaAdd = $('tUaAdd');
  if (uaAdd) {
    const anlegen = () => {
      if (unteraufgabeAnlegen(item.id, $('tUaNeu').value)) sheetTachoOeffnen();
    };
    uaAdd.addEventListener('click', anlegen);
    $('tUaNeu').addEventListener('keydown', e => { if (e.key === 'Enter') anlegen(); });
  }
  const uaListe = $('tUaListe');
  if (uaListe) {
    uaListe.addEventListener('click', e => {
      const reihe = e.target.closest('.uareihe');
      const akt = e.target.closest('[data-uakt]');
      if (!reihe || !akt) return;
      if (akt.dataset.uakt === 'toggle') {
        unteraufgabeToggle(item.id, reihe.dataset.ua);
        renderAlles();
        sheetTachoOeffnen();
      } else if (akt.dataset.uakt === 'loeschen') {
        item.unteraufgaben = item.unteraufgaben.filter(u => u.id !== reihe.dataset.ua);
        Store.tag.log = Store.tag.log.filter(l => !(l.itemId === item.id && l.uaId === reihe.dataset.ua));
        gesamtpunkteAktualisieren();
        Store.speichereItems(); Store.speichereTag();
        renderAlles();
        sheetTachoOeffnen();
      }
    });
    uaListe.addEventListener('input', e => {
      const reihe = e.target.closest('.uareihe');
      if (!reihe || !e.target.matches('[data-uakt="min"]')) return;
      const ua = item.unteraufgaben.find(u => u.id === reihe.dataset.ua);
      if (ua) { ua.geplantMin = Number(e.target.value) || null; Store.speichereItems(); tachoTick(); }
    });
  }
}

/* Sekündliches Live-Update des Tachos (Ring, Restzeit, Leiste, ETA). */
function tachoTick() {
  if (sheetOffenFuer !== 'tacho') return;
  const item = fokusItem();

  // Akku
  const akkuEl = $('tAkku');
  if (akkuEl) akkuEl.textContent = Store.tag.akkuProzent != null ? Math.round(Store.tag.akkuProzent) + '%' : '–%';

  // Upgrade-Leiste (auch ohne Fokus live)
  const stufen = Store.settings.avatarStufen || DEFAULT_SETTINGS.avatarStufen;
  const stufe = (belohnung && belohnung.avatarStufe) || 1;
  const prev = stufen[stufe - 1] || 0;
  const next = stufen[stufe];
  gesamtpunkteAktualisieren();
  const basis = Store.tag.abgeschlossen
    ? Store.tag.wohlstandStand
    : Store.tag.wohlstandStand + Store.tag.gesamtpunkteHeute;
  const delta = fokusLiveDelta();
  if ($('tBarG')) {
    if (next != null) {
      const spanne = Math.max(1, next - prev);
      const g = Math.min(1, Math.max(0, (basis - prev) / spanne));
      const y = Math.min(1 - g, delta / spanne);
      let h = 0;
      if (item && item.typ !== 'counter' && item.aufwandGeplantMin > 0) {
        const potenzial = Math.max(0,
          punkteBeiMinuten(item, Math.max(item.aufwandGeplantMin, minutenInklFokus(item)))
          - punkteBeiMinuten(item, minutenInklFokus(item)));
        h = Math.min(1 - g - y, potenzial / spanne);
      }
      $('tBarG').style.width = (g * 100).toFixed(1) + '%';
      $('tBarY').style.width = (y * 100).toFixed(1) + '%';
      $('tBarH').style.width = (h * 100).toFixed(1) + '%';
      $('tLevelZiel').textContent = 'Stufe ' + (stufe + 1);
      const fehlt = next - (basis + delta);
      const min = item ? minutenInklFokus(item) : 0;
      const ppm = (item && min > 0.2) ? punkteBeiMinuten(item, min) / min : 0;
      $('tEta').textContent = fehlt <= 0 ? 'Level up!' :
        (ppm > 0 ? '~' + Math.ceil(fehlt / ppm) + ' min bei ' + fmtPunkte(ppm) + ' P/min'
                 : fmtPunkte(fehlt) + ' P fehlen');
    } else {
      $('tBarG').style.width = '100%'; $('tBarY').style.width = '0'; $('tBarH').style.width = '0';
      $('tLevelZiel').textContent = 'Max.'; $('tEta').textContent = 'Höchste Stufe erreicht';
    }
  }

  // Ring
  const zeitArc = $('tZeitArc');
  if (!zeitArc) return;
  const rotArc = $('tRotArc'), progArc = $('tProgArc');
  const dot = $('tKopfDot'), halo = $('tKopfHalo');
  if (!item) {
    zeitArc.setAttribute('stroke-dasharray', '0 ' + RING_C);
    rotArc.setAttribute('stroke-dasharray', '0 ' + RING_C);
    progArc.setAttribute('stroke-dasharray', '0 ' + RING_CP);
    dot.setAttribute('opacity', '0'); halo.setAttribute('opacity', '0');
    $('tTicks').innerHTML = '';
    $('tRest').textContent = '–'; $('tRest').className = 'trest';
    $('tRestSub').textContent = 'Kein Fokus aktiv';
    $('tUaBox').hidden = true;
    return;
  }

  const geplant = item.aufwandGeplantMin || 0;
  const min = minutenInklFokus(item);
  let farbeKlasse = 'gruen', kopfFarbe = 'var(--ok)';
  if (geplant > 0) {
    const pct = min / geplant;
    if (pct >= 1.1) { farbeKlasse = 'rot'; kopfFarbe = 'var(--bad)'; }
    else if (pct >= 0.8) { farbeKlasse = 'gelb'; kopfFarbe = 'var(--warn)'; }
    zeitArc.setAttribute('stroke', pct >= 0.8 ? 'url(#gGelb)' : 'url(#gLauf)');
    zeitArc.setAttribute('stroke-dasharray', (Math.min(1, pct) * RING_C).toFixed(1) + ' ' + RING_C);
    // Überzieh-Runde: dreht weiter und übermalt (gelb bis 110%, dann rot)
    const ueber = pct > 1 ? Math.min(1, pct - 1) : 0;
    rotArc.setAttribute('stroke', pct >= 1.1 ? 'url(#gRot)' : 'url(#gGelb)');
    rotArc.setAttribute('stroke-dasharray', (ueber * RING_C).toFixed(1) + ' ' + RING_C);
    const rest = geplant - min;
    $('tRest').textContent = rest >= 0 ? fmtDauer(rest * 60) : '+' + fmtDauer(-rest * 60);
    $('tRest').className = 'trest ' + farbeKlasse;
    $('tRestSub').textContent = 'von ' + geplant + ' min · ' + Math.round(pct * 100) + '% verbraucht';
    setzeKopf(dot, halo, (pct % 1), kopfFarbe);
  } else {
    // Stoppuhr-Modus: rotierendes Segment, hochzählend
    const frac = (min * 60 % 60) / 60;
    zeitArc.setAttribute('stroke', 'url(#gLauf)');
    zeitArc.setAttribute('stroke-dasharray', '52 ' + RING_C);
    zeitArc.setAttribute('stroke-dashoffset', (-frac * RING_C).toFixed(1));
    rotArc.setAttribute('stroke-dasharray', '0 ' + RING_C);
    $('tRest').textContent = fmtDauer(min * 60);
    $('tRest').className = 'trest';
    $('tRestSub').textContent = 'keine Zeit geplant — Stoppuhr';
    setzeKopf(dot, halo, frac, 'var(--cyan)');
  }

  // Rennen: Fortschritts-Ring = abgehakte Zeit-Anteile
  const uas = item.unteraufgaben || [];
  const zeiten = zeitVerteilung(item);
  const summe = zeiten.reduce((s, z) => s + z, 0);
  let progFrac = 0;
  if (uas.length) {
    const fertigZeit = uas.reduce((s, u, i) => s + (u.erledigt ? zeiten[i] : 0), 0);
    progFrac = summe > 0 ? fertigZeit / summe : uas.filter(u => u.erledigt).length / uas.length;
  }
  progArc.setAttribute('stroke-dasharray', (Math.min(1, progFrac) * RING_CP).toFixed(1) + ' ' + RING_CP);

  // Striche = Soll-Übergänge der Unteraufgaben
  let ticks = '';
  if (uas.length > 1 && summe > 0) {
    let cum = 0;
    uas.slice(0, -1).forEach((u, i) => {
      cum += zeiten[i];
      const w = cum / summe * 2 * Math.PI - Math.PI / 2;
      ticks += '<line x1="' + (66 + 53 * Math.cos(w)).toFixed(1) + '" y1="' + (66 + 53 * Math.sin(w)).toFixed(1)
        + '" x2="' + (66 + 63 * Math.cos(w)).toFixed(1) + '" y2="' + (66 + 63 * Math.sin(w)).toFixed(1)
        + '" stroke="var(--bg)" stroke-width="3"/>';
    });
  }
  $('tTicks').innerHTML = ticks;

  // Info-Box: aktuelle Unteraufgabe + ihr Zeitfenster
  const aktIdx = uas.findIndex(u => !u.erledigt);
  if (aktIdx >= 0) {
    $('tUaBox').hidden = false;
    $('tUaNum').textContent = (aktIdx + 1) + '/' + uas.length;
    $('tUaName').textContent = uas[aktIdx].titel;
    if (summe > 0 && geplant > 0) {
      const cumEnde = zeiten.slice(0, aktIdx + 1).reduce((s, z) => s + z, 0);
      const segRest = cumEnde - min;
      $('tUaRest').textContent = segRest >= 0
        ? 'Abschnitt: noch ' + fmtDauer(segRest * 60)
        : 'Abschnitt: ' + fmtDauer(-segRest * 60) + ' drüber';
      $('tUaRest').style.color = segRest >= 0 ? 'var(--mut)' : 'var(--bad)';
    } else {
      $('tUaRest').textContent = '';
    }
  } else {
    $('tUaBox').hidden = true;
  }

  const gesamtEl = $('tGesamtP');
  if (gesamtEl) gesamtEl.textContent = fmtPunkte(punkteBeiMinuten(item, Math.max(min, geplant)));
  const pp = $('tPp');
  if (pp) pp.textContent = (fokus && fokus.laeuft) ? '⏸' : '▶';
}

function setzeKopf(dot, halo, frac, farbe) {
  const w = frac * 2 * Math.PI - Math.PI / 2;
  const x = (66 + 58 * Math.cos(w)).toFixed(1), y = (66 + 58 * Math.sin(w)).toFixed(1);
  dot.setAttribute('cx', x); dot.setAttribute('cy', y); dot.setAttribute('opacity', '1');
  halo.setAttribute('cx', x); halo.setAttribute('cy', y); halo.setAttribute('opacity', '.5');
  halo.setAttribute('fill', farbe);
}

/* Freischalt-Stand: stufen[kat] = Anzahl freigeschalteter Stufen (1-basiert).
   Stufe 1 jeder Kategorie (Schwelle 0) ist von Anfang an offen. */
let belohnung = lsLese(LS.BELOHNUNG, null);
function belohnungInit() {
  if (!belohnung) {
    belohnung = { stufen: {}, neu: [], letzterWurf: null };
    KAT_KEYS.forEach(k => belohnung.stufen[k] = 1);
    belohnungSpeichern();
  }
}
function belohnungSpeichern() { lsSchreibe(LS.BELOHNUNG, belohnung); }

/* Nächste Stufe einer Kategorie „eligible"? (Schwelle + Cross-Prerequisite, 6.3) */
function stufeEligible(kat) {
  const naechste = BELOHNUNG[kat].stufen[belohnung.stufen[kat]];   // Index = Anzahl offen
  if (!naechste) return false;                                     // Leiter voll
  if (Store.tag.wohlstandStand < naechste[1]) return false;
  const req = naechste[2];
  if (req && (belohnung.stufen[req[0]] || 0) < req[1]) return false;
  return true;
}

/* Zufallsfaktor (6.3): tägliche Chance je eligible Objekt, zufällige
   Reihenfolge. erzwungen=true nach Tagesabschluss (Wohlstand neu). */
function rollFreischaltungen(erzwungen) {
  const heute = heuteIso();
  if (!erzwungen && belohnung.letzterWurf === heute) return;
  belohnung.letzterWurf = heute;
  const chance = (Store.settings.freischaltChanceProzent != null
    ? Store.settings.freischaltChanceProzent : 40) / 100;
  [...KAT_KEYS].sort(() => Math.random() - 0.5).forEach(k => {
    if (stufeEligible(k) && Math.random() < chance) {
      const idx = belohnung.stufen[k];               // 0-basierter Index der neuen Stufe
      belohnung.stufen[k] = idx + 1;
      belohnung.neu.push({ kat: k, stufe: idx + 1, name: BELOHNUNG[k].stufen[idx][0] });
    }
  });
  belohnungSpeichern();
}

/* ── Pixel-Avatar (6.2): 24×30-Raster, 2x-Dichte ggü. Stiltest.
     Outfit-Farbe wächst mit der Gesamt-Stufe, Vitalität = Akku-Achse.
     Feinschliff (Ähnlichkeit zu Pascal) folgt mit Referenzfotos. ── */

                      '#3ecf8e','#3ecf8e','#b98af7','#b98af7','#f2b84b','#f2b84b'];
const AV_MAP = [
  '........HHHHHHHH........',
  '......HHHHHHHHHHHH......',
  '......HHHHHHHHHHHH......',
  '......HHSSSSSSSSHH......',
  '......HSSSSSSSSSSH......',
  '......SSSSSSSSSSSS......',

  '......SSSSSSSSSSSS......',

  '...CCCCCCCCCCCCCCCCCC...',
  '...CCCCCCCCCCCCCCCCCC...',
  '...SSCCCCCCCCCCCCCCSS...',
  '.....CCCCCCCCCCCCCC.....',
  '.....CCCCCCCCCCCCCC.....',

  '.....PPPPPP..PPPPPP.....',
  '.....PPPPPP..PPPPPP.....',
  '.....PPPPPP..PPPPPP.....',
  '.....PPPPPP..PPPPPP.....',
  '.....PPPPPP..PPPPPP.....',
  '....BBBBBBB..BBBBBBB....',
  '....BBBBBBB..BBBBBBB....'
];

function avatarHtml(gesamtStufe, vital) {
  const cloth = AV_TIERFARBE[Math.max(0, Math.min(11, gesamtStufe - 1))];
  const accent = vital ? '#f2b84b' : '#5d6d88';
  let zellen = '';
  AV_MAP.forEach(zeile => {
    for (const c of zeile.padEnd(24, '.').slice(0, 24)) {
      if (c === 'E') zellen += vital ? '<div class="aug"></div>' : '<div style="background:' + AV_FARBEN['-'] + '"></div>';
      else if (c === 'C') zellen += '<div style="background:' + cloth + '"></div>';
      else if (c === 'A') zellen += '<div style="background:' + accent + '"></div>';
      else if (c === '.') zellen += '<div></div>';
      else zellen += '<div style="background:' + (AV_FARBEN[c] || 'transparent') + '"></div>';
    }
  });
  return zellen;
}

/* Vitalität (6.2): getrieben vom Akku-Durchschnitt des Tages. */
function vitalitaet() {
  const v = Store.tag.akkuVerlauf || [];
  if (!v.length) return Store.tag.akkuProzent == null ? true : Store.tag.akkuProzent >= 50;
  return v.reduce((s, e) => s + e.p, 0) / v.length >= 50;
}

/* Avatar-Stufe = eigenes Level über die Gesamt-Punkte (Änderung 20.07.2026,
   ersetzt den alten Durchschnitt der Kategorie-Stufen). */
function gesamtStufe() {
  return (belohnung && belohnung.avatarStufe) || 1;
}

/* Aufschlüsselung (3.5): erledigte Punkte nach Bereich oder Tagesabschnitt. */
function punkteNachGruppe(achse) {
  const gruppen = {};
  const add = (key, p) => { gruppen[key] = (gruppen[key] || 0) + p; };
  // counterAbschluss-Einträge auslassen — die Ticks stecken schon im tickLog
  const eintraege = [...Store.tag.log.filter(l => !l.counterAbschluss), ...(Store.tag.tickLog || [])];
  eintraege.forEach(l => {
    if (achse === 'bereich') {
      add(l.bereich || (l.domain === 'dfm' ? 'DFM' : 'Privat'), l.punkte);
    } else {
      const std = new Date(l.zeit).getHours();
      const s = Store.settings;
      add(std < s.abschnittMorgenBis ? 'Morgen' : std < s.abschnittTagBis ? 'Tag' : 'Abend', l.punkte);
    }
  });
  return gruppen;
}

let aufAchse = 'bereich';

function renderBelohnung() {
  const vital = vitalitaet();
  const stufe = gesamtStufe();
  const t = Store.tag;
  const wl = wohlstandLive();   // Live-Anzeige (Änderung 20.07.2026)

  // Pace wie in der Leiste (3.6)
  const s = Store.settings;
  const start = uhrzeitAlsMin(s.arbeitstagStart), ende = uhrzeitAlsMin(s.arbeitstagEnde);
  const jetzt = new Date(); const jetztMin = jetzt.getHours() * 60 + jetzt.getMinutes();
  const vergangeneStd = Math.max(0.1, (jetztMin - start) / 60);
  const pace = jetztMin > start ? t.gesamtpunkteHeute / vergangeneStd : 0;

  let html = ''
    + '<div class="avcard">'
    + '<div class="avscene' + (vital ? '' : ' erschoepft') + '"><div class="avground"></div>'
    + '<div class="avgrid">' + avatarHtml(stufe, vital) + '</div></div>'
    + '<div class="rankline"><div class="rankname">Avatar-Stufe ' + stufe + '/' + (Store.settings.avatarStufen || DEFAULT_SETTINGS.avatarStufen).length + '</div>'
    + '<div class="rankpts">Wohlstand ' + fmtPunkte(wl) + ' P (live)</div></div>'
    + '<div class="statsgrid">'
    + '<div class="statbox"><div class="v">' + fmtPunkte(t.gesamtpunkteHeute) + '</div><div class="k">Punkte heute</div></div>'
    + '<div class="statbox"><div class="v">' + t.streak + '🔥</div><div class="k">Streak</div></div>'
    + '<div class="statbox"><div class="v">' + (vital ? 'Vital' : 'Erschöpft') + '</div><div class="k">Zustand</div></div>'
    + '<div class="statbox"><div class="v">' + fmtPunkte(pace) + '/Std</div><div class="k">Pace</div></div>'
    + '</div></div>';

  // Energie-Kurve (6.1)
  html += '<h2 class="sechead">Energie heute</h2>' + akkuKurveHtml();

  // Aufschlüsselung (3.5/6.4)
  html += '<h2 class="sechead">Aufschlüsselung</h2>'
    + '<div class="vtoggle">'
    + '<button data-achse="bereich" class="' + (aufAchse === 'bereich' ? 'on' : '') + '">Nach Bereich</button>'

    + '</div><div id="aufListe">' + aufschluesselungHtml() + '</div>';

  // Kategorie-Leitern (6.3)
  html += '<h2 class="sechead">Freischaltungen</h2>';
  KAT_KEYS.forEach(k => {
    const kat = BELOHNUNG[k];
    const offen = belohnung.stufen[k] || 1;
    const aktuell = kat.stufen[offen - 1];
    const naechste = kat.stufen[offen];
    let barPct = 100, nextText = '🏁 Leiter komplett!', bereit = false;
    if (naechste) {

      if (fehlend > 0)      nextText = '??? · noch ' + fmtPunkte(fehlend) + ' P Wohlstand';
      else if (reqFehlt)    nextText = '🔒 ??? · noch an eine andere Kategorie gebunden';
      else { nextText = '🎁 Bereit — Freischaltung würfelt täglich!'; bereit = true; }
    }
    html += '<div class="katcard">'
      + '<div class="kzeile"><span>' + kat.icon + '</span><span class="kname">' + kat.name + '</span>'
      + '<span class="kstufe">Stufe ' + offen + '/' + kat.stufen.length + '</span></div>'
      + '<div class="kaktuell">' + escapeHtml(aktuell[0]) + '</div>'

      + '<div class="knext' + (bereit ? ' bereit' : '') + '">' + nextText + '</div>'
      + '</div>';
  });

  $('view-belohnung').innerHTML = html;

      $('aufListe').innerHTML = aufschluesselungHtml();

  if (belohnung.neu.length) {
    const namen = belohnung.neu.map(n => BELOHNUNG[n.kat].icon + ' ' + n.name).join(' · ');
    belohnung.neu = [];
    belohnungSpeichern();
    konfetti();
    toastZeigen('🎉 Freigeschaltet: ' + namen);
  }
}

function akkuKurveHtml() {
  const s = Store.settings;
  const start = uhrzeitAlsMin(s.arbeitstagStart), ende = uhrzeitAlsMin(s.arbeitstagEnde);
  const v = Store.tag.akkuVerlauf || [];
  let inhalt;
  if (v.length === 0) {
    inhalt = '<div class="leer">Noch keine Akku-Daten — Tag starten setzt den ersten Punkt.</div>';
  } else {
    const x = m => 6 + Math.min(1, Math.max(0, (m - start) / Math.max(1, ende - start))) * 288;
    const y = p => 64 - (p / 100) * 56;
    const punkte = v.map(e => x(e.min).toFixed(1) + ',' + y(e.p).toFixed(1));
    // Kurve bis „jetzt" mit letztem Wert weiterziehen
    const jetzt = new Date(); const jm = jetzt.getHours() * 60 + jetzt.getMinutes();
    if (jm > v[v.length - 1].min) punkte.push(x(jm).toFixed(1) + ',' + y(v[v.length - 1].p).toFixed(1));
    inhalt = '<svg viewBox="0 0 300 70" width="100%" height="70">'
      + '<line x1="6" y1="64" x2="294" y2="64" stroke="var(--line)" stroke-width="1"/>'
      + '<polyline points="' + punkte.join(' ') + '" fill="none" stroke="var(--cyan)" stroke-width="2.5" stroke-linejoin="round"/>'
      + v.map(e => '<circle cx="' + x(e.min).toFixed(1) + '" cy="' + y(e.p).toFixed(1) + '" r="3" fill="var(--cyan)"/>').join('')
      + '</svg>';
  }
  const avg = v.length ? Math.round(v.reduce((a, e) => a + e.p, 0) / v.length) : null;
  return '<div class="akkukarte"><div class="lbl"><span>Akku-Verlauf (' + s.arbeitstagStart + '–' + s.arbeitstagEnde + ')</span>'
    + '<span>' + (avg != null ? 'Ø ' + avg + '%' : '–') + '</span></div>' + inhalt + '</div>';
}

function aufschluesselungHtml() {
  const gruppen = punkteNachGruppe(aufAchse);
  const namen = Object.keys(gruppen);
  if (!namen.length) return '<div class="leer">Noch keine erledigten Punkte heute.</div>';
  const reihenfolge = aufAchse === 'abschnitt'
    ? ['Morgen', 'Tag', 'Abend'].filter(n => namen.includes(n))
    : namen.sort((a, b) => gruppen[b] - gruppen[a]);
  const max = Math.max(...namen.map(n => Math.abs(gruppen[n])), 1);
  return reihenfolge.map(n =>
    '<div class="aufzeile"><span class="albl">' + escapeHtml(n) + '</span>'
    + '<div class="abar"><i style="width:' + Math.round(Math.abs(gruppen[n]) / max * 100) + '%'
    + (gruppen[n] < 0 ? ';background:var(--bad)' : '') + '"></i></div>'
    + '<span class="awert">' + fmtPunkte(gruppen[n]) + ' P</span></div>').join('');
}

let toastTimer;
function toastZeigen(text) {
  const el = $('toast');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

function konfetti(n = 34) {
  const box = $('conf');
  const farben = ['#4f8ef7', '#6dd3e0', '#f2b84b', '#3ecf8e', '#b98af7'];
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'cpiece';
    p.style.background = farben[i % farben.length];
    p.style.left = Math.random() * 100 + '%';
    p.style.top = '-20px';
    box.appendChild(p);
    p.animate(
      [{ transform: 'translate(0,0) rotate(0)', opacity: 1 },
       { transform: 'translate(' + ((Math.random() * 2 - 1) * 160) + 'px,' + (window.innerHeight + 40) + 'px) rotate(' + (Math.random() * 720 - 360) + 'deg)', opacity: .9 }],
      { duration: 1000 + Math.random() * 800, easing: 'cubic-bezier(.2,.6,.4,1)' }
    ).onfinish = () => p.remove();
  }
}

/* Kopieren mit Fallback (file:// bzw. ältere WebViews) */
function inZwischenablage(text, btn) {
  const fertig = () => { const alt = btn.textContent; btn.textContent = '✓ Kopiert'; setTimeout(() => btn.textContent = alt, 1500); };
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    ta.remove(); fertig();
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(fertig, fallback);
  } else fallback();
}

/* Import-Paket aus eingefügtem Text lesen (toleriert ```json-Zäune). */
function importParsen(text) {
  const m = String(text).match(/\{[\s\S]*\}/);
  if (!m) throw new Error('Kein JSON-Block gefunden');
  return JSON.parse(m[0]);
}

function herunterladen(dateiname, inhalt) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([inhalt], { type: 'text/markdown' }));
  a.download = dateiname;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}

/* ════════════════════════════════════════════════════════════════════
   Verschieben per ⠿-Griff (5.2/5.3): Drag im Stream = neuer Zeitpunkt,
   Push-down-Layout (nie überlappen), Rausziehen = Warteschlange +
   Schiebe-Malus am Tagesende. Anker fix; Vor-/Nachbereitung nur im
   begrenzten Fenster um ihren Anker.
   ════════════════════════════════════════════════════════════════════ */
function jetztRund5() {
  const d = new Date();
  return Math.round((d.getHours() * 60 + d.getMinutes()) / 5) * 5;
}

/* Push-down (5.3): Karten überlappen nie — gleiche/frühere Slots rücken
   in 5-Minuten-Schritten nach hinten. Anker bleiben unangetastet. */
function pushDown() {
  const stream = Store.items.filter(i => i.streamSlot != null)
    .sort((a, b) => a.streamSlot - b.streamSlot || (a.istAnker ? -1 : 1) - (b.istAnker ? -1 : 1));
  let letzte = -Infinity;
  stream.forEach(i => {
    if (i.istAnker) { letzte = Math.max(letzte, i.streamSlot); return; }
    if (i.streamSlot <= letzte) i.streamSlot = letzte + 5;
    letzte = i.streamSlot;
  });
}

/* Kern der Drop-Logik — ziel: {zone:'queue'} | {zone:'stream', index}.
   index = Einfügeposition in der (ohne das Item) sortierten Stream-Liste. */
function dropAnwenden(id, ziel) {
  const item = Store.findeItem(id);
  if (!item || item.istAnker) return;
  if (ziel.zone === 'queue') {
    if (item.streamSlot != null) {
      item.heuteRausgezogen = true;                     // Malus am Tagesende (5.3)
      item.streamSlot = null;
      if (item.status !== 'erledigt') {
        toastZeigen('In Warteschlange — bleibt es unerledigt, gibt es am Tagesende den Schiebe-Malus.');
      }
    }
  } else {
    const stream = Store.items
      .filter(i => i.streamSlot != null && i.id !== id)
      .sort((a, b) => a.streamSlot - b.streamSlot);
    const prev = stream[ziel.index - 1] || null;
    const next = stream[ziel.index] || null;
    let slot;
    const start = uhrzeitAlsMin(Store.settings.arbeitstagStart);
    if (!prev && !next) slot = Math.max(start, jetztRund5());
    else if (!prev)     slot = Math.max(0, next.streamSlot - 15);
    else if (!next)     slot = prev.streamSlot + 30;
    else                slot = Math.round((prev.streamSlot + next.streamSlot) / 2 / 5) * 5;
    // Vor-/Nachbereitung (5.2): Fenster relativ zum Anker-Termin
    if (item.ankerBezugId) {
      const anker = Store.findeItem(item.ankerBezugId);
      if (anker && anker.streamSlot != null) {
        const warVor = item.streamSlot != null
          ? item.streamSlot < anker.streamSlot
          : slot < anker.streamSlot;
        if (warVor) slot = Math.min(slot, anker.streamSlot - 5);   // bis kurz vor den Termin
        else        slot = Math.max(slot, anker.streamSlot + 5);   // danach, bis Tagesende
      }
    }
    item.streamSlot = Math.max(0, Math.min(23 * 60 + 55, slot));
    pushDown();
  }
  Store.speichereItems();
  renderAlles();
}

/* Pointer-Handling: Drag startet NUR am ⠿-Griff und nur in der
   Stream-Hauptansicht (nicht in Sheets) — Kontrakt 7.2. */
(function () {
  let drag = null;
  function markierungLoeschen() {
    document.querySelectorAll('.karte.dropvor').forEach(k => k.classList.remove('dropvor'));
    $('streamListe').classList.remove('dropende');
    $('queueHead').classList.remove('dropziel');
  }
  function zielBestimmen(y) {
    const qh = $('queueHead').getBoundingClientRect();
    if (y >= qh.top) return { zone: 'queue' };
    const karten = [...$('streamListe').querySelectorAll('.karte')].filter(k => k !== drag.karte);
    for (let i = 0; i < karten.length; i++) {
      const r = karten[i].getBoundingClientRect();
      if (y < r.top + r.height / 2) return { zone: 'stream', index: i, el: karten[i] };
    }
    return { zone: 'stream', index: karten.length, el: null };
  }
  document.addEventListener('pointerdown', e => {
    const griff = e.target.closest('.kgriff');
    if (!griff) return;
    const karte = griff.closest('.karte');
    if (!karte || !karte.closest('#view-stream')) return;
    const item = Store.findeItem(karte.dataset.id);
    if (!item || item.istAnker) return;
    e.preventDefault();
    drag = { karte, id: karte.dataset.id, startY: e.clientY, ziel: null };
    karte.classList.add('dragging');
    try { griff.setPointerCapture(e.pointerId); } catch (err) {}
  });
  document.addEventListener('pointermove', e => {
    if (!drag) return;
    e.preventDefault();
    drag.karte.style.transform = 'translateY(' + (e.clientY - drag.startY) + 'px)';
    markierungLoeschen();
    drag.ziel = zielBestimmen(e.clientY);
    if (drag.ziel.zone === 'queue') $('queueHead').classList.add('dropziel');
    else if (drag.ziel.el) drag.ziel.el.classList.add('dropvor');
    else $('streamListe').classList.add('dropende');
  });
  const dragBeenden = () => {
    if (!drag) return;
    markierungLoeschen();
    drag.karte.classList.remove('dragging');
    drag.karte.style.transform = '';
    const { id, ziel } = drag;
    drag = null;
    if (ziel) dropAnwenden(id, ziel);   // ohne Bewegung: Griff löst nichts aus (7.2)
  };
  document.addEventListener('pointerup', dragBeenden);
  document.addEventListener('pointercancel', dragBeenden);
})();

/* ════════════════════════════════════════════════════════════════════
   Interaktion verdrahten
   ════════════════════════════════════════════════════════════════════ */

/* Universeller Karten-Kontrakt (7.2) — EIN Delegat für alle Karten,
   egal ob im Stream, in der Warteschlange oder im Tacho-Sheet:
   ▶⏸ = Fokus-Toggle · Kartenfläche = Detail-Sheet · Häkchen = abhaken. */
document.addEventListener('click', e => {
  // Klappfelder auf der Stream-Seite (Counter / Morgen / Tagsüber / Abends)
  const feldKopf = e.target.closest('#view-stream [data-feld] > .tacckopf');
  if (feldKopf) {
    const key = feldKopf.parentElement.dataset.feld;
    felderOffen[key] = !felderOffen[key];
    felderSpeichern();
    feldKopf.parentElement.classList.toggle('offen', felderOffen[key]);
    return;
  }
  // Counter-Chips: Tap = Tick, ✎ = Detailansicht
  const chip = e.target.closest('.cchip');
  if (chip) {
    if (e.target.closest('[data-cedit]')) sheetDetailOeffnen(chip.dataset.cid);
    else counterTick(chip.dataset.cid);
    return;
  }
  const karte = e.target.closest('.karte');
  if (!karte) return;
  const id = karte.dataset.id;
  const aktion = e.target.closest('[data-aktion]');
  if (!aktion) return;
  switch (aktion.dataset.aktion) {
    case 'uatoggle':
      unteraufgabeToggle(id, aktion.dataset.ua);
      renderAlles();
      return;
    case 'aussetzen':
      routineAussetzen(id, aktion.dataset.abzug === '1');
      return;
    case 'pp':
      if (fokus && fokus.itemId === id) fokusToggle();
      else fokusStarten(id);
      // im Tacho: Kern auf den neuen Fokus umbauen statt schließen
      if (sheetOffenFuer === 'tacho') sheetTachoOeffnen();
      break;
    case 'detail': sheetDetailOeffnen(id); break;
    case 'check':  abhaken(id); break;
    case 'tick':   counterTick(id); break;
  }
});

/* Fokus-Leiste: Tap auf die Mitte öffnet IMMER den Fokus-Tacho (4.2) —
   auch bei laufendem Fokus (Task-Switcher); das laufende Item steht dort
   gelistet und ist per Karten-Tap editierbar. Play/Pause-Toggle (4.1);
   Tap auf den Akku → Startwert anpassen (jederzeit überschreibbar, 1.2). */
$('ppBtn').addEventListener('click', fokusToggle);
$('fokusMid').addEventListener('click', sheetTachoOeffnen);
$('akku').addEventListener('click', sheetTagStartOeffnen);

/* Tab-Navigation (7.1) */
document.querySelectorAll('#tabbar button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#tabbar button').forEach(b => b.classList.toggle('on', b === btn));
    document.querySelectorAll('.view').forEach(v =>
      v.classList.toggle('on', v.id === 'view-' + btn.dataset.view));
    if (btn.dataset.view === 'einstellungen') renderEinstellungen();
    if (btn.dataset.view === 'belohnung') renderBelohnung();
  });
});

/* Sekündliche Aktualisierung von Timer/Pace, ohne Listen neu zu bauen. */
setInterval(() => {
  renderFokusbar();
  tachoTick();
  pruefeLevelUp();
  // Punkte/Min in einer offenen Detailansicht live mitlaufen lassen (4.2)
  if (sheetOffenFuer && sheetOffenFuer.startsWith('detail:')) {
    const item = Store.findeItem(sheetOffenFuer.slice(7));
    if (item && fokus && fokus.itemId === item.id) dPpmAktualisieren(item);
  }
  if (new Date().getSeconds() === 0) renderPace();
}, 1000);

/* ── Start ── */
Store.ladeAlles();
if (fokus && !Store.findeItem(fokus.itemId)) { fokus = null; fokusSpeichern(); }
belohnungInit();
rollFreischaltungen(false);   // tägliche Würfel-Chance (6.3)
gesamtpunkteAktualisieren();
pruefeLevelUp();              // Avatar-Level initialisieren/nachziehen
renderAlles();

/* Debug-/Testzugriff in der Konsole; spätere Schritte nutzen Store direkt. */
window.Fokus = { APP_VERSION, Store, neuesItem, DEFAULT_SETTINGS,
  punkteBeiMinuten, counterPunkte, anzeigePunkte, renderAlles,
  fokusStarten, fokusToggle, fokusBeenden, tagAbschliessen, abhaken,
  privatDokumentMd, importParsen,
  get belohnung() { return belohnung; }, rollFreischaltungen, stufeEligible,
  renderBelohnung, punkteNachGruppe, vitalitaet, gesamtStufe,
  dropAnwenden, pushDown,
  zeitVerteilung, unteraufgabenAnteil, unteraufgabeToggle, unteraufgabeAnlegen,
  wohlstandLive, fokusLiveDelta, avatarStufeAus, pruefeLevelUp, tachoTick,
  routineFaellig, routineUeberfaelligTage, routineAussetzen, rhythmusLabel };

/* ── Service Worker: network-first Update-Muster (Spez. Abschnitt 8) ── */
if ('serviceWorker' in navigator) {
  // .catch: unter file:// (lokaler Test) ist keine Registrierung möglich
  window.addEventListener('load', () =>
    navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
