function sGet(pfad) { return pfad.split('.').reduce((o, k) => o[k], Store.settings); }
function sSet(pfad, wert) {
  const teile = pfad.split('.'); const letzter = teile.pop();
  teile.reduce((o, k) => o[k], Store.settings)[letzter] = wert;
  Store.speichereSettings();
}

function renderEinstellungen() {
  let html = '';
  for (const gruppe of SETTINGS_DEFS) {
    html += '<h2 class="sechead">' + gruppe.titel + '</h2>';
    for (const r of gruppe.regler) {
      // Wert auch frei eintippbar — darf über das Regler-Maximum hinaus (22.07.2026)
      html += '<div class="regler" data-pfad="' + r.p + '" data-step="' + r.step + '">'
        + '<div class="kopfzeile2"><label>' + r.l + '</label>'
        + '<input type="number" class="swert" step="' + r.step + '" value="' + sGet(r.p) + '"></div>'
        + '<input type="range" min="' + r.min + '" max="' + r.max + '" step="' + r.step + '" value="' + sGet(r.p) + '">'
        + '</div>';
    }
  }
  html += '<h2 class="sechead">Arbeitstag (Pace-Leiste, 3.6)</h2>'
    + '<div class="zweispaltig">'
    + '<div class="feld"><label>Start</label><input id="sTagStart" type="time" value="' + Store.settings.arbeitstagStart + '"></div>'
    + '<div class="feld"><label>Ende</label><input id="sTagEnde" type="time" value="' + Store.settings.arbeitstagEnde + '"></div>'
    + '</div>';
  // Vorlagen für neue Items (22.07.2026)
  html += '<h2 class="sechead">Vorlagen für neue Items</h2>';
  const vl = vorlagenLaden();
  html += vl.length
    ? vl.map(v => '<div class="aufzeile"><span class="albl" style="width:auto;flex:1">'
        + escapeHtml(v.name) + ' · ' + ((v.unteraufgaben || []).length) + ' Unteraufgaben</span>'
        + '<button class="wizbtn sek" data-vedit="' + v.id + '" style="width:auto;min-height:38px;margin:0;padding:0 14px">✎</button></div>').join('')
    : '<div class="leer">Noch keine Vorlagen.</div>';
  html += '<button class="wizbtn sek" id="sVorlageNeu" style="margin-top:6px">+ Neue Vorlage</button>';

  // Abgeschlossene Tage widerrufen (22.07.2026)
  html += '<h2 class="sechead">Tagesabschlüsse — Widerruf</h2>';
  const abschluesse = historieLaden().slice(-14).reverse();
  html += abschluesse.length
    ? abschluesse.map(d =>
        '<div class="aufzeile"><span class="albl" style="width:auto;flex:1">' + d.datum
        + ' · ' + fmtPunkte(d.punkte || 0) + ' P</span>'
        + '<button class="wizbtn sek" data-widerruf="' + d.datum + '" style="width:auto;min-height:38px;margin:0;padding:0 14px">↩</button></div>').join('')
    : '<div class="leer">Noch keine abgeschlossenen Tage.</div>';
  html += '<button class="resetbtn" id="sReset">Alle Punkte-Sätze auf Standard zurücksetzen</button>';
  html += '<div class="versionszeile">Fokus App ' + APP_VERSION + '</div>';
  $('view-einstellungen').innerHTML = html;

  document.querySelectorAll('#view-einstellungen .regler').forEach(wrap => {
    const range = wrap.querySelector('input[type=range]');
    const feld = wrap.querySelector('.swert');
    if (!range || !feld) return;
    range.addEventListener('input', () => {
      sSet(wrap.dataset.pfad, Number(range.value));
      feld.value = range.value;
      renderStream(); renderPace(); renderStatusbar();
    });
    feld.addEventListener('input', () => {
      const wert = Number(feld.value);
      if (feld.value === '' || isNaN(wert)) return;
      sSet(wrap.dataset.pfad, wert);   // frei — auch jenseits des Regler-Bereichs
      range.value = Math.min(Number(range.max), Math.max(Number(range.min), wert));
      renderStream(); renderPace(); renderStatusbar();
    });
  });
  $('sTagStart').addEventListener('input', el => { Store.settings.arbeitstagStart = el.target.value || '08:00'; Store.speichereSettings(); renderPace(); });
  $('sTagEnde').addEventListener('input',  el => { Store.settings.arbeitstagEnde  = el.target.value || '18:00'; Store.speichereSettings(); renderPace(); });
  $('sReset').addEventListener('click', () => {
    if (!confirm('Wirklich alle Punkte-Sätze auf die Standardwerte zurücksetzen?')) return;
    localStorage.removeItem(LS.SETTINGS);
    Store.settings = settingsZusammenfuehren({});
    renderEinstellungen(); renderAlles();
  });
  document.querySelectorAll('#view-einstellungen [data-widerruf]').forEach(btn => {
    btn.addEventListener('click', () => snapshotWiderrufen(btn.dataset.widerruf));
  });
  document.querySelectorAll('#view-einstellungen [data-vedit]').forEach(btn => {
    btn.addEventListener('click', () => sheetVorlageOeffnen(btn.dataset.vedit));
  });
  const vn = $('sVorlageNeu');
  if (vn) vn.addEventListener('click', () => sheetVorlageOeffnen(null));
}

/* Abschluss eines Tages aus den Einstellungen widerrufen: heute =
   vollständig (Journal), Vergangenheit = Snapshot + Punkte zurück
   (Item-Zustände von damals sind nicht wiederherstellbar). */
function snapshotWiderrufen(datum) {
  if (datum === Store.tag.datum) {
    if (Store.tag.abgeschlossen) abschlussWiderrufen();
    else lsSchreibe(LS.HISTORIE, historieLaden().filter(d => d.datum !== datum));
    renderEinstellungen();
    return;
  }
  const s = historieLaden().find(d => d.datum === datum);
  if (!s) return;
  if (!confirm('Abschluss vom ' + datum + ' widerrufen? Die ' + fmtPunkte(s.punkte || 0)
    + ' P des Tages werden vom Konto abgezogen. Item-Zustände von damals bleiben unverändert.')) return;
  Store.tag.wohlstandStand = Math.max(0, Store.tag.wohlstandStand - (s.punkte || 0));
  lsSchreibe(LS.HISTORIE, historieLaden().filter(d => d.datum !== datum));
  Store.speichereTag();
  renderEinstellungen();
  renderStatusbar();
  toastZeigen('↩ Abschluss vom ' + datum + ' widerrufen');
}

let sheetOffenFuer = null;   // 'detail:<id>' | 'tacho' | null

function sheetOeffnen(titel, inhaltHtml, key) {
  $('sheetTitel').textContent = titel;

  $('sheet').classList.add('on');
  $('sheet').style.transform = '';

}

function sheetSchliessen() {
  $('overlay').classList.remove('on');

  renderAlles();
}

$('sheetX').addEventListener('click', sheetSchliessen);

/* Wisch-nach-unten am Sheet-Kopf (7.2) */
(function () {
  let startY = null, delta = 0;
  const kopf = $('sheetKopf'), sheet = $('sheet');
  kopf.addEventListener('touchstart', e => { startY = e.touches[0].clientY; delta = 0; }, { passive: true });
  kopf.addEventListener('touchmove', e => {
    if (startY == null) return;
    delta = Math.max(0, e.touches[0].clientY - startY);
    sheet.style.transform = 'translateY(' + delta + 'px)';
  }, { passive: true });
  kopf.addEventListener('touchend', () => {
    if (delta > 80) sheetSchliessen();
    else sheet.style.transform = '';
    startY = null; delta = 0;
  });
})();

/* ════════════════════════════════════════════════════════════════════
   Task-Karte als Sheet (4.3): Schieberegler, zwei Kommentarfelder,
   alle Änderungen speichern sofort (kein Save-Button).
   ════════════════════════════════════════════════════════════════════ */
/* Stufenlose Regler mit Live-Wert (Punktesystem 2.0, 21.07.2026).
   opts: { auto (cyan = Vorschlagswert), marken: [{wert, farbe}],
           links/rechts (Bedeutungs-Beschriftung der Endpunkte) } */
function slReglerHtml(id, label, min, max, step, wert, einheit, opts) {
  opts = opts || {};
  const marken = (opts.marken || []).map(m => {
    const pct = Math.min(100, Math.max(0, (m.wert - min) / (max - min) * 100)).toFixed(1);
    return '<span class="slmark" style="left:' + pct + '%;background:' + (m.farbe || 'var(--mut2)') + '"></span>';
  }).join('');
  return '<div class="feld regler slregler" data-slid="' + id + '" data-einheit="' + (einheit || '') + '">'
    + '<div class="kopfzeile2"><label>' + label + '</label>'
    + '<span class="wert' + (opts.auto ? ' auto' : '') + '">' + wert + (einheit || '') + '</span></div>'
    + '<div class="sltrack">'
    + '<input type="range" min="' + min + '" max="' + max + '" step="' + step + '" value="' + wert + '">'
    + marken + '</div>'
    + (opts.links || opts.rechts
      ? '<div class="stufen"><span>' + (opts.links || '') + '</span><span>' + (opts.rechts || '') + '</span></div>'
      : '')
    + '</div>';
}
function slVerdrahten(id, fn) {
  const wrap = document.querySelector('.slregler[data-slid="' + id + '"]');
  if (!wrap) return;
  const range = wrap.querySelector('input');
  range.addEventListener('input', () => {
    wrap.querySelector('.wert').textContent = range.value + wrap.dataset.einheit;
    fn(Number(range.value));
  });
}
function slSetzen(id, wert) {
  const wrap = document.querySelector('.slregler[data-slid="' + id + '"]');
  if (!wrap) return;
  wrap.querySelector('input').value = wert;
  wrap.querySelector('.wert').textContent = wert + wrap.dataset.einheit;
}

/* Stufen-Kurven-Editor: „bis X min → P/Std" bzw. „bis X Ticks → P/Tick";
   leeres Bis-Feld = „danach" (letzte Stufe). */
function stufenZeileHtml(istCounter, bis, rate) {
  return '<div class="stufenzeile">'
    + '<input type="number" class="stbis" inputmode="numeric" placeholder="danach" value="' + (bis == null ? '' : bis) + '">'
    + '<span>' + (istCounter ? 'Ticks:' : 'min:') + '</span>'
    + '<input type="number" class="strate" value="' + (rate == null ? 0 : rate) + '">'
    + '<span>' + (istCounter ? 'P/Tick' : 'P/Std') + '</span>'
    + '<button class="uax stloesch" aria-label="Stufe löschen">✕</button>'
    + '</div>';
}
function stufenEditorHtml(item) {
  const istCounter = item.typ === 'counter';
  const stufen = (istCounter ? item.tickStufen : item.zeitStufen) || [];
  return '<div class="feld"><label>Stufen-Kurve (optional — leer = fester Satz)</label>'
    + '<div id="dStufen">'
    + stufen.map(st => stufenZeileHtml(istCounter,
        istCounter ? st.bisTick : st.bisMin,
        istCounter ? st.punkteProTick : st.punkteProStd)).join('')
    + '</div>'
    + '<button class="wizbtn sek" id="dStufeAdd" style="margin-top:6px">+ Stufe hinzufügen</button></div>';
}

/* Kompaktes Bewertungs-Panel (21.07.2026): eine Zeile je Wert. */
function bzeile(id, label, wert, platzhalter) {
  return '<div class="bzeile"><label>' + label + '</label>'
    + '<input id="' + id + '" type="number" placeholder="' + platzhalter + '" value="' + wert + '"></div>';
}

/* Info-Zeilen: Vorschlag sichtbar machen + Abweichung zum manuellen Wert. */
function rateInfoText(item) {
  const v = Math.round(vorschlagRate(item));
  if (item.punkteProStd == null) return 'Auto-Vorschlag aus der Einschätzung: ' + v + ' P/Std';
  const diff = Math.round(item.punkteProStd - v);
  return 'Vorschlag: ' + v + ' P/Std · <span class="abw">Abweichung ' + (diff >= 0 ? '+' : '') + diff + '</span>';
}
function bonusVorschlag(item) {
  if (item.domain === 'dfm' && item.geldImpact) {
    // unbekannter Impact-Schlüssel darf kein NaN erzeugen
    return (Number(Store.settings.geldScoreBasis[item.geldImpact]) || 0) - tageBisDeadline(item.deadline);
  }
  return Store.settings.abschlussBonusStandard != null ? Store.settings.abschlussBonusStandard : 100;
}
function bonusInfoText(item) {
  const v = Math.round(bonusVorschlag(item));
  if (item.abschlussBonus == null) return 'Auto: ' + v + ' P (Geld-Impact)';
  const diff = Math.round(item.abschlussBonus - v);
  return 'Vorschlag: ' + v + ' P · <span class="abw">' + (diff >= 0 ? '+' : '') + diff + '</span>';
}

function zufallAnzeige(item) {
  const t = item.rhythmusZufallTage || [];
  if (!t.length) return 'wird gelost';
  return rhythmusModusVon(item) === 'zufallWoche'
    ? t.map(i => WT_KURZ[i]).join('·')
    : t.map(x => x + '.').join('·');
}

function segHtml(feld, optionen, wert, labels) {
  return '<div class="seg" data-seg="' + feld + '">'
    + optionen.map((o, i) =>

        + (labels ? labels[i] : o) + '</button>').join('')

}

/* Live-Anzeige Punkte/Min in der editierbaren Karte (4.2). */
function dPpmAktualisieren(item) {
  const el = $('dPpm');
  if (!el) return;
  if (item.typ === 'counter') { el.textContent = ''; return; }
  const min = minutenInklFokus(item);
  el.textContent = min > 0.2 ? '· ' + fmtPunkte(punkteBeiMinuten(item, min) / min) + ' P/min' : '';
}

function detailVerdrahten(item) {
  const inhalt = $('sheetInhalt');
  const speichernUndAktualisieren = () => {
    Store.speichereItems();
    const el = $('dPunkte');
    if (el) el.textContent = fmtPunkte(anzeigePunkte(item)) + ' P';
    dPpmAktualisieren(item);
    $('sheetTitel').textContent = item.titel || 'Neues Item';
  };
  dPpmAktualisieren(item);

  const bind = (id, fn) => { const el = $(id); if (el) el.addEventListener('input', () => { fn(el); speichernUndAktualisieren(); }); };
  bind('dTitel',    el => item.titel = el.value);
  bind('dDeadline', el => item.deadline = el.value || null);
  bind('dGesamt',   el => item.aufwandGeplantMin = Number(el.value) || 0);
  bind('dIst',      el => item.istMinuten = Number(el.value) || 0);
  bind('dSlot',     el => {
    const neu = uhrzeitAlsMin(el.value);
    // Rausziehen aus dem Stream merken → Schiebe-Malus beim Tagesabschluss (5.3)
    if (item.streamSlot != null && neu == null) item.heuteRausgezogen = true;
    item.streamSlot = neu;
  });
  bind('dRhythmus', el => item.rhythmusTage = Math.min(31, Math.max(1, Number(el.value) || 1)));
  // Bewertungs-Panel (leer = Auto, Platzhalter zeigt den Vorschlag)
  bind('bRate', el => {
    item.punkteProStd = el.value === '' ? null : Number(el.value);
    slSetzen('rate', Math.round(effektiveRate(item)));
  });
  bind('bBonus', el => item.abschlussBonus = el.value === '' ? null : Number(el.value));
  bind('bMalus', el => item.nichtErledigtMalus = el.value === '' ? null : Math.abs(Number(el.value)));
  bind('bAkku', el => {
    item.akkuProStd = el.value === '' ? null : Number(el.value);
    slSetzen('akku', Math.round(akkuRate(item)));
  });
  // Aufklapp-Bereiche im Sheet (Erweitert)
  inhalt.querySelectorAll('.tacc .tacckopf').forEach(k =>
    k.addEventListener('click', () => k.parentElement.classList.toggle('offen')));
  const wtWrap = $('dWtage');
  if (wtWrap) wtWrap.querySelectorAll('.wtag').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = Number(btn.dataset.wt);
      item.rhythmusWochentage = item.rhythmusWochentage || [];
      const idx = item.rhythmusWochentage.indexOf(i);
      if (idx >= 0) item.rhythmusWochentage.splice(idx, 1);
      else item.rhythmusWochentage.push(i);
      item.rhythmusAnkerWoche = wochenIndex();
      btn.classList.toggle('on', idx < 0);
      speichernUndAktualisieren();
    });
  });
  bind('dZuletzt',  el => item.zuletztErledigt = el.value || null);
  bind('dProjekt',  el => item.projekt = el.value || null);
  bind('dNotiz',    el => item.notiz = el.value);
  bind('dKommentar', el => item.kommentarFuerClaude = el.value);
  bind('dSchwelle', el => item.tickSchwelle = Number(el.value) || 0);
  bind('dTickstand', el => { item.tickStandHeute = Number(el.value) || 0; gesamtpunkteAktualisieren(); Store.speichereTag(); });
  bind('dVor',      el => item.punkteJeTickVorSchwelle = Number(el.value) || 0);
  bind('dNach',     el => item.punkteJeTickNachSchwelle = Number(el.value) || 0);

  // Stufenlose Regler (Punktesystem 2.0) — Info-Zeilen laufen live mit
  const rateUiNach = () => {
    const info = $('dRateInfo');
    if (info) info.innerHTML = rateInfoText(item);
    const ws = document.querySelector('.slregler[data-slid="rate"] .wert');
    if (ws) ws.classList.toggle('auto', item.punkteProStd == null);
  };
  slVerdrahten('rate', w => {
    item.punkteProStd = w;
    const bi = $('bRate'); if (bi) bi.value = w;
    rateUiNach(); speichernUndAktualisieren();
  });
  slVerdrahten('akku', w => {
    item.akkuProStd = w;
    const ws = document.querySelector('.slregler[data-slid="akku"] .wert');
    if (ws) ws.classList.remove('auto');
    Store.speichereItems();
  });
  const faktorNach = () => {
    if (item.punkteProStd == null) slSetzen('rate', Math.round(effektiveRate(item)));
    rateUiNach();
    speichernUndAktualisieren();
  };
  slVerdrahten('fK', w => { item.komplexitaet = w; faktorNach(); });
  slVerdrahten('fE', w => { item.energie = w; faktorNach(); });
  slVerdrahten('fB', w => { item.blockade = w; faktorNach(); });
  const rateAuto = $('dRateAuto');
  if (rateAuto) rateAuto.addEventListener('click', () => {
    item.punkteProStd = null; item.akkuProStd = null;
    Store.speichereItems();
    sheetDetailOeffnen(item.id);
  });

  // Stufen-Kurven-Editor (Zeit bzw. Ticks)
  const stWrap = $('dStufen');
  if (stWrap) {
    const istC = item.typ === 'counter';
    const lesen = () => {
      const arr = [...stWrap.querySelectorAll('.stufenzeile')].map(z => {
        const bis = z.querySelector('.stbis').value;
        const rate = Number(z.querySelector('.strate').value) || 0;
        return istC
          ? { bisTick: bis === '' ? null : Number(bis), punkteProTick: rate }
          : { bisMin: bis === '' ? null : Number(bis), punkteProStd: rate };
      });
      arr.sort((a, b) => {
        const av = istC ? a.bisTick : a.bisMin, bv = istC ? b.bisTick : b.bisMin;
        return (av == null ? Infinity : av) - (bv == null ? Infinity : bv);
      });
      if (istC) item.tickStufen = arr.length ? arr : null;
      else item.zeitStufen = arr.length ? arr : null;
      speichernUndAktualisieren();
    };
    stWrap.addEventListener('input', lesen);
    stWrap.addEventListener('click', e => {
      const del = e.target.closest('.stloesch');
      if (del) { del.closest('.stufenzeile').remove(); lesen(); }
    });
    $('dStufeAdd').addEventListener('click', () => {
      stWrap.insertAdjacentHTML('beforeend', stufenZeileHtml(istC, null, 0));
      lesen();
    });
  }

  // Häufigkeits-Modi (Routine): Zeile wählen → Maske neu aufbauen
  inhalt.querySelectorAll('.modusrow .modkopf').forEach(kopf => {
    kopf.addEventListener('click', () => {
      const key = kopf.parentElement.dataset.modus;
      if (rhythmusModusVon(item) === key) return;
      item.rhythmusModus = key;
      item.rhythmusZufallPeriode = null;   // Zufalls-Modi: neu losen
      item.rhythmusAnkerWoche = wochenIndex();
      Store.speichereItems();
      sheetDetailOeffnen(item.id);
    });
  });
  const mtWrap = $('dMtage');
  if (mtWrap) mtWrap.querySelectorAll('.mtag').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = Number(btn.dataset.mt);
      item.rhythmusMonatstage = item.rhythmusMonatstage || [];
      const idx = item.rhythmusMonatstage.indexOf(t);
      if (idx >= 0) item.rhythmusMonatstage.splice(idx, 1);
      else item.rhythmusMonatstage.push(t);
      btn.classList.toggle('on', idx < 0);
      speichernUndAktualisieren();
    });
  });
  const zufallN = $('dZufallN');
  if (zufallN) zufallN.addEventListener('input', () => {
    item.rhythmusZufallAnzahl = Math.max(1, Number(zufallN.value) || 1);
    item.rhythmusZufallPeriode = null;     // neu losen
    zufallsTageSichern(item);
    const info = $('dZufallInfo');
    if (info) info.textContent = zufallAnzeige(item);
    speichernUndAktualisieren();
  });

  // Segmente
  inhalt.querySelectorAll('.seg').forEach(seg => {
    const feld = seg.dataset.seg;
    seg.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        const wert = btn.dataset.wert;
        if (feld === 'geldImpact') item.geldImpact = wert || null;
        else if (feld === 'rhythmusWochen') {
          item.rhythmusWochen = Number(wert) || 1;
          item.rhythmusAnkerWoche = wochenIndex();
        }
        else if (feld === 'typ') {
          item.typ = wert;
          if (wert === 'counter') Object.assign(item, neuesItem({ ...item }));
        }
        else if (feld === 'imStreamAnzeigen') item.imStreamAnzeigen = wert === '1';
        else if (feld === 'bewertungArt') {
          // Gut/Schlecht dreht die Vorzeichen von Satz und Bonus
          const vz = wert === 'schlecht' ? -1 : 1;
          item.punkteProStd = vz * Math.abs(item.punkteProStd != null ? item.punkteProStd : vorschlagRate(item));
          if (item.abschlussBonus != null) item.abschlussBonus = vz * Math.abs(item.abschlussBonus);
        }
        else item[feld] = wert;
        if (feld === 'domain' && wert !== 'dfm') item.geldImpact = null;
        Store.speichereItems();
        // Struktur kann sich ändern (Geld-Impact/Counter-Felder) → neu aufbauen
        if (feld === 'domain' || feld === 'typ' || feld === 'bewertungArt') sheetDetailOeffnen(item.id);
        else {
          seg.querySelectorAll('button').forEach(b => b.classList.toggle('on', b === btn));
          const el = $('dPunkte');
          if (el) el.textContent = fmtPunkte(anzeigePunkte(item)) + ' P';
        }
      });
    });
  });
}

/* ════════════════════════════════════════════════════════════════════
   Fokus-Tacho 2.0 (4.2 + Redesign 20.07.2026):
   Renn-Ring (Timer vs. Unteraufgaben-Fortschritt) mit Avatar in der
   Mitte, Ampel-Färbung (<80% grün · 80–110% gelb · danach rot, dreht
   als neue Runde weiter), Live-Upgrade-Leiste zur nächsten Avatar-
   Stufe, Unteraufgaben-Checkliste, Bewertungs-Regler, Claude-Kommentar
   und Task-Switcher. Alles tickt sekündlich live.
   ════════════════════════════════════════════════════════════════════ */
const RING_C = 2 * Math.PI * 58;    // Umfang Timer-Ring
const RING_CP = 2 * Math.PI * 48;   // Umfang Fortschritts-Ring

function uaZeileHtml(u, i, zeiten, boni) {
  return '<div class="uareihe' + (u.erledigt ? ' fertig' : '') + '" data-ua="' + u.id + '">'
    + '<button class="uacheck" data-uakt="toggle" aria-label="Unteraufgabe abhaken"><span class="box">' + (u.erledigt ? '✓' : '') + '</span></button>'
    + '<div class="uatitel"><span class="uat">' + escapeHtml(u.titel) + '</span>'
    + (u.beschreibung ? '<span class="uabeschr">' + escapeHtml(u.beschreibung) + '</span>' : '') + '</div>'
    + (u.erledigt
      ? '<span class="uapunkte">+' + fmtPunkte(u.gebuchtePunkte || 0) + ' P</span>'
      : '<input class="uamin" data-uakt="min" type="number" inputmode="numeric" placeholder="' + Math.round(zeiten[i] || 0) + '" value="' + (u.geplantMin || '') + '" title="Minuten (leer = automatisch, cyan = Vorschlag)">'
        + '<input class="uamin uabonus" data-uakt="bonus" type="number" placeholder="' + Math.round((boni || [])[i] || 0) + '" value="' + (u.bonusPunkte != null ? u.bonusPunkte : '') + '" title="Einmalige Punkte (leer = automatisch)">')
    + '<button class="uax" data-uakt="loeschen" aria-label="Unteraufgabe löschen">✕</button>'
    + '</div>';
}

    + '<linearGradient id="gGelb" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f2b84b"/><stop offset="1" stop-color="#f08c4b"/></linearGradient>'
    + '<linearGradient id="gRot" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f66d6d"/><stop offset="1" stop-color="#c23a3a"/></linearGradient>'
    + '<linearGradient id="gProg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4f8ef7"/><stop offset="1" stop-color="#6dd3e0"/></linearGradient>'

    + '<circle cx="66" cy="66" r="58" fill="none" stroke="var(--line)" stroke-width="8"/>'
    + '<circle cx="66" cy="66" r="48" fill="none" stroke="var(--line)" stroke-width="4" opacity=".45"/>'
    + '<circle id="tZeitArc" cx="66" cy="66" r="58" fill="none" stroke="url(#gLauf)" stroke-width="8" stroke-linecap="round" stroke-dasharray="0 ' + RING_C.toFixed(1) + '" transform="rotate(-90 66 66)"/>'
    + '<circle id="tRotArc" cx="66" cy="66" r="58" fill="none" stroke="url(#gRot)" stroke-width="8" stroke-linecap="round" stroke-dasharray="0 ' + RING_C.toFixed(1) + '" transform="rotate(-90 66 66)"/>'
    + '<circle id="tProgArc" cx="66" cy="66" r="48" fill="none" stroke="url(#gProg)" stroke-width="4" stroke-linecap="round" stroke-dasharray="0 ' + RING_CP.toFixed(1) + '" transform="rotate(-90 66 66)"/>'
    + '<g id="tTicks"></g>'

    + '<circle id="tKopfDot" r="3.5" fill="#e8eef7" cx="66" cy="8" opacity="0"/>'

  html += '<div class="tinfos">'
    + '<div class="trest" id="tRest">–</div>'
    + '<div class="trestsub" id="tRestSub">Kein Fokus aktiv</div>'
    + '<div class="tuabox" id="tUaBox" hidden><div class="l">UNTERAUFGABE <span id="tUaNum"></span></div>'
    + '<div class="n" id="tUaName"></div><div class="r" id="tUaRest"></div></div>'
    + '<div class="takku">🔋 <span id="tAkku">–%</span></div>'
    + '</div></div>';

  /* ── Upgrade-Leiste: nächster Kauf, live ── */
  html += '<div class="tlevel">'
    + '<div class="kopf"><span>Nächster Kauf</span><span class="eta" id="tEta"></span></div>'
    + '<div class="leiste"><div class="lg" id="tBarG" style="width:0"></div>'
    + '<div class="ly" id="tBarY" style="width:0"></div>'
    + '<div class="lh" id="tBarH" style="width:0"></div></div>'
    + '<div class="lege"><span style="color:var(--ok)">erreicht</span>'
    + '<span style="color:var(--warn)">dieser Fokus (live)</span>'
    + '<span>möglich</span><span id="tLevelZiel" style="color:var(--txt)"></span></div>'
    + '</div>';

  if (item) {
    html += '<div class="taufgabe">'
      + '<div class="tmain" data-tackt="detail"><div class="ttitel">' + escapeHtml(item.titel) + '</div>'
      + '<div class="tsub">' + (item.domain === 'dfm' ? 'DFM' : 'Privat')
      + (item.prioritaet === 'muss' ? ' · <span style="color:var(--bad)">MUSS</span>' : '')
      + ' · <span id="tGesamtP"></span> P gesamt</div></div>'
      + '<button class="tcheck" id="tEdit" aria-label="Einstellungen" style="color:var(--mut)">✎</button>'
      + '<button class="tpp" id="tPp" aria-label="Play/Pause">⏸</button>'
      + '<button class="tcheck" id="tCheck" aria-label="Erledigt">✓</button>'
      + '</div>';
  } else {
    html += '<div class="leer" style="margin-top:10px">Kein Fokus aktiv — unten eine Aufgabe wählen oder Instant-Fokus starten.</div>';
  }
  html += '</div>';

  /* ── Unteraufgaben ── */
  if (item && item.typ !== 'counter') {
    const uas = item.unteraufgaben || [];
    const zeiten = zeitVerteilung(item);
    const boni = bonusVerteilung(item);
    html += '<div class="tacc offen"><div class="tacckopf">☑ Unteraufgaben'
      + (uas.length ? ' · ' + uas.filter(u => u.erledigt).length + '/' + uas.length : '')
      + '<span class="pfeil">▾</span></div><div class="taccinhalt">'
      + (uas.length ? '<div class="thinweis" style="margin-top:0">Spalten: Minuten · einmalige Punkte — leer = automatisch verteilt</div>' : '')
      + '<div id="tUaListe">' + uas.map((u, i) => uaZeileHtml(u, i, zeiten, boni)).join('') + '</div>'
      + '<div class="uaneu"><input id="tUaNeu" type="text" placeholder="Unteraufgabe hinzufügen …"><button id="tUaAdd" aria-label="Hinzufügen">+</button></div>'
      + '</div></div>';
  }

  /* ── Bewertung ── */
  if (item && item.typ !== 'counter') {
    html += '<div class="tacc"><div class="tacckopf">⚖️ Bewertung<span class="pfeil">▾</span></div><div class="taccinhalt">'
      + slReglerHtml('trate', 'Punkte pro Stunde' + (item.punkteProStd == null ? ' · Auto' : ''),
          -60, 180, 1, Math.round(effektiveRate(item)), ' P/Std')
      + slReglerHtml('tfK', 'Komplexität', 0.5, 2.5, 0.05, Number(item.komplexitaet) || 1, '×')
      + slReglerHtml('tfE', 'Energie', 0.5, 1.5, 0.05, Number(item.energie) || 1, '×')
      + slReglerHtml('tfB', 'Blockade', 0.5, 2.5, 0.05, Number(item.blockade) || 1, '×')
      + '</div></div>';
  }

  /* ── Kommentar für Claude ── */
  if (item) {
    html += '<div class="tacc"><div class="tacckopf">💬 Kommentar für Claude<span class="pfeil">▾</span></div><div class="taccinhalt">'
      + '<textarea id="tKommentar" placeholder="Wird beim nächsten Sync verarbeitet …">' + escapeHtml(item.kommentarFuerClaude || '') + '</textarea>'
      + '</div></div>';
  }

  /* ── Task-Switcher: erst nächste Aufgabe nach Prio, dann nächste
        fällige Routine, danach der Rest nach Prio (21.07.2026) ── */
  const prioRang = { muss: 0, soll: 1, idee: 2 };
  const kandidaten = Store.items.filter(i =>
    i.typ !== 'counter' && i.status !== 'erledigt' && (!item || i.id !== item.id)
    && (i.status === 'in_arbeit' || i.prioritaet === 'muss'
        || (i.typ === 'routine' && routineFaellig(i))));
  kandidaten.sort((a, b) =>
    (prioRang[a.prioritaet] ?? 1) - (prioRang[b.prioritaet] ?? 1)
    || anzeigePunkte(b) - anzeigePunkte(a));
  const ersteAufgabe = kandidaten.find(i => i.typ !== 'routine') || null;
  const ersteRoutine = kandidaten.find(i => i.typ === 'routine') || null;
  const weitere = kandidaten.filter(i => i !== ersteAufgabe && i !== ersteRoutine);
  let switcher = '';
  if (ersteAufgabe) switcher += '<div class="thinweis">Nächste Aufgabe</div>' + karteHtml(ersteAufgabe, false);
  if (ersteRoutine) switcher += '<div class="thinweis">Nächste Routine</div>' + karteHtml(ersteRoutine, false);
  if (weitere.length) switcher += '<div class="thinweis">Weitere (nach Prio)</div>' + weitere.map(i => karteHtml(i, false)).join('');
  if (!switcher) switcher = '<div class="leer">Nichts Begonnenes, keine Muss-Items, keine fälligen Routinen.</div>';
  html += '<div class="tacc' + (item ? '' : ' offen') + '"><div class="tacckopf">🔁 Wechseln zu<span class="pfeil">▾</span></div><div class="taccinhalt">'
    + '<div class="tachozeile"><input id="tInstant" type="text" placeholder="Instant-Fokus: Name eintippen …"><button class="start" id="tStart">▶</button></div>'
    + '<div class="thinweis">Legt sofort ein echtes Muss-Item an und startet den Fokus.</div>'
    + switcher
    + '</div></div>';

  sheetOeffnen('Fokus-Tacho', html, 'tacho');
  tachoVerdrahten(item);
  tachoTick();
}

function tachoVerdrahten(item) {
  document.querySelectorAll('#sheetInhalt .tacc .tacckopf').forEach(kopf => {
    kopf.addEventListener('click', () => kopf.parentElement.classList.toggle('offen'));
  });
  $('tStart').addEventListener('click', () => {
    const name = $('tInstant').value.trim();
    if (!name) { $('tInstant').focus(); return; }
    const { item: neu } = Store.upsertItem({ titel: name, prioritaet: 'muss', status: 'in_arbeit' });
    fokusStarten(neu.id);
    sheetTachoOeffnen();
  });
  $('tInstant').addEventListener('keydown', e => { if (e.key === 'Enter') $('tStart').click(); });
  if (!item) return;

  $('tPp').addEventListener('click', () => { fokusToggle(); tachoTick(); });
  $('tEdit').addEventListener('click', () => sheetDetailOeffnen(item.id));
  $('tCheck').addEventListener('click', () => {
    if (item.typ === 'aufgabe') sheetAbschlussOeffnen(item.id);   // ersetzt das Tacho-Sheet
    else { abhaken(item.id); sheetTachoOeffnen(); }
  });
  document.querySelector('#sheetInhalt [data-tackt="detail"]')
    .addEventListener('click', () => sheetDetailOeffnen(item.id));

  const kommentar = $('tKommentar');
  if (kommentar) kommentar.addEventListener('input', () => {
    item.kommentarFuerClaude = kommentar.value;
    Store.speichereItems();
  });

  // Stufenlose Bewertungs-Regler (Punktesystem 2.0)
  slVerdrahten('trate', w => { item.punkteProStd = w; Store.speichereItems(); tachoTick(); });
  const tFaktor = () => {
    if (item.punkteProStd == null) slSetzen('trate', Math.round(effektiveRate(item)));
    Store.speichereItems(); tachoTick();
  };
  slVerdrahten('tfK', w => { item.komplexitaet = w; tFaktor(); });
  slVerdrahten('tfE', w => { item.energie = w; tFaktor(); });
  slVerdrahten('tfB', w => { item.blockade = w; tFaktor(); });

  const uaAdd = $('tUaAdd');
  if (uaAdd) {
    const anlegen = () => {
      if (unteraufgabeAnlegen(item.id, $('tUaNeu').value)) sheetTachoOeffnen();
    };
    uaAdd.addEventListener('click', anlegen);
    $('tUaNeu').addEventListener('keydown', e => { if (e.key === 'Enter') anlegen(); });
  }
  const uaListe = $('tUaListe');
  if (uaListe) {
    uaListe.addEventListener('click', e => {
      const reihe = e.target.closest('.uareihe');
      const akt = e.target.closest('[data-uakt]');
      if (!reihe || !akt) return;
      if (akt.dataset.uakt === 'toggle') {
        unteraufgabeToggle(item.id, reihe.dataset.ua);
        renderAlles();
        sheetTachoOeffnen();
      } else if (akt.dataset.uakt === 'loeschen') {
        item.unteraufgaben = item.unteraufgaben.filter(u => u.id !== reihe.dataset.ua);
        Store.tag.log = Store.tag.log.filter(l => !(l.itemId === item.id && l.uaId === reihe.dataset.ua));
        uaSummenAngleichen(item);
        gesamtpunkteAktualisieren();
        Store.speichereItems(); Store.speichereTag();
        renderAlles();
        sheetTachoOeffnen();
      }
    });
    uaListe.addEventListener('input', e => {
      const reihe = e.target.closest('.uareihe');
      if (!reihe) return;
      const ua = item.unteraufgaben.find(u => u.id === reihe.dataset.ua);
      if (!ua) return;
      if (e.target.matches('[data-uakt="min"]')) {
        ua.geplantMin = Number(e.target.value) || null;
      } else if (e.target.matches('[data-uakt="bonus"]')) {
        ua.bonusPunkte = e.target.value === '' ? null : Number(e.target.value);
      } else return;
      uaSummenAngleichen(item);   // Gesamt folgt der Summe der Unteraufgaben
      Store.speichereItems();
      tachoTick();
    });
  }
}

/* Sekündliches Live-Update des Tachos (Ring, Restzeit, Leiste, ETA). */
function tachoTick() {
  if (sheetOffenFuer !== 'tacho') return;
  const item = fokusItem();

  // Akku (live inkl. laufendem Fokus)
  const akkuEl = $('tAkku');
  const akkuP = akkuLive();
  if (akkuEl) akkuEl.textContent = akkuP != null ? Math.round(akkuP) + '%' : '–%';

  // Upgrade-Leiste: Fortschritt zum günstigsten nächsten Kauf (Etappe 2)
  gesamtpunkteAktualisieren();
  const delta = fokusLiveDelta();
  if ($('tBarG')) {
    const nk = naechsterKauf();
    const k = konto();
    if (nk) {
      const preis = Math.max(1, nk.preis);
      const g = Math.min(1, Math.max(0, (k - delta) / preis));
      const y = Math.min(1 - g, Math.max(0, delta / preis));
      let h = 0;
      if (item && item.typ !== 'counter' && item.aufwandGeplantMin > 0) {
        const potenzial = Math.max(0,
          punkteBeiMinuten(item, Math.max(item.aufwandGeplantMin, minutenInklFokus(item)))
          - punkteBeiMinuten(item, minutenInklFokus(item)));
        h = Math.min(1 - g - y, potenzial / preis);
      }
      $('tBarG').style.width = (g * 100).toFixed(1) + '%';
      $('tBarY').style.width = (y * 100).toFixed(1) + '%';
      $('tBarH').style.width = (h * 100).toFixed(1) + '%';
      $('tLevelZiel').textContent = BELOHNUNG[nk.kat].icon + ' ' + fmtPunkte(nk.preis) + ' P';
      const fehlt = nk.preis - k;
      const min = item ? minutenInklFokus(item) : 0;
      const ppm = (item && min > 0.2) ? punkteBeiMinuten(item, min) / min : 0;
      $('tEta').textContent = fehlt <= 0 ? 'Kauf möglich!' :
        (ppm > 0 ? '~' + Math.ceil(fehlt / ppm) + ' min bei ' + fmtPunkte(ppm) + ' P/min'
                 : fmtPunkte(fehlt) + ' P fehlen');
    } else {
      $('tBarG').style.width = '100%'; $('tBarY').style.width = '0'; $('tBarH').style.width = '0';
      $('tLevelZiel').textContent = 'Alles gekauft'; $('tEta').textContent = '';
    }
  }

  // Ring
  const zeitArc = $('tZeitArc');
  if (!zeitArc) return;
  const rotArc = $('tRotArc'), progArc = $('tProgArc');
  const dot = $('tKopfDot'), halo = $('tKopfHalo');
  if (!item) {
    zeitArc.setAttribute('stroke-dasharray', '0 ' + RING_C);
    rotArc.setAttribute('stroke-dasharray', '0 ' + RING_C);
    progArc.setAttribute('stroke-dasharray', '0 ' + RING_CP);
    dot.setAttribute('opacity', '0'); halo.setAttribute('opacity', '0');
    $('tTicks').innerHTML = '';
    $('tRest').textContent = '–'; $('tRest').className = 'trest';
    $('tRestSub').textContent = 'Kein Fokus aktiv';
    $('tUaBox').hidden = true;
    return;
  }

  const geplant = item.aufwandGeplantMin || 0;
  const min = minutenInklFokus(item);
  let farbeKlasse = 'gruen', kopfFarbe = 'var(--ok)';
  if (geplant > 0) {
    const pct = min / geplant;
    if (pct >= 1.1) { farbeKlasse = 'rot'; kopfFarbe = 'var(--bad)'; }
    else if (pct >= 0.8) { farbeKlasse = 'gelb'; kopfFarbe = 'var(--warn)'; }
    zeitArc.setAttribute('stroke', pct >= 0.8 ? 'url(#gGelb)' : 'url(#gLauf)');
    zeitArc.setAttribute('stroke-dasharray', (Math.min(1, pct) * RING_C).toFixed(1) + ' ' + RING_C);
    // Überzieh-Runde: dreht weiter und übermalt (gelb bis 110%, dann rot)
    const ueber = pct > 1 ? Math.min(1, pct - 1) : 0;
    rotArc.setAttribute('stroke', pct >= 1.1 ? 'url(#gRot)' : 'url(#gGelb)');
    rotArc.setAttribute('stroke-dasharray', (ueber * RING_C).toFixed(1) + ' ' + RING_C);
    const rest = geplant - min;
    $('tRest').textContent = rest >= 0 ? fmtDauer(rest * 60) : '+' + fmtDauer(-rest * 60);
    $('tRest').className = 'trest ' + farbeKlasse;
    $('tRestSub').textContent = 'von ' + geplant + ' min · ' + Math.round(pct * 100) + '% verbraucht';
    setzeKopf(dot, halo, (pct % 1), kopfFarbe);
  } else {
    // Stoppuhr-Modus: rotierendes Segment, hochzählend
    const frac = (min * 60 % 60) / 60;
    zeitArc.setAttribute('stroke', 'url(#gLauf)');
    zeitArc.setAttribute('stroke-dasharray', '52 ' + RING_C);
    zeitArc.setAttribute('stroke-dashoffset', (-frac * RING_C).toFixed(1));
    rotArc.setAttribute('stroke-dasharray', '0 ' + RING_C);
    $('tRest').textContent = fmtDauer(min * 60);
    $('tRest').className = 'trest';
    $('tRestSub').textContent = 'keine Zeit geplant — Stoppuhr';
    setzeKopf(dot, halo, frac, 'var(--cyan)');
  }

  // Rennen: Fortschritts-Ring = abgehakte Zeit-Anteile
  const uas = item.unteraufgaben || [];
  const zeiten = zeitVerteilung(item);
  const summe = zeiten.reduce((s, z) => s + z, 0);
  let progFrac = 0;
  if (uas.length) {
    const fertigZeit = uas.reduce((s, u, i) => s + (u.erledigt ? zeiten[i] : 0), 0);
    progFrac = summe > 0 ? fertigZeit / summe : uas.filter(u => u.erledigt).length / uas.length;
  }
  progArc.setAttribute('stroke-dasharray', (Math.min(1, progFrac) * RING_CP).toFixed(1) + ' ' + RING_CP);

  // Striche = Soll-Übergänge der Unteraufgaben
  let ticks = '';
  if (uas.length > 1 && summe > 0) {
    let cum = 0;
    uas.slice(0, -1).forEach((u, i) => {
      cum += zeiten[i];
      const w = cum / summe * 2 * Math.PI - Math.PI / 2;
      ticks += '<line x1="' + (66 + 53 * Math.cos(w)).toFixed(1) + '" y1="' + (66 + 53 * Math.sin(w)).toFixed(1)
        + '" x2="' + (66 + 63 * Math.cos(w)).toFixed(1) + '" y2="' + (66 + 63 * Math.sin(w)).toFixed(1)
        + '" stroke="var(--bg)" stroke-width="3"/>';
    });
  }
  $('tTicks').innerHTML = ticks;

  // Info-Box: aktuelle Unteraufgabe + ihr Zeitfenster
  const aktIdx = uas.findIndex(u => !u.erledigt);
  if (aktIdx >= 0) {
    $('tUaBox').hidden = false;
    $('tUaNum').textContent = (aktIdx + 1) + '/' + uas.length;
    $('tUaName').textContent = uas[aktIdx].titel;
    if (summe > 0 && geplant > 0) {
      const cumEnde = zeiten.slice(0, aktIdx + 1).reduce((s, z) => s + z, 0);
      const segRest = cumEnde - min;
      $('tUaRest').textContent = segRest >= 0
        ? 'Abschnitt: noch ' + fmtDauer(segRest * 60)
        : 'Abschnitt: ' + fmtDauer(-segRest * 60) + ' drüber';
      $('tUaRest').style.color = segRest >= 0 ? 'var(--mut)' : 'var(--bad)';
    } else {
      $('tUaRest').textContent = '';
    }
  } else {
    $('tUaBox').hidden = true;
  }

  const gesamtEl = $('tGesamtP');
  if (gesamtEl) gesamtEl.textContent = fmtPunkte(punkteBeiMinuten(item, Math.max(min, geplant)));
  const pp = $('tPp');
  if (pp) pp.textContent = (fokus && fokus.laeuft) ? '⏸' : '▶';
}

function setzeKopf(dot, halo, frac, farbe) {
  const w = frac * 2 * Math.PI - Math.PI / 2;
  const x = (66 + 58 * Math.cos(w)).toFixed(1), y = (66 + 58 * Math.sin(w)).toFixed(1);
  dot.setAttribute('cx', x); dot.setAttribute('cy', y); dot.setAttribute('opacity', '1');
  halo.setAttribute('cx', x); halo.setAttribute('cy', y); halo.setAttribute('opacity', '.5');
  halo.setAttribute('fill', farbe);
}

/* ════════════════════════════════════════════════════════════════════
   Shop (Etappe 2, 21.07.2026 — ersetzt die Würfel-Mechanik aus 6.3):
   Punkte-Konto = Wohlstand live − Ausgaben. Preise sichtbar und je
   Kategorie verschieden, Ziel ~4 Std Fokuszeit je Kauf (gekoppelt an
   den persönlichen 7-Tage-Ø, Faktor in den Settings). Der Inhalt der
   nächsten Stufe bleibt „???" bis zum Kauf; Cross-Voraussetzungen
   bleiben als 🔒 mit Hinweis bestehen.
   ════════════════════════════════════════════════════════════════════ */
const KAT_PREISFAKTOR = {
  fahrzeuge: 1.3, wohnen: 1.2, reisen: 1.1,
  mobilitaet: 1.0, begleiter: 0.9, soziales: 0.8
};

function konto() {
  return Math.max(0, wohlstandLive() - ((belohnung && belohnung.ausgegeben) || 0));
}

/* Persönlicher Ø-Punktesatz der letzten 7 abgeschlossenen Tage. */
function oePStd7() {
  const h = historieLaden().slice(-7);
  const punkte = h.reduce((s, d) => s + (d.punkte || 0), 0);
  const min = h.reduce((s, d) => s + (d.fokusMin || 0), 0);
  if (min >= 60) return Math.max(5, punkte / (min / 60));
  return (Store.settings.basisProStd || 12) * 1.5;   // Startwert, bis Historie da ist
}

function preisFuer(kat) {
  const basis = 4 * oePStd7() * (Store.settings.preisFaktor || 1) * (KAT_PREISFAKTOR[kat] || 1);
  return Math.max(20, Math.round(basis / 5) * 5);
}

/* Kauf-Voraussetzung (Cross-Kategorie): null = frei, sonst Hinweistext. */
function kaufSperre(kat) {
  const naechste = BELOHNUNG[kat].stufen[belohnung.stufen[kat]];
  if (!naechste) return 'komplett';
  const req = naechste[2];
  if (req && (belohnung.stufen[req[0]] || 0) < req[1]) {
    return 'braucht ' + BELOHNUNG[req[0]].icon + ' ' + BELOHNUNG[req[0]].name + ' Stufe ' + req[1];
  }
  return null;
}

/* Günstigster gerade kaufbarer nächster Schritt (für die Statusleiste). */
function naechsterKauf() {
  let bester = null;
  KAT_KEYS.forEach(k => {
    if (kaufSperre(k)) return;
    const preis = preisFuer(k);
    if (!bester || preis < bester.preis) bester = { kat: k, preis };
  });
  return bester;
}

function kaufen(kat) {
  const idx = belohnung.stufen[kat];
  const stufe = BELOHNUNG[kat].stufen[idx];
  if (!stufe || kaufSperre(kat)) return false;
  const preis = preisFuer(kat);
  if (konto() < preis) {
    toastZeigen('Noch ' + fmtPunkte(preis - konto()) + ' P bis zu diesem Kauf');
    return false;
  }
  belohnung.stufen[kat] = idx + 1;
  belohnung.ausgegeben = (belohnung.ausgegeben || 0) + preis;
  belohnung.kaeufe = belohnung.kaeufe || [];
  belohnung.kaeufe.push({ kat, stufe: idx + 1, name: stufe[0], datum: heuteIso(), preis });
  belohnungSpeichern();
  konfetti();
  toastZeigen('🎉 Gekauft: ' + BELOHNUNG[kat].icon + ' ' + stufe[0]);
  renderBelohnung();
  renderStatusbar();
  return true;
}

/* ── Render-Avatar (22.07.2026): DALL-E-Renderings nach Pascals
     Referenzfotos, zugeschnitten aus assets/ nach img/. Outfit wächst
     mit dem Level; erschöpft = eigene müde Variante. ── */
function avatarHtml(gesamtStufe, vital) {
  const tier = gesamtStufe >= 10 ? 3 : gesamtStufe >= 7 ? 2 : gesamtStufe >= 4 ? 1 : 0;
  const bild = !vital ? 'muede' : ['hoodie', 'rollkragen', 'blazer', 'anzug'][tier];
  return '<img class="avfoto" src="img/avatar-' + bild + '.jpg" alt="Avatar">';
}

/* Vitalität (6.2): getrieben vom Akku-Durchschnitt des Tages. */
function vitalitaet() {
  const v = Store.tag.akkuVerlauf || [];
  if (!v.length) return Store.tag.akkuProzent == null ? true : Store.tag.akkuProzent >= 50;
  return v.reduce((s, e) => s + e.p, 0) / v.length >= 50;
}

/* Avatar-Stufe = eigenes Level über die Gesamt-Punkte (Änderung 20.07.2026,
   ersetzt den alten Durchschnitt der Kategorie-Stufen). */
function gesamtStufe() {
  return (belohnung && belohnung.avatarStufe) || 1;
}

/* Aufschlüsselung (3.5): erledigte Punkte nach Bereich oder Tagesabschnitt. */
/* Aufschlüsselungs-Basis von heute (Log ohne counterAbschluss-Dopplung +
   tickLog), optional auf eine Domäne beschränkt. */
function logEintraegeHeute(domain) {
  const alle = [...Store.tag.log.filter(l => !l.counterAbschluss), ...(Store.tag.tickLog || [])];
  return domain ? alle.filter(l => (l.domain || 'dfm') === domain) : alle;
}

function punkteNachGruppe(achse, domain) {
  const gruppen = {};
  const add = (key, p) => { gruppen[key] = (gruppen[key] || 0) + (Number(p) || 0); };
  logEintraegeHeute(domain).forEach(l => {
    if (achse === 'bereich') {
      add(l.bereich || (l.domain === 'dfm' ? 'DFM' : 'Privat'), l.punkte);
    } else {
      const std = new Date(l.zeit).getHours();
      const s = Store.settings;
      add(std < s.abschnittMorgenBis ? 'Morgen' : std < s.abschnittTagBis ? 'Tag' : 'Abend', l.punkte);
    }
  });
  return gruppen;
}

let aufAchse = 'bereich';
let statZeitraum = 'heute';
let statFilter = { punkte: true, energie: true, soll: true };

/* Domänen-Umschalter (Pascal 22.07.2026): blendet DFM- oder Privat-Infos
   auf Stream UND Statistik aus. Ein globaler Zustand, beide Seiten teilen ihn.
   Routinen sind im Stream immer sichtbar (unabhängig vom Filter). */
let domFilter = 'alle';   // 'alle' | 'dfm' | 'privat'
function domSichtbar(domain) {
  return domFilter === 'alle' || (domain || 'dfm') === domFilter;
}
function domFilterHtml(id) {
  return '<div class="vtoggle domfilter" id="' + id + '">'
    + [['alle', 'Alle'], ['dfm', 'DFM'], ['privat', 'Privat']].map(([d, l]) =>
        '<button data-dom="' + d + '" class="' + (domFilter === d ? 'on' : '') + '">' + l + '</button>').join('')
    + '</div>';
}
function domFilterVerdrahten(el) {
  if (!el) return;
  el.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
    if (domFilter === btn.dataset.dom) return;
    domFilter = btn.dataset.dom;
    renderStream();
    if ($('view-belohnung').classList.contains('on')) renderBelohnung();
  }));
}

/* Snapshots des Zeitraums, heute immer live dabei. */
function statTage(zeitraum) {
  const alt = historieLaden().filter(d => d.datum !== Store.tag.datum);
  const alle = [...alt, heuteAlsSnapshot()];
  const n = zeitraum === 'woche' ? 7 : zeitraum === 'monat' ? 30 : 1;
  return alle.slice(-n);
}

/* Aufschlüsselung über den Zeitraum, gemäß Domänenfilter (heute live). */
function punkteNachGruppeZeitraum(achse, zeitraum) {
  const gruppen = {};
  statTage(zeitraum).forEach(tag => {
    const s = snapNachFilter(tag);
    const quelle = achse === 'bereich' ? s.bereiche : s.abschnitte;
    Object.entries(quelle || {}).forEach(([k, v]) => gruppen[k] = (gruppen[k] || 0) + (Number(v) || 0));
  });
  return gruppen;
}

/* Punktekurve: heute = kumulierte Tageskurve + Soll-Linie,
   Woche/Monat = Balken je Tag (Sleep-Cycle-Stil). */
function kurveHtml(zeitraum) {
  const s = Store.settings;
  if (zeitraum === 'heute') {
    const snap = snapNachFilter(statTage('heute')[0]);   // Domänenfilter
    const { start, ende } = arbeitstagFenster();
    const events = snap.verlauf
      .map(e => ({ min: (d => d.getHours() * 60 + d.getMinutes())(new Date(e.z)), p: e.p }))
      .sort((a, b) => a.min - b.min);
    const ziel = sollWerte(true).gesamt;   // manueller Soll-Wert oder geplante Punkte
    let kum = 0;
    const punkte = [[start, 0]];
    events.forEach(e => { kum += (Number(e.p) || 0); punkte.push([Math.min(ende, Math.max(start, e.min)), kum]); });
    const jetzt = new Date(); const jm = Math.min(ende, jetzt.getHours() * 60 + jetzt.getMinutes());
    const fi = fokusItem();
    if (fi && domSichtbar(fi.domain)) kum += (Number(fokusLiveDelta()) || 0);   // Live nur wenn Domäne sichtbar
    if (jm > start) punkte.push([jm, kum]);
    // Dynamische Skala: höchster angezeigter Wert (Kurven-Spitze, ggf. Soll-Linie)
    // + 15 % Puffer, damit die Linie nie an den oberen Rand läuft (22.07.2026).
    const spitze = punkte.reduce((m, pt) => Math.max(m, pt[1]), 0);
    const maxY = Math.max(statFilter.soll ? ziel : 0, spitze, 10) * 1.15;
    const X = m => 6 + (m - start) / Math.max(1, ende - start) * 288;
    const Y = p => 96 - (p / maxY) * 86;
    const linie = punkte.map(pt => X(pt[0]).toFixed(1) + ',' + Y(pt[1]).toFixed(1)).join(' ');
    const fm = snap.fokusMin;
    const oe = fm >= 5 ? fmtPunkte((snap.punkte || 0) / (fm / 60)) + ' P/Std Fokus' : '';
    // Energie-Serie (rechte Skala 0–100 %) — gemergter Graph (22.07.2026)
    const YA = p => 96 - (p / 100) * 86;
    const av = (Store.tag.akkuVerlauf || []).filter(e => e.min >= start && e.min <= ende);
    let akkuLinie = av.map(e => X(e.min).toFixed(1) + ',' + YA(e.p).toFixed(1)).join(' ');
    const aJetzt = akkuLive();
    if (aJetzt != null && jm > start) akkuLinie += (akkuLinie ? ' ' : '') + X(jm).toFixed(1) + ',' + YA(aJetzt).toFixed(1);
    return '<div class="akkukarte"><div class="lbl"><span>Tagesverlauf</span><span>' + oe + '</span></div>'
      + '<svg viewBox="0 0 300 104" width="100%" height="104">'
      + '<line x1="6" y1="96" x2="294" y2="96" stroke="var(--line)"/>'
      + (statFilter.soll ? '<line x1="' + X(start) + '" y1="' + Y(0) + '" x2="' + X(ende) + '" y2="' + Y(ziel) + '" stroke="var(--mut2)" stroke-width="1.5" stroke-dasharray="4 4"/>'
        + '<text x="240" y="' + (Y(ziel) + 12) + '" fill="var(--mut2)" font-size="8">Soll ' + fmtPunkte(ziel) + '</text>' : '')
      + (statFilter.energie && akkuLinie ? '<polyline points="' + akkuLinie + '" fill="none" stroke="var(--ok)" stroke-width="1.8" stroke-linejoin="round" opacity=".85"/>'
        + '<text x="272" y="' + (YA(aJetzt != null ? aJetzt : 50) - 4).toFixed(1) + '" fill="var(--ok)" font-size="8">' + (aJetzt != null ? Math.round(aJetzt) + '%' : '') + '</text>' : '')
      + (statFilter.punkte ? '<polyline points="' + linie + '" fill="none" stroke="var(--purple)" stroke-width="2.5" stroke-linejoin="round"/>'
        + (punkte.length ? '<circle cx="' + X(punkte[punkte.length - 1][0]).toFixed(1) + '" cy="' + Y(punkte[punkte.length - 1][1]).toFixed(1) + '" r="3.5" fill="var(--purple)"/>' : '')
        + '<text x="6" y="10" fill="var(--purple)" font-size="9">' + fmtPunkte(kum) + ' P</text>' : '')
      + '<text x="6" y="104" fill="var(--mut2)" font-size="8">' + s.arbeitstagStart + '</text>'
      + '<text x="272" y="104" fill="var(--mut2)" font-size="8">' + s.arbeitstagEnde + '</text>'
      + '</svg></div>';
  }
  // Woche/Monat: Balken je Tag (Domänenfilter über snapNachFilter)
  const tage = statTage(zeitraum).map(snapNachFilter);
  const maxP = Math.max(...tage.map(d => d.punkte || 0), 10);
  const n = zeitraum === 'woche' ? 7 : 30;
  const bw = Math.floor(288 / n) - 2;
  let balken = '';
  tage.forEach((d, i) => {
    const h = Math.max(2, (d.punkte || 0) / maxP * 80);
    const x = 6 + i * (288 / n);
    const heute = d.datum === Store.tag.datum;
    balken += '<rect x="' + x.toFixed(1) + '" y="' + (90 - h).toFixed(1) + '" width="' + bw + '" height="' + h.toFixed(1)
      + '" rx="2" fill="' + (heute ? 'var(--cyan)' : 'var(--purple)') + '"/>';
  });
  const summe = tage.reduce((s2, d) => s2 + (d.punkte || 0), 0);
  return '<div class="akkukarte"><div class="lbl"><span>Punkte je Tag (' + tage.length + ' Tage)</span><span>Σ ' + fmtPunkte(summe) + ' P</span></div>'
    + '<svg viewBox="0 0 300 100" width="100%" height="100">'
    + '<line x1="6" y1="90" x2="294" y2="90" stroke="var(--line)"/>' + balken
    + '<text x="6" y="99" fill="var(--mut2)" font-size="8">' + (tage[0] ? tage[0].datum.slice(5) : '') + '</text>'
    + '<text x="266" y="99" fill="var(--mut2)" font-size="8">heute</text>'
    + '</svg></div>';
}

function kennzahlenHtml(zeitraum) {
  const tage = statTage(zeitraum).map(snapNachFilter);
  const p = tage.reduce((s, d) => s + (d.punkte || 0), 0);
  const min = tage.reduce((s, d) => s + (d.fokusMin || 0), 0);
  const erl = tage.reduce((s, d) => s + (d.erledigt || 0), 0);
  const oe = min >= 30 ? fmtPunkte(p / (min / 60)) : '–';
  const stunden = Math.floor(min / 60) + ':' + String(min % 60).padStart(2, '0');
  return '<div class="statsgrid">'
    + '<div class="statbox"><div class="v">' + fmtPunkte(p) + '</div><div class="k">Punkte</div></div>'
    + '<div class="statbox"><div class="v">' + stunden + ' h</div><div class="k">Fokuszeit</div></div>'
    + '<div class="statbox"><div class="v">' + erl + '</div><div class="k">Erledigt</div></div>'
    + '<div class="statbox"><div class="v">' + oe + '</div><div class="k">Ø P/Std Fokus</div></div>'
    + '</div>';
}

  if (st('fahrzeuge') > 1) obj.push(['vorne', st('fahrzeuge') >= 7 ? '🏎️' : st('fahrzeuge') >= 3 ? '🚗' : '🚲', 'right:5%;bottom:12px', 18 + st('fahrzeuge') * 3, st('fahrzeuge')]);

  });
}

/* Detail-Analyse (Sleep-Cycle-Stil): 14-Tage-Trends im Sheet. */
function balkenSvgHtml(titel, tage, wertFn, einheit, farbe) {
  const werte = tage.map(wertFn);
  const max = Math.max(...werte, 1);
  const n = tage.length;
  const bw = Math.max(2, Math.floor(288 / Math.max(n, 1)) - 2);
  let balken = '';
  werte.forEach((w, i) => {
    const h = Math.max(2, w / max * 70);
    balken += '<rect x="' + (6 + i * (288 / n)).toFixed(1) + '" y="' + (80 - h).toFixed(1)
      + '" width="' + bw + '" height="' + h.toFixed(1) + '" rx="2" fill="' + farbe + '"/>';
  });
  return '<div class="akkukarte" style="margin-bottom:var(--s1)"><div class="lbl"><span>' + titel + '</span>'
    + '<span>max ' + fmtPunkte(max) + einheit + '</span></div>'
    + '<svg viewBox="0 0 300 90" width="100%" height="90">'
    + '<line x1="6" y1="80" x2="294" y2="80" stroke="var(--line)"/>' + balken
    + '<text x="6" y="89" fill="var(--mut2)" font-size="8">' + (tage[0] ? tage[0].datum.slice(5) : '') + '</text>'
    + '<text x="266" y="89" fill="var(--mut2)" font-size="8">heute</text>'
    + '</svg></div>';
}

/* Grit-Stil-Heatmap (22.07.2026): 10 Wochen, Zellen-Helligkeit nach
   Tagespunkten, Rand grün/rot = Tages-Pace über/unter dem Ø. */
function heatmapHtml() {
  const alt = historieLaden().filter(d => d.datum !== Store.tag.datum);
  const tage = [...alt, heuteAlsSnapshot()].map(snapNachFilter);
  const map = {};
  tage.forEach(d => map[d.datum] = d);
  const maxP = Math.max(...tage.map(d => d.punkte || 0), 1);
  const paces = tage.filter(d => (d.fokusMin || 0) >= 30).map(d => d.punkte / (d.fokusMin / 60));
  const avgPace = paces.length ? paces.reduce((a, b) => a + b, 0) / paces.length : 0;
  const heute = new Date(heuteIso() + 'T00:00:00');
  const startTag = new Date(heute);
  startTag.setDate(heute.getDate() - wochentagMo0(heute) - 63);   // 10 Wochen, montags
  let zellen = '';
  for (let i = 0; i < 70; i++) {
    const dat = new Date(startTag); dat.setDate(startTag.getDate() + i);
    if (dat > heute) { zellen += '<span class="hz leer"></span>'; continue; }
    const iso = dat.getFullYear() + '-' + String(dat.getMonth() + 1).padStart(2, '0') + '-' + String(dat.getDate()).padStart(2, '0');
    const d = map[iso];
    if (!d || !(d.punkte > 0)) { zellen += '<span class="hz" title="' + iso + '"></span>'; continue; }
    const t2 = Math.min(1, d.punkte / maxP);
    const farbe = 'rgba(' + Math.round(185 + 70 * t2) + ',' + Math.round(138 + 80 * t2) + ',247,' + (0.25 + 0.75 * t2).toFixed(2) + ')';
    let rand = 'transparent';
    if (avgPace > 0 && (d.fokusMin || 0) >= 30) {
      rand = (d.punkte / (d.fokusMin / 60)) >= avgPace ? 'var(--ok)' : 'var(--bad)';
    }
    zellen += '<span class="hz" title="' + iso + ' · ' + fmtPunkte(d.punkte) + ' P" style="background:' + farbe
      + (t2 > 0.75 ? ';box-shadow:0 0 6px ' + farbe : '') + ';border-color:' + rand + '"></span>';
  }
  return '<div class="akkukarte" style="margin-bottom:var(--s1)">'
    + '<div class="lbl"><span>10 Wochen — heller = mehr Punkte</span>'
    + '<span><i style="font-style:normal;color:var(--ok)">▢</i> über Ø-Pace · <i style="font-style:normal;color:var(--bad)">▢</i> darunter</span></div>'
    + '<div class="heatmap">' + zellen + '</div></div>';
}

  sheetOeffnen('Detail-Analyse', html, 'analyse');
}

function akkuKurveHtml() {
  const s = Store.settings;
  const { start, ende } = arbeitstagFenster();
  const v = Store.tag.akkuVerlauf || [];
  let inhalt;
  if (v.length === 0) {
    inhalt = '<div class="leer">Noch keine Akku-Daten — Tag starten setzt den ersten Punkt.</div>';
  } else {
    const x = m => 6 + Math.min(1, Math.max(0, (m - start) / Math.max(1, ende - start))) * 288;
    const y = p => 64 - (p / 100) * 56;
    const punkte = v.map(e => x(e.min).toFixed(1) + ',' + y(e.p).toFixed(1));
    // Kurve bis „jetzt" mit letztem Wert weiterziehen
    const jetzt = new Date(); const jm = jetzt.getHours() * 60 + jetzt.getMinutes();
    if (jm > v[v.length - 1].min) punkte.push(x(jm).toFixed(1) + ',' + y(v[v.length - 1].p).toFixed(1));
    inhalt = '<svg viewBox="0 0 300 70" width="100%" height="70">'
      + '<line x1="6" y1="64" x2="294" y2="64" stroke="var(--line)" stroke-width="1"/>'
      + '<polyline points="' + punkte.join(' ') + '" fill="none" stroke="var(--cyan)" stroke-width="2.5" stroke-linejoin="round"/>'
      + v.map(e => '<circle cx="' + x(e.min).toFixed(1) + '" cy="' + y(e.p).toFixed(1) + '" r="3" fill="var(--cyan)"/>').join('')
      + '</svg>';
  }
  const avg = v.length ? Math.round(v.reduce((a, e) => a + e.p, 0) / v.length) : null;
  return '<div class="akkukarte"><div class="lbl"><span>Akku-Verlauf (' + s.arbeitstagStart + '–' + s.arbeitstagEnde + ')</span>'
    + '<span>' + (avg != null ? 'Ø ' + avg + '%' : '–') + '</span></div>' + inhalt + '</div>';
}

function aufschluesselungHtml(gruppen) {
  gruppen = gruppen || punkteNachGruppe(aufAchse);
  const namen = Object.keys(gruppen);
  if (!namen.length) return '<div class="leer">Noch keine erledigten Punkte heute.</div>';
  const reihenfolge = aufAchse === 'abschnitt'
    ? ['Morgen', 'Tag', 'Abend'].filter(n => namen.includes(n))
    : namen.sort((a, b) => gruppen[b] - gruppen[a]);
  const max = Math.max(...namen.map(n => Math.abs(gruppen[n])), 1);
  return reihenfolge.map(n =>
    '<div class="aufzeile"><span class="albl">' + escapeHtml(n) + '</span>'
    + '<div class="abar"><i style="width:' + Math.round(Math.abs(gruppen[n]) / max * 100) + '%'
    + (gruppen[n] < 0 ? ';background:var(--bad)' : '') + '"></i></div>'
    + '<span class="awert">' + fmtPunkte(gruppen[n]) + ' P</span></div>').join('');
}

function toastZeigen(text) {

/* Tag starten (1.2): Energie + Motivation → Akku-Vorschlag, überschreibbar.
   Auch nach Tagesstart erreichbar (Tap auf den Akku) zum Anpassen. */
function sheetTagStartOeffnen() {
  const t = Store.tag;
  const e0 = t.energieStart || 7, m0 = t.motivationStart || 7;
  const akku0 = (t.akkuProzent != null) ? Math.round(t.akkuProzent) : Math.round((e0 + m0) / 2) * 10;
  let html = ''
    + '<div class="regler"><div class="kopfzeile2"><label>Energie</label><span class="wert" id="wEnergie">' + e0 + '</span></div>'
    + '<input type="range" min="1" max="10" step="1" value="' + e0 + '" id="rEnergie"></div>'
    + '<div class="regler"><div class="kopfzeile2"><label>Motivation</label><span class="wert" id="wMotivation">' + m0 + '</span></div>'
    + '<input type="range" min="1" max="10" step="1" value="' + m0 + '" id="rMotivation"></div>'
    + '<div class="pbadge"><span>Akku-Startwert (Vorschlag, überschreibbar)</span>'
    + '<span><input class="akkuwert" id="wAkku" type="number" inputmode="numeric" min="0" max="100" value="' + akku0 + '"> %</span></div>'
    + '<button class="wizbtn" id="wStart">' + (t.gestartet ? 'Akku übernehmen' : 'Tag starten') + '</button>';
  sheetOeffnen(t.gestartet ? 'Akku anpassen' : 'Tag starten', html, 'tagstart');

  let akkuManuell = false;
  const vorschlag = () => {
    if (akkuManuell) return;
    $('wAkku').value = Math.round((Number($('rEnergie').value) + Number($('rMotivation').value)) / 2) * 10;
  };
  $('rEnergie').addEventListener('input', () => { $('wEnergie').textContent = $('rEnergie').value; vorschlag(); });
  $('rMotivation').addEventListener('input', () => { $('wMotivation').textContent = $('rMotivation').value; vorschlag(); });
  $('wAkku').addEventListener('input', () => { akkuManuell = true; });
  $('wStart').addEventListener('click', () => {
    const echterStart = !t.gestartet || t.abgeschlossen;
    // Neustart am selben Tag nach Abschluss = Abschluss zurücknehmen
    if (t.abgeschlossen) abschlussWiderrufen();
    if (echterStart) {
      // Prozess-Schritt 1 (22.07.2026): NUR Counter + Routinen zurücksetzen.
      // Aufgaben laufen weiter bis abgeschlossen — ihre Ist-Zeit bleibt, nur
      // die heutige Fokuszeit-Referenz wird neu gesetzt.
      Store.items.forEach(i => {
        if (i.typ === 'counter') i.tickStandHeute = 0;
        if (i.typ === 'routine') {
          if (i.status !== 'offen') i.status = 'offen';
          i.istMinuten = 0;
        }
      });
      tagStartMinutenErfassen();
      Store.speichereItems();
    }
    t.energieStart = Number($('rEnergie').value);
    t.motivationStart = Number($('rMotivation').value);
    t.akkuProzent = Math.min(100, Math.max(0, Number($('wAkku').value) || 0));
    t.gestartet = true;
    // Energie-Kurve für die Belohnungsseite fortschreiben (6.1)
    const jetzt = new Date();
    t.akkuVerlauf = t.akkuVerlauf || [];
    t.akkuVerlauf.push({ min: jetzt.getHours() * 60 + jetzt.getMinutes(), p: t.akkuProzent });
    Store.speichereTag();
    sheetSchliessen();
  });
}

/* Kopieren mit Fallback (file:// bzw. ältere WebViews) */
function inZwischenablage(text, btn) {
  const fertig = () => { const alt = btn.textContent; btn.textContent = '✓ Kopiert'; setTimeout(() => btn.textContent = alt, 1500); };
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    ta.remove(); fertig();
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(fertig, fallback);
  } else fallback();
}

/* Import-Paket aus eingefügtem Text lesen (toleriert ```json-Zäune). */
function importParsen(text) {
  const m = String(text).match(/\{[\s\S]*\}/);
  if (!m) throw new Error('Kein JSON-Block gefunden');
  return JSON.parse(m[0]);
}

function herunterladen(dateiname, inhalt) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([inhalt], { type: 'text/markdown' }));
  a.download = dateiname;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}

  z.push('- Streak: ' + t.streak + ' Tage · Wohlstand-Stand: ' + fmtPunkte(t.wohlstandStand) + ' P');

/* „Neuen Tag starten" (Review-Flow, 23.07.2026): alle offenen Karten des
   Tages einzeln durchgehen — Punkte buchen (Karte läuft weiter) ODER mit
   +/- Punkten weiterschieben (morgen erneut). Danach Snapshot + frischer
   Tag; kein separates Abschließen/Starten, kein Akku-Dialog. */
let reviewListe = [], reviewIdx = 0;

function malusBasis(item) {
  if (item.nichtErledigtMalus != null) return Math.abs(item.nichtErledigtMalus);
  if (item.typ === 'routine') return Math.abs(Store.settings.rhythmusVerpasstProTag);
  return Math.max(5, Math.round(Math.abs(anzeigePunkte(item)) * 0.2));
}

/* Heute an einer offenen Karte erreichte, noch nicht geloggte Zeit-Punkte. */
function heutePunkteOffen(item) {
  const malusSatz = (Store.settings.schiebeMalusProzent[item.prioritaet] || 0) / 100;
  const malusFaktor = Math.max(0, 1 - malusSatz * (item.tageGeschoben || 0));
  const zeitP = punkteFuerZeit(item, heuteInvestiertMin(item)) * malusFaktor;
  const geloggt = Store.tag.log.filter(l => l.itemId === item.id).reduce((s, l) => s + (Number(l.punkte) || 0), 0);
  return Math.max(0, Math.round(zeitP - geloggt));
}

  fokusZeitEinbuchen();
  // Offene Karten: fällige Routinen + Aufgaben im Tagesstream (nicht erledigt,

  reviewListe = Store.items.filter(i =>
    i.status !== 'erledigt' && i.typ !== 'counter' && !i.nachSyncWeg && (
      (i.typ === 'routine' && routineFaellig(i)) ||
      (i.typ === 'aufgabe' && (i.streamSlot != null || i.heuteRausgezogen))
    )
  ).map(i => i.id);
  reviewIdx = 0;
  reviewSchritt();
}

function reviewSchritt() {
  if (reviewIdx >= reviewListe.length) { reviewFertig(); return; }
  const item = Store.findeItem(reviewListe[reviewIdx]);
  if (!item || item.status === 'erledigt') { reviewIdx++; reviewSchritt(); return; }
  const basis = malusBasis(item);
  const buchDefault = heutePunkteOffen(item);
  const buchMax = Math.max(10, buchDefault * 2);
  const uas = item.unteraufgaben || [];
  const heuteMin = Math.round(heuteInvestiertMin(item));
  const inp = 'style="width:74px;text-align:center;color:var(--cyan);font-weight:700"';
  let html = '<div class="wizinfo" style="margin-top:0">Offen · Karte '
    + (reviewIdx + 1) + ' von ' + reviewListe.length + '</div>'
    + '<div class="wizsumme">'
    + '<div class="zeile"><span style="font-weight:800;color:var(--txt)">' + escapeHtml(item.titel) + '</span><b>' + (item.typ === 'routine' ? '🔁' : '📋') + '</b></div>'
    + (heuteMin >= 1 ? '<div class="zeile"><span>Heute getrackt</span><b>' + heuteMin + ' min</b></div>' : '')
    + (uas.length ? '<div class="zeile"><span>Unteraufgaben</span><b>' + uas.filter(u => u.erledigt).length + '/' + uas.length + ' erledigt</b></div>' : '')
    + (item.deadline ? '<div class="zeile"><span>Deadline</span><b>' + item.deadline + '</b></div>' : '')
    + '</div>'
    // Buchen — Punkte festschreiben, Karte läuft weiter
    + '<div class="regler"><div class="kopfzeile2"><label>Punkte heute buchen</label>'
    + '<input type="number" id="rvBuchFeld" ' + inp + ' value="' + buchDefault + '"></div>'
    + '<input type="range" id="rvBuchSlider" min="0" max="' + buchMax + '" step="1" value="' + buchDefault + '"></div>'
    + '<button class="wizbtn" id="rvBuchen">✓ Buchen — Aufgabe läuft weiter</button>'
    // Weiterschieben — morgen erneut, +/- Punkte (Default aus der Aufgabe)
    + '<div class="regler" style="margin-top:var(--s2)"><div class="kopfzeile2"><label>Punkte beim Weiterschieben</label>'
    + '<input type="number" id="rvSchiebFeld" ' + inp + ' value="' + (-basis) + '"></div>'
    + '<input type="range" id="rvSchiebSlider" min="' + (-3 * basis) + '" max="' + basis + '" step="1" value="' + (-basis) + '"></div>'
    + '<button class="wizbtn sek" id="rvSchieben">⏭ Weiterschieben — morgen erneut</button>';
  sheetOeffnen('Neuen Tag starten', html, 'tagende');

  // Slider ↔ Freifeld je Paar synchron halten
  const sync = (slider, feld) => {
    $(slider).addEventListener('input', () => { $(feld).value = $(slider).value; });
    $(feld).addEventListener('input', () => {
      const v = Number($(feld).value);
      if (!isNaN(v)) $(slider).value = Math.min(Number($(slider).max), Math.max(Number($(slider).min), v));
    });
  };
  sync('rvBuchSlider', 'rvBuchFeld');
  sync('rvSchiebSlider', 'rvSchiebFeld');

  $('rvBuchen').addEventListener('click', () => {
    const p = Math.round(Number($('rvBuchFeld').value) || 0);
    if (p !== 0) Store.tag.log.push({
      itemId: item.id, titel: item.titel, domain: item.domain,
      bereich: item.bereich || null, punkte: p,
      zeit: new Date().toISOString(), gebucht: true, abschluss: true
    });
    if (item.typ === 'routine') item.zuletztErledigt = heuteIso();   // heute behandelt, Rhythmus läuft weiter
    Store.speichereItems(); Store.speichereTag();
    reviewIdx++; reviewSchritt();
  });
  $('rvSchieben').addEventListener('click', () => {
    const p = Math.round(Number($('rvSchiebFeld').value) || 0);
    if (p !== 0) Store.tag.log.push({
      itemId: item.id, titel: item.titel + (p < 0 ? ' — geschoben' : ' — Bonus'), domain: item.domain,
      bereich: item.bereich || null, punkte: p,
      zeit: new Date().toISOString(), geschoben: true, abschluss: true
    });
    if (item.typ === 'routine') {          // Rhythmus ab morgen neu, kein Streak-Bruch
      item.ausgesetztAm = heuteIso();
      item.zuletztErledigt = heuteIso();
      item.rhythmusAnkerWoche = wochenIndex();
    }
    // Aufgabe bleibt offen im Stream für morgen (streamSlot unverändert)
    Store.speichereItems(); Store.speichereTag();
    reviewIdx++; reviewSchritt();
  });
}

function reviewFertig() {
  const t = Store.tag;
  // 1. heutigen Tag buchen (Streak, Wohlstand) und Snapshot + Graphen ablegen
  gesamtpunkteAktualisieren();
  if (t.gesamtpunkteHeute > 0) {
    t.streak = (t.streak || 0) + 1;
    t.streakBonusHeute = Store.settings.streakBonus;
    gesamtpunkteAktualisieren();
  } else {
    t.streak = 0;
  }
  t.wohlstandStand += t.gesamtpunkteHeute;
  historieSchreiben();
  const vortagPunkte = t.gesamtpunkteHeute;
  // 2. erledigte Einmal-Aufgaben ausblenden (beim nächsten Sync löschen)
  let ausgeblendet = 0;
  Store.items.forEach(i => {
    if (i.typ === 'aufgabe' && i.status === 'erledigt' && !i.nachSyncWeg) { i.nachSyncWeg = true; ausgeblendet++; }
  });
  // 3. sofort frischen Tag beginnen — Akku läuft ab letztem Wert weiter, kein Dialog
  const alt = t;
  Store.tag = neuerTagesstand(heuteIso(), alt);
  Store.tag.gestartet = true;
  Store.tag.akkuProzent = alt.akkuProzent;
  Store.items.forEach(i => {
    if (i.typ === 'counter') i.tickStandHeute = 0;
    if (i.typ === 'routine') { if (i.status !== 'offen') i.status = 'offen'; i.istMinuten = 0; }
  });
  tagStartMinutenErfassen();
  Store.speichereAlles();
  renderAlles();
  // 4. Abschluss-Screen mit Export
  const exportJson = JSON.stringify(Store.baueExport('tagesabschluss'), null, 2);
  const html = ''
    + '<div class="tagchip" style="margin-bottom:var(--s2)">🌅 Neuer Tag · Vortag ' + fmtPunkte(vortagPunkte) + ' P</div>'
    + '<div class="wizsumme">'
    + '<div class="zeile"><span>Streak</span><b>' + Store.tag.streak + ' 🔥</b></div>'
    + '<div class="zeile"><span>Konto</span><b>' + fmtPunkte(konto()) + ' P</b></div>'
    + (ausgeblendet ? '<div class="zeile"><span>Erledigte ausgeblendet</span><b>' + ausgeblendet + '</b></div>' : '')
    + '</div>'
    + '<h2 class="sechead">Export → Claude-Chat</h2>'
    + '<textarea class="copyfeld" id="weExport" readonly>' + escapeHtml(exportJson) + '</textarea>'
    + '<button class="wizbtn sek" id="weKopieren">Export kopieren</button>'
    + '<div class="wizinfo">Ausgeblendete erledigte Aufgaben reisen beim nächsten Sync noch mit und werden danach gelöscht.</div>';
  sheetOeffnen('Neuer Tag gestartet', html, 'tagende');
  $('weKopieren').addEventListener('click', () =>
    inZwischenablage('```json\n' + exportJson + '\n```', $('weKopieren')));
}

/* ════════════════════════════════════════════════════════════════════
   Verschieben per ⠿-Griff (5.2/5.3): Drag im Stream = neuer Zeitpunkt,
   Push-down-Layout (nie überlappen), Rausziehen = Warteschlange +
   Schiebe-Malus am Tagesende. Anker fix; Vor-/Nachbereitung nur im
   begrenzten Fenster um ihren Anker.
   ════════════════════════════════════════════════════════════════════ */
function jetztRund5() {
  const d = new Date();
  return Math.round((d.getHours() * 60 + d.getMinutes()) / 5) * 5;
}

/* Push-down (5.3): Karten überlappen nie — gleiche/frühere Slots rücken
   in 5-Minuten-Schritten nach hinten. Anker bleiben unangetastet. */
function pushDown() {
  const stream = Store.items.filter(i => i.streamSlot != null)
    .sort((a, b) => a.streamSlot - b.streamSlot || (a.istAnker ? -1 : 1) - (b.istAnker ? -1 : 1));
  let letzte = -Infinity;
  stream.forEach(i => {
    if (i.istAnker) { letzte = Math.max(letzte, i.streamSlot); return; }
    if (i.streamSlot <= letzte) i.streamSlot = letzte + 5;
    letzte = i.streamSlot;
  });
}

/* Ein-Tap-Wechsel Warteschlange ⇄ Tagesstream (21.07.2026). */
function streamToggle(id) {
  const item = Store.findeItem(id);
  if (!item || item.typ === 'counter' || item.istAnker) return;
  if (item.streamSlot != null) {
    item.streamSlot = null;
    if (item.status !== 'erledigt') {
      item.heuteRausgezogen = true;   // Schiebe-Malus am Tagesende (5.3)
      toastZeigen('⤵ In Warteschlange — unerledigt gibt es am Tagesende den Schiebe-Malus.');
    }
  } else {
    item.streamSlot = jetztRund5();
    item.imStreamAnzeigen = true;
    delete item.heuteRausgezogen;
    pushDown();
  }
  Store.speichereItems();
  renderAlles();
}

/* Kern der Drop-Logik — ziel: {zone:'queue'} | {zone:'stream', index}.
   index = Einfügeposition in der (ohne das Item) sortierten Stream-Liste. */
function dropAnwenden(id, ziel) {
  const item = Store.findeItem(id);
  if (!item || item.istAnker) return;
  if (ziel.zone === 'queue') {
    if (item.streamSlot != null) {
      item.heuteRausgezogen = true;                     // Malus am Tagesende (5.3)
      item.streamSlot = null;
      if (item.status !== 'erledigt') {
        toastZeigen('In Warteschlange — bleibt es unerledigt, gibt es am Tagesende den Schiebe-Malus.');
      }
    }
  } else {
    const stream = Store.items
      .filter(i => i.streamSlot != null && i.id !== id)
      .sort((a, b) => a.streamSlot - b.streamSlot);
    const prev = stream[ziel.index - 1] || null;
    const next = stream[ziel.index] || null;
    let slot;
    const start = uhrzeitAlsMin(Store.settings.arbeitstagStart);
    if (!prev && !next) slot = Math.max(start, jetztRund5());
    else if (!prev)     slot = Math.max(0, next.streamSlot - 15);
    else if (!next)     slot = prev.streamSlot + 30;
    else                slot = Math.round((prev.streamSlot + next.streamSlot) / 2 / 5) * 5;
    // Vor-/Nachbereitung (5.2): Fenster relativ zum Anker-Termin
    if (item.ankerBezugId) {
      const anker = Store.findeItem(item.ankerBezugId);
      if (anker && anker.streamSlot != null) {
        const warVor = item.streamSlot != null
          ? item.streamSlot < anker.streamSlot
          : slot < anker.streamSlot;
        if (warVor) slot = Math.min(slot, anker.streamSlot - 5);   // bis kurz vor den Termin
        else        slot = Math.max(slot, anker.streamSlot + 5);   // danach, bis Tagesende
      }
    }
    item.streamSlot = Math.max(0, Math.min(23 * 60 + 55, slot));
    pushDown();
  }
  Store.speichereItems();
  renderAlles();
}

/* Pointer-Handling: Drag startet NUR am ⠿-Griff und nur in der
   Stream-Hauptansicht (nicht in Sheets) — Kontrakt 7.2. */
(function () {
  let drag = null;
  function markierungLoeschen() {
    document.querySelectorAll('.karte.dropvor').forEach(k => k.classList.remove('dropvor'));
    $('streamListe').classList.remove('dropende');
    $('queueHead').classList.remove('dropziel');
  }
  function zielBestimmen(y) {
    const qh = $('queueHead').getBoundingClientRect();
    if (y >= qh.top) return { zone: 'queue' };
    const karten = [...$('streamListe').querySelectorAll('.karte')].filter(k => k !== drag.karte);
    for (let i = 0; i < karten.length; i++) {
      const r = karten[i].getBoundingClientRect();
      if (y < r.top + r.height / 2) return { zone: 'stream', index: i, el: karten[i] };
    }
    return { zone: 'stream', index: karten.length, el: null };
  }
  document.addEventListener('pointerdown', e => {
    const griff = e.target.closest('.kgriff');
    if (!griff) return;
    const karte = griff.closest('.karte');
    if (!karte || !karte.closest('#view-stream')) return;
    const item = Store.findeItem(karte.dataset.id);
    if (!item || item.istAnker) return;
    e.preventDefault();
    drag = { karte, id: karte.dataset.id, startY: e.clientY, ziel: null };
    karte.classList.add('dragging');
    try { griff.setPointerCapture(e.pointerId); } catch (err) {}
  });
  document.addEventListener('pointermove', e => {
    if (!drag) return;
    e.preventDefault();
    drag.karte.style.transform = 'translateY(' + (e.clientY - drag.startY) + 'px)';
    markierungLoeschen();
    drag.ziel = zielBestimmen(e.clientY);
    if (drag.ziel.zone === 'queue') $('queueHead').classList.add('dropziel');
    else if (drag.ziel.el) drag.ziel.el.classList.add('dropvor');
    else $('streamListe').classList.add('dropende');
  });
  const dragBeenden = () => {
    if (!drag) return;
    markierungLoeschen();
    drag.karte.classList.remove('dragging');
    drag.karte.style.transform = '';
    const { id, ziel } = drag;
    drag = null;
    if (ziel) dropAnwenden(id, ziel);   // ohne Bewegung: Griff löst nichts aus (7.2)
  };
  document.addEventListener('pointerup', dragBeenden);
  document.addEventListener('pointercancel', dragBeenden);
})();

/* ════════════════════════════════════════════════════════════════════
   Interaktion verdrahten

/* Universeller Karten-Kontrakt (7.2) — EIN Delegat für alle Karten,
   egal ob im Stream, in der Warteschlange oder im Tacho-Sheet:
   ▶⏸ = Fokus-Toggle · Kartenfläche = Detail-Sheet · Häkchen = abhaken. */
document.addEventListener('click', e => {
  // Klappfelder auf der Stream-Seite (Counter / Morgen / Tagsüber / Abends)
  const feldKopf = e.target.closest('#view-stream [data-feld] > .tacckopf');
  if (feldKopf) {
    const key = feldKopf.parentElement.dataset.feld;
    felderOffen[key] = !felderOffen[key];
    felderSpeichern();
    feldKopf.parentElement.classList.toggle('offen', felderOffen[key]);
    return;
  }
  // Counter-Chips: Tap = Tick, ✎ = Detailansicht
  const chip = e.target.closest('.cchip');
  if (chip) {
    if (e.target.closest('[data-cedit]')) sheetDetailOeffnen(chip.dataset.cid);
    else counterTick(chip.dataset.cid);
    return;
  }
  const karte = e.target.closest('.karte');
  if (!karte) return;
  const id = karte.dataset.id;
  const aktion = e.target.closest('[data-aktion]');
  if (!aktion) return;
  switch (aktion.dataset.aktion) {
    case 'streamtoggle':
      streamToggle(id);
      return;
    case 'uatoggle':
      unteraufgabeToggle(id, aktion.dataset.ua);
      renderAlles();
      return;
    case 'aussetzen':
      routineAussetzen(id, aktion.dataset.abzug === '1');
      return;
    case 'pp':
      if (fokus && fokus.itemId === id) fokusToggle();
      else fokusStarten(id);
      // im Tacho: Kern auf den neuen Fokus umbauen statt schließen
      if (sheetOffenFuer === 'tacho') sheetTachoOeffnen();
      break;
    case 'detail': sheetDetailOeffnen(id); break;
    case 'check':  abhakenFlow(id); break;
    case 'tick':   counterTick(id); break;
  }
});
